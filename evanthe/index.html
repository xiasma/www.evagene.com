      H.after(360,()=>{ dead.forEach(n=>{ try{ n.disconnect(); }catch(e){} }); });
      this._sum=null;
    },
    onEvent(type,info){
      // A soft happy chirp/trill bump when a cat would react.
      if(!this._sum) return;
      if(type==='select'||type==='fly'){
        const t=H.t();
        const o=H.ctx.createOscillator(); o.type='sine';
        const base= (info&&info.pitch) ? info.pitch : 520;
        o.frequency.value=base*0.5;
        const g=H.ctx.createGain(); g.gain.value=0;
        const lp=H.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
        o.connect(g); g.connect(lp); lp.connect(H.out);
        o.frequency.setValueAtTime(base*0.5,t);
        o.frequency.exponentialRampToValueAtTime(base*0.62,t+0.18);
        g.gain.setTargetAtTime(0.05,t,0.04);
        g.gain.setTargetAtTime(0.0001,t+0.12,0.12);
        o.start(t); o.stop(t+0.5);
        nodes.push(o,g,lp);
        o.onended=()=>{ [o,g,lp].forEach(n=>{ try{ n.disconnect(); }catch(e){} }); };
      }
    }
  };
}

function makeCosmic(H){
  let nodes=[];
  return {
    onMotion(energy,info){
      if(!this._bus) return;
      const t=H.t();
      const e=Math.max(0,Math.min(1,energy));
      // Motion swells the nebula pad and pushes more into the reverb for shimmer,
      // easing back to the breathing-bed baseline when still.
      const busBase=0.17, sendBase=0.55;
      this._bus.gain.setTargetAtTime(busBase + e*0.13, t, e>0.02 ? 0.25 : 0.8);
      if(this._send) this._send.gain.setTargetAtTime(sendBase + e*0.35, t, e>0.02 ? 0.25 : 0.9);
    },
    start(){
      const t=H.t();
      const bus=H.ctx.createGain(); bus.gain.value=0;

      // A gentle global low-pass that opens/closes very slowly — "breathing nebula".
      const lp=H.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600; lp.Q.value=0.3;
      bus.connect(lp); lp.connect(H.out);
      nodes.push(bus,lp);

      // Send a copy into the shared reverb for spaciousness.
      const send=H.ctx.createGain(); send.gain.value=0.55;
      if(H.reverb){ bus.connect(send); send.connect(H.reverb); }
      nodes.push(send);

      // A slowly evolving detuned-sine pad.
      const partials=[
        {f:55,   g:0.5,  det:0},
        {f:55,   g:0.5,  det:0.18},
        {f:82.4, g:0.28, det:-0.15},   // fifth-ish
        {f:110,  g:0.22, det:0.12},    // octave
        {f:164.8,g:0.12, det:-0.2}     // higher shimmer
      ];
      partials.forEach(p=>{
        const o=H.ctx.createOscillator(); o.type='sine';
        o.frequency.value=p.f; o.detune.value=p.det*100;
        const g=H.ctx.createGain(); g.gain.value=p.g*0.5;
        o.connect(g); g.connect(bus);
        o.start(t);
        nodes.push(o,g);

        // Slow detune drift LFO per partial for living movement.
        const drift=H.ctx.createOscillator(); drift.type='sine';
        drift.frequency.value=H.rnd(0.03,0.09);
        const driftAmt=H.ctx.createGain(); driftAmt.gain.value=H.rnd(3,8); // cents
        drift.connect(driftAmt); driftAmt.connect(o.detune);
        drift.start(t);
        nodes.push(drift,driftAmt);
      });

      H.every(11000,()=>{
        const tt=H.t();
        lp.frequency.setTargetAtTime(H.rnd(450,1100),tt,4.0);
        bus.gain.setTargetAtTime(H.rnd(0.13,0.2),tt,5.0);
      });

      // Distant "stellar wind" — filtered noise swelling in and out.
      const wind=H.noiseSource(); nodes.push(wind);
      const wf=H.ctx.createBiquadFilter(); wf.type='bandpass'; wf.frequency.value=420; wf.Q.value=0.8;
      const wg=H.ctx.createGain(); wg.gain.value=0;
      wind.connect(wf); wf.connect(wg); wg.connect(bus);
      wind.start(t);
      nodes.push(wf,wg);
      H.every(9000,()=>{
        const tt=H.t();
        wf.frequency.setTargetAtTime(H.rnd(260,700),tt,3.0);
        wg.gain.setTargetAtTime(H.rnd(0.01,0.05),tt,4.0);
      });

      bus.gain.setTargetAtTime(0.17,t,4.0);
      this._bus=bus; this._send=send;
    },
    stop(){
      const t=H.t();
      if(this._bus) this._bus.gain.setTargetAtTime(0.0001,t,0.18);
      nodes.forEach(n=>{ if(n.stop){ try{ n.stop(t+0.4); }catch(e){} } });
      const dead=nodes; nodes=[];
      H.after(460,()=>{ dead.forEach(n=>{ try{ n.disconnect(); }catch(e){} }); });
      this._bus=null;
    },
    onEvent(type,info){
      if(!this._bus) return;
      // A slow rising "comet swell" on interaction.
      const t=H.t();
      const o=H.ctx.createOscillator(); o.type='sine';
      const f = (info&&info.pitch) ? info.pitch : H.choice(H.pentat);
      o.frequency.value=f;
      const g=H.ctx.createGain(); g.gain.value=0;
      o.connect(g); g.connect(this._bus);
      let s=null;
      if(H.reverb){ s=H.ctx.createGain(); s.gain.value=0.6; g.connect(s); s.connect(H.reverb); nodes.push(s); }
      o.frequency.setValueAtTime(f*0.97,t);
      o.frequency.linearRampToValueAtTime(f,t+1.2);
      g.gain.setTargetAtTime(0.04,t,0.4);
      g.gain.setTargetAtTime(0.0001,t+1.0,0.8);
      o.start(t); o.stop(t+3.0);
      nodes.push(o,g);
      o.onended=()=>{ [o,g,s].forEach(n=>{ if(n){ try{ n.disconnect(); }catch(e){} } }); };
    }
  };
}

function makeHarp(H){
  let nodes=[];
  return {
    onMotion(energy,info){
      if(!this._pluck) return;
      const t=H.t();
      const e=Math.max(0,Math.min(1,energy));
      // Brush a soft arpeggio across the existing pentatonic strings while moving.
      // Rate-limit by time-since-last-pluck so 60fps never bursts; faster motion =
      // notes closer together (down to ~70ms), gentle motion = sparse.
      if(this._mLast===undefined){ this._mLast=0; this._mIdx=H.irnd(0,H.pentat.length-1); }
      if(e>0.03){
        const gap=0.34 - e*0.27;   // ~340ms idle-drift down to ~70ms fast
        if(t - this._mLast >= gap){
          this._mLast=t;
          // Walk up/down the string set so it reads as a hand brushing across.
          const dir=info && info.zoom<0 ? -1 : 1;
          this._mIdx += dir;
          if(this._mIdx>=H.pentat.length){ this._mIdx=H.pentat.length-2; }
          if(this._mIdx<0){ this._mIdx=1; }
          this._pluck(H.pentat[this._mIdx], 0.4 + e*0.5);
        }
      }
    },
    start(){
      const t=H.t();
      const bus=H.ctx.createGain(); bus.gain.value=0; bus.connect(H.out);
      this._bus=bus; nodes.push(bus);

      // Warm sustaining pad underneath (detuned triangles, low-passed).
      const padG=H.ctx.createGain(); padG.gain.value=0;
      const plp=H.ctx.createBiquadFilter(); plp.type='lowpass'; plp.frequency.value=900; plp.Q.value=0.4;
      padG.connect(plp); plp.connect(bus);
      nodes.push(padG,plp);
      const padRoot=H.pentat[0];
      [padRoot, padRoot*1.5, padRoot*2].forEach((f,i)=>{
        const o=H.ctx.createOscillator(); o.type='triangle';
        o.frequency.value=f; o.detune.value=(i-1)*5;
        const g=H.ctx.createGain(); g.gain.value=(i===0?0.5:0.3)*0.5;
        o.connect(g); g.connect(padG);
        o.start(t);
        nodes.push(o,g);
      });
      padG.gain.setTargetAtTime(0.10,t,3.0);

      H.every(8000,()=>{ plp.frequency.setTargetAtTime(H.rnd(700,1300),H.t(),4.0); });

      // A reverb send for the harp plucks.
      const send=H.ctx.createGain(); send.gain.value=0.4;
      if(H.reverb){ send.connect(H.reverb); }
      this._send=send; nodes.push(send);

      // Pluck: damped triangle/sine with quick attack & long decay.
      this._pluck=(freq,vel)=>{
        const tt=H.t();
        const o=H.ctx.createOscillator(); o.type='triangle'; o.frequency.value=freq;
        const o2=H.ctx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2; // shimmer overtone
        const g=H.ctx.createGain(); g.gain.value=0;
        const g2=H.ctx.createGain(); g2.gain.value=0;
        const lp=H.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=Math.min(freq*6,6000); lp.Q.value=0.6;
        o.connect(g); o2.connect(g2); g.connect(lp); g2.connect(lp);
        lp.connect(bus);
        if(H.reverb){ lp.connect(send); }
        const peak=0.06*vel;
        g.gain.setValueAtTime(0,tt);
        g.gain.linearRampToValueAtTime(peak,tt+0.008);
        g.gain.setTargetAtTime(0.0001,tt+0.01,1.1);
        g2.gain.setValueAtTime(0,tt);
        g2.gain.linearRampToValueAtTime(peak*0.4,tt+0.006);
        g2.gain.setTargetAtTime(0.0001,tt+0.01,0.5);
        o.start(tt); o2.start(tt);
        o.stop(tt+4.0); o2.stop(tt+3.0);
        const arr=[o,o2,g,g2,lp];
        nodes.push.apply(nodes,arr);
        o.onended=()=>{ arr.forEach(n=>{ try{ n.disconnect(); }catch(e){} }); };
      };

      // Sparse arpeggios: short ascending/descending runs.
      const playArp=()=>{
        const len=H.irnd(2,4);
        const startIdx=H.irnd(0,Math.max(0,H.pentat.length-1-len));
        const dir=H.choice([1,1,-1]);
        for(let i=0;i<len;i++){
          const idx=startIdx + (dir>0 ? i : (len-1-i));
          const f=H.pentat[Math.max(0,Math.min(H.pentat.length-1,idx))];
          H.after(i*H.rnd(180,300), ()=>{ if(this._pluck) this._pluck(f, H.rnd(0.6,1.0)); });
        }
      };
      H.every(4200, playArp);
      H.after(600, playArp);

      bus.gain.setTargetAtTime(0.22,t,2.5);
    },
    stop(){
      const t=H.t();
      if(this._bus) this._bus.gain.setTargetAtTime(0.0001,t,0.18);
      this._pluck=null;
      nodes.forEach(n=>{ if(n.stop){ try{ n.stop(t+0.4); }catch(e){} } });
      const dead=nodes; nodes=[];
      H.after(460,()=>{ dead.forEach(n=>{ try{ n.disconnect(); }catch(e){} }); });
      this._bus=null;
    },
    onEvent(type,info){
      if(!this._pluck) return;
      if(type==='select'||type==='fly'||type==='pair'){
        const base = (info&&info.pitch) ? info.pitch : H.choice(H.pentat);
        this._pluck(base, 0.9);
        H.after(140,()=>{ if(this._pluck) this._pluck(base*1.5, 0.7); });
      } else if(type==='cousins'){
        const i0=H.irnd(0,Math.max(0,H.pentat.length-4));
        [0,2,4].forEach((d,k)=>{
          H.after(k*90,()=>{ if(this._pluck) this._pluck(H.pentat[Math.min(H.pentat.length-1,i0+d)],0.7); });
        });
      }
    }
  };
}

function makeSnow(H){
  let nodes=[];
  return {
    onMotion(energy,info){
      if(!this._bus) return;
      const t=H.t();
      const e=Math.max(0,Math.min(1,energy));
      // Intensify the soft hush with motion (a rising wind over snow), then ease
      // back to the ~0.2 calm bed when still.
      const busBase=0.2;
      this._bus.gain.setTargetAtTime(busBase + e*0.16, t, e>0.02 ? 0.3 : 1.0);
      // Sparse extra ice-glints sprinkled in faster motion, rate-limited so 60fps
      // never bursts.
      if(this._glint && e>0.25){
        if(this._mLast===undefined) this._mLast=0;
        const gap=0.8 - e*0.45;   // ~800ms down to ~350ms between glints
        if(t - this._mLast >= gap){ this._mLast=t; this._glint(H.choice(H.pentat)*2); }
      }
    },
    start(){
      const t=H.t();
      const bus=H.ctx.createGain(); bus.gain.value=0; bus.connect(H.out);
      this._bus=bus; nodes.push(bus);

      // Core airy hush: white noise heavily low-passed.
      const n1=H.noiseSource(); nodes.push(n1);
      const lp=H.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=700; lp.Q.value=0.3;
      const hush=H.ctx.createGain(); hush.gain.value=0;
      n1.connect(lp); lp.connect(hush); hush.connect(bus);
      n1.start(t);
      nodes.push(lp,hush);
      hush.gain.setTargetAtTime(0.09,t,4.0);

      // Slow swells in the hush — wind over snow.
      H.every(7000,()=>{
        const tt=H.t();
        hush.gain.setTargetAtTime(H.rnd(0.05,0.12),tt,3.5);
        lp.frequency.setTargetAtTime(H.rnd(500,950),tt,3.5);
      });

      // High airy shimmer (very quiet) — the "sparkle" of falling snow.
      const n2=H.noiseSource(); nodes.push(n2);
      const hp=H.ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6000; hp.Q.value=0.4;
      const air=H.ctx.createGain(); air.gain.value=0;
      n2.connect(hp); hp.connect(air); air.connect(bus);
      n2.start(t);
      nodes.push(hp,air);
      air.gain.setTargetAtTime(0.012,t,5.0);
      H.every(6000,()=>{ air.gain.setTargetAtTime(H.rnd(0.006,0.016),H.t(),4.0); });

      // Occasional ultra-soft tonal "ice glints" — barely-there twinkle.
      this._glint=(f)=>{
        const tt=H.t();
        const o=H.ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
        const g=H.ctx.createGain(); g.gain.value=0;
        o.connect(g); g.connect(bus);
        let s=null;
        if(H.reverb){ s=H.ctx.createGain(); s.gain.value=0.5; g.connect(s); s.connect(H.reverb); nodes.push(s); }
        g.gain.linearRampToValueAtTime(0.02,tt+0.05);
        g.gain.setTargetAtTime(0.0001,tt+0.1,0.6);
        o.start(tt); o.stop(tt+2.0);
        nodes.push(o,g);
        o.onended=()=>{ [o,g,s].forEach(n=>{ if(n){ try{ n.disconnect(); }catch(e){} } }); };
      };
      H.every(5500,()=>{ if(H.rnd(0,1)<0.6) this._glint(H.choice(H.pentat)*2); });

      bus.gain.setTargetAtTime(0.2,t,3.0);
    },
    stop(){
      const t=H.t();
      if(this._bus) this._bus.gain.setTargetAtTime(0.0001,t,0.18);
      this._glint=null;
      nodes.forEach(n=>{ if(n.stop){ try{ n.stop(t+0.4); }catch(e){} } });
      const dead=nodes; nodes=[];
      H.after(460,()=>{ dead.forEach(n=>{ try{ n.disconnect(); }catch(e){} }); });
      this._bus=null;
    },
    onEvent(type,info){
      if(!this._glint) return;
      if(type==='select'||type==='fly'){
        const f=(info&&info.pitch)?info.pitch*2:H.choice(H.pentat)*2;
        this._glint(f);
        H.after(120,()=>{ if(this._glint) this._glint(f*1.5); });
      }
    }
  };
}

function makeTide(H){
  let nodes=[];
  return {
    onMotion(energy,info){
      if(!this._bus) return;
      const t=H.t();
      const e=Math.max(0,Math.min(1,energy));
      // A larger swell with motion: lift the whole tide bus above its ~0.2 bed,
      // then settle slowly back like a wave receding when the view stills.
      const base=0.2;
      this._bus.gain.setTargetAtTime(base + e*0.18, t, e>0.02 ? 0.4 : 1.2);
    },
    start(){
      const t=H.t();
      const bus=H.ctx.createGain(); bus.gain.value=0; bus.connect(H.out);
      this._bus=bus; nodes.push(bus);

      // Ocean wash: lowpassed white noise, amplitude-modulated by a slow swell LFO.
      const n=H.noiseSource(); nodes.push(n);
      const lp=H.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=500; lp.Q.value=0.2;
      const wash=H.ctx.createGain(); wash.gain.value=0.0001;
      n.connect(lp); lp.connect(wash); wash.connect(bus);
      n.start(t);
      nodes.push(lp,wash);

      // Slow "tide" LFO ~0.06 Hz drives the wash amplitude AND filter.
      const tide=H.ctx.createOscillator(); tide.type='sine'; tide.frequency.value=0.06;
      const tideAmp=H.ctx.createGain(); tideAmp.gain.value=0.05;
      const tideBias=H.ctx.createConstantSource(); tideBias.offset.value=0.07;
      tide.connect(tideAmp); tideAmp.connect(wash.gain); tideBias.connect(wash.gain);
      tide.start(t); tideBias.start(t);
      nodes.push(tide,tideAmp,tideBias);

      // Tide also opens the filter on the crest.
      const fAmp=H.ctx.createGain(); fAmp.gain.value=250;
      tide.connect(fAmp); fAmp.connect(lp.frequency);
      nodes.push(fAmp);

      H.every(13000,()=>{ tide.frequency.setTargetAtTime(H.rnd(0.045,0.08),H.t(),5.0); });

      // Deep low pad to anchor it warmly.
      const sub=H.ctx.createOscillator(); sub.type='sine'; sub.frequency.value=H.pentat[0]*0.5;
      const subG=H.ctx.createGain(); subG.gain.value=0;
      sub.connect(subG); subG.connect(bus);
      sub.start(t);
      nodes.push(sub,subG);
      subG.gain.setTargetAtTime(0.06,t,5.0);

      bus.gain.setTargetAtTime(0.2,t,4.0);
    },
    stop(){
      const t=H.t();
      if(this._bus) this._bus.gain.setTargetAtTime(0.0001,t,0.18);
      nodes.forEach(n=>{ if(n.stop){ try{ n.stop(t+0.4); }catch(e){} } });
      const dead=nodes; nodes=[];
      H.after(460,()=>{ dead.forEach(n=>{ try{ n.disconnect(); }catch(e){} }); });
      this._bus=null;
    },
    onEvent(type,info){
      if(!this._bus) return;
      if(type==='select'||type==='fly'){
        const t=H.t();
        const o=H.ctx.createOscillator(); o.type='sine';
        const f=(info&&info.pitch)?info.pitch:H.choice(H.pentat);
        o.frequency.value=f;
        const g=H.ctx.createGain(); g.gain.value=0;
        o.connect(g); g.connect(this._bus);
        g.gain.setTargetAtTime(0.03,t,0.3);
        g.gain.setTargetAtTime(0.0001,t+0.6,0.7);
        o.start(t); o.stop(t+2.0);
        nodes.push(o,g);
        o.onended=()=>{ [o,g].forEach(n=>{ try{ n.disconnect(); }catch(e){} }); };
      }
    }
  };
}

// ===========================================================================

  { id:'wood-clacks',   label:'Lignacrepa',   make: makeWoodClacks },  // lignum (wood) + crepare (to clatter)
  { id:'rain',          label:'Stillara',     make: makeRain },        // stilla (a drop)
  { id:'seashore',      label:'Aequora',      make: makeSeaShore },    // aequor (the sea's surface)
  { id:'brook',         label:'Rivulara',     make: makeBrook },       // rivulus (a small stream)
  { id:'whales',        label:'Cetacantera',  make: makeWhales },      // cetus (whale) + cantare (to sing)
  { id:'fireplace',     label:'Foculara',     make: makeFireplace },   // focus (the hearth)
  { id:'gravel',        label:'Frangenium',   make: makeGravel },      // frangere (to crush)
  { id:'train',         label:'Locomota',     make: makeTrain },       // locomotion
  { id:'wind-thunder',  label:'Procellara',   make: makeWindThunder }, // procella (a storm)
  { id:'birdsong',      label:'Avicanta',     make: makeBirdsong },    // avis (bird) + cantare (to sing)
  { id:'leaves',        label:'Frondara',     make: makeLeaves },      // frons/frondis (foliage)
  { id:'crickets',      label:'Stridula',     make: makeCrickets },    // stridere (to chirp/stridulate)
  { id:'frogs',         label:'Palustria',    make: makeFrogs },       // paluster (of the marsh)
  { id:'purr',          label:'Felimurmare',  make: makePurr },        // feles (cat) + murmur
  { id:'cosmic',        label:'Aethersona',   make: makeCosmic },      // aether (the heavens) + sonus
  { id:'harp',          label:'Caelilyra',    make: makeHarp },        // caelum (sky) + lyra (harp)
  { id:'snow',          label:'Nivalara',     make: makeSnow },        // nix/nivis (snow)
  { id:'tide',          label:'Aestumara',    make: makeTide }         // aestus (tide) + mare (sea)
];
const REG_BY_ID = {};
for(const r of REGISTRY) REG_BY_ID[r.id] = r;
function labelFor(id){
  if(id==='none') return 'None';
  if(id==='auto') return 'Auto';
  return REG_BY_ID[id] ? REG_BY_ID[id].label : id;
}

// ===========================================================================
// TWO CROSSFADE DECKS + scape lifecycle
// ===========================================================================
function makeDeck(){
  return {
    gain: null,        // GainNode (created on ensureDecks)
    inst: null,        // soundscape instance
    timers: null,      // its managed timer set
    scapeId: null,     // which registry id is playing
    active: false,
    epoch: 0           // bumped on every (re)assignment so stale teardown
                       // timeouts targeting this deck become no-ops
  };
}
let decks = [makeDeck(), makeDeck()];
let activeDeck = 0;    // index of the deck currently fading IN / playing
let decksReady = false;

function ensureDecks(){
  if(decksReady) return;
  for(const d of decks){
    d.gain = ctx.createGain();
    d.gain.gain.value = 0.0001;
    d.gain.connect(bedBus);   // beds boosted above cues so the active mode is clearly heard
  }
  decksReady = true;
}

function equalPowerRampUp(param, dur){
  // approximate equal-power fade-in using a small set of curve points
  const now = ctx.currentTime;
  param.cancelScheduledValues(now);
  param.setValueAtTime(Math.max(param.value, 0.0001), now);
  const steps = 24;
  for(let i=1;i<=steps;i++){
    const x = i/steps;
    param.linearRampToValueAtTime(Math.max(0.0001, Math.sin(x*Math.PI/2)), now + dur*x);
  }
}
function equalPowerRampDown(param, dur){
  const now = ctx.currentTime;
  const start = Math.max(param.value, 0.0001);
  param.cancelScheduledValues(now);
  param.setValueAtTime(start, now);
  const steps = 24;
  for(let i=1;i<=steps;i++){
    const x = i/steps;
    param.linearRampToValueAtTime(Math.max(0.0001, start*Math.cos(x*Math.PI/2)), now + dur*x);
  }
}

function teardownDeck(d){
  if(!d.active) return;
  // claim this deck: any in-flight teardown/clearAll scheduled against an
  // older epoch will see the bump and bail.
  d.epoch++;
  try{ if(d.inst && d.inst.stop) d.inst.stop(); }catch(e){ console.warn('scape stop error', e); }
  // let the scape's own ramp/after-timers finish their teardown, THEN clear timers
  const timers = d.timers;
  const ep = d.epoch;
  setTimeout(()=>{ if(d.epoch === ep && timers) timers.clearAll(); }, 800);
  d.inst = null; d.scapeId = null; d.active = false;
}

// Start `scapeId` on the idle deck and crossfade. scapeId must be a registry id.
function crossfadeTo(scapeId){
  ensureDecks();
  const idle = 1 - activeDeck;
  const dIn = decks[idle];
  const dOut = decks[activeDeck];

  // tear down whatever is on the idle deck (should be inactive already)
  teardownDeck(dIn);

  // build + start the new scape on the idle deck
  const reg = REG_BY_ID[scapeId];
  if(!reg){ return; }
  dIn.timers = makeTimerSet();
  const H = makeHelpers(dIn.gain, dIn.timers);
  dIn.inst = reg.make(H);
  dIn.scapeId = scapeId;
  dIn.active = true;
  dIn.epoch++;   // claim the idle deck so any stale teardown timeout aimed at
                 // it (from a prior cycle) becomes a no-op
  try{ dIn.inst.start(); }catch(e){ console.warn('scape start error', e); }

  // equal-power crossfade
  equalPowerRampUp(dIn.gain.gain, XFADE_S);
  if(dOut.active){
    equalPowerRampDown(dOut.gain.gain, XFADE_S);
    const outDeck = dOut;
    const ep = dOut.epoch;
    setTimeout(()=>{ if(outDeck.epoch === ep) teardownDeck(outDeck); }, XFADE_S*1000 + 100);
  }
  activeDeck = idle;
}

// Stop all sound (fade out the active deck) — used by "None".
function stopAll(){
  if(!decksReady) return;
  for(let i=0;i<decks.length;i++){
    const d = decks[i];
    if(d.active){
      equalPowerRampDown(d.gain.gain, 1.2);
      const dd = d;
      const ep = d.epoch;
      setTimeout(()=>{ if(dd.epoch === ep) teardownDeck(dd); }, 1400);
    }
  }
}

// The id of the scape currently fading-in / playing (for Auto name display).
function currentScapeId(){
  const d = decks[activeDeck];
  return d && d.active ? d.scapeId : null;
}

// ===========================================================================
// AUTO MODE — every ~60s crossfade to a different random scape.
// ===========================================================================
let autoTimer = null;
function pickRandomScape(exceptId){
  const ids = REGISTRY.map(r=>r.id).filter(id=>id!==exceptId);
  return ids[(Math.random()*ids.length)|0];
}
function startAuto(){
  stopAuto();
  const first = pickRandomScape(currentScapeId());
  crossfadeTo(first);
  updateNowLabel();
  autoTimer = setInterval(()=>{
    if(!unlocked) return;
    const next = pickRandomScape(currentScapeId());
    crossfadeTo(next);
    updateNowLabel();
  }, AUTO_PERIOD_MS);
}
function stopAuto(){
  if(autoTimer){ clearInterval(autoTimer); autoTimer = null; }
}

// ===========================================================================
// MODE APPLICATION
// ===========================================================================
function applyMode(mode){
  // mode: 'none' | 'auto' | <registry id>
  if(!unlocked){ updateModeUI(); return; }  // stays silent until first gesture
  if(mode === 'auto'){
    startAuto();
  } else {
    stopAuto();
    if(mode === 'none'){ stopAll(); }
    else { crossfadeTo(mode); }
  }
  updateNowLabel();
}

function setMode(mode){
  currentMode = mode;
  try{ localStorage.setItem(LS_MODE, mode); }catch(e){}
  applyMode(mode);
  updateModeUI();
}

function setVolume(v){
  volume = Math.max(0, Math.min(1, v));
  try{ localStorage.setItem(LS_VOL, String(volume)); }catch(e){}
  if(masterGain && unlocked){
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.setTargetAtTime(volume * MASTER_TARGET, ctx.currentTime, 0.08);
  }
}

// ===========================================================================
// INTERACTION CUES — engine-level, layered above whatever bed is playing.
// A dedicated cue bus so they always sound regardless of the active scape.
// ===========================================================================
let cueBus = null, cueRevSend = null;
function ensureCueBus(){
  if(cueBus) return;
  cueBus = ctx.createGain();
  cueBus.gain.value = 0.85;       // cues are intentionally soft
  cueBus.connect(masterGain);
  cueRevSend = ctx.createGain();
  cueRevSend.gain.value = 0.4;
  cueRevSend.connect(reverb);
}

// map an event's depth/age to a pleasant pentatonic frequency
function pitchFromDetail(detail){
  if(!detail) return PENTAT[(Math.random()*PENTAT.length)|0];
  let idx;
  if(typeof detail.depth === 'number'){
    // deeper (more derived) -> higher & twinklier
    idx = Math.round((detail.depth/7) * (PENTAT.length-1));
  } else if(typeof detail.age === 'number'){
    // younger (smaller age) -> higher
    const a = Math.min(1, Math.max(0, detail.age/4000));
    idx = Math.round((1-Math.sqrt(a)) * (PENTAT.length-1));
  } else {
    idx = (Math.random()*PENTAT.length)|0;
  }
  idx = Math.max(0, Math.min(PENTAT.length-1, idx));
  return PENTAT[idx];
}

function cuePluck(freq, when, peak, dur){
  when = when || ctx.currentTime;
  peak = peak || 0.05;
  dur = dur || 1.6;
  const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
  const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq*2;
  const og2 = ctx.createGain(); og2.gain.value = 0.3;
  const g = ctx.createGain(); g.gain.value = 0;
  const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = Math.min(freq*6, 7000);
  o.connect(g); o2.connect(og2).connect(g); g.connect(lp);
  lp.connect(cueBus); lp.connect(cueRevSend);
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(peak, when + 0.008);
  g.gain.setTargetAtTime(0.0001, when + 0.02, dur*0.18);
  o.start(when); o2.start(when);
  const end = when + dur + 0.2;
  o.stop(end); o2.stop(end);
  o.onended = ()=>{ try{ o.disconnect(); o2.disconnect(); og2.disconnect(); g.disconnect(); lp.disconnect(); }catch(e){} };
}

function cueWhoosh(){
  // soft rising filtered-noise shimmer for 'fly'
  const src = ctx.createBufferSource(); src.buffer = noiseBuffer; src.loop = true;
  const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value = 1.2;
  const g = ctx.createGain(); g.gain.value = 0;
  src.connect(bp).connect(g); g.connect(cueBus); g.connect(cueRevSend);
  const now = ctx.currentTime;
  bp.frequency.setValueAtTime(500, now);
  bp.frequency.exponentialRampToValueAtTime(3500, now + 0.7);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.05, now + 0.25);
  g.gain.setTargetAtTime(0.0001, now + 0.45, 0.25);
  src.start(now);
  const end = now + 1.4;
  src.stop(end);
  src.onended = ()=>{ try{ src.disconnect(); bp.disconnect(); g.disconnect(); }catch(e){} };
}

function cueForEvent(type, detail){
  if(!unlocked) return;
  ensureCueBus();
  const now = ctx.currentTime;
  if(type === 'select'){
    cuePluck(pitchFromDetail(detail), now + 0.01, 0.05, 1.6);
  } else if(type === 'pair'){
    // two-note resolving chime (a soft "found it")
    const base = pitchFromDetail(detail);
    cuePluck(base, now + 0.01, 0.045, 1.8);
    cuePluck(base*1.5, now + 0.18, 0.05, 2.2);  // up a fifth, resolving
  } else if(type === 'cousins'){
    // brief gentle arpeggio shimmer
    const i0 = (Math.random()*(PENTAT.length-4))|0;
    [0,1,2,3].forEach((d,k)=>{
      cuePluck(PENTAT[Math.min(PENTAT.length-1, i0+d)], now + 0.01 + k*0.10, 0.035, 1.4);
    });
  } else if(type === 'fly'){
    cueWhoosh();
  }
}

// Forward an interaction to the active scape's onEvent (with derived pitch).
function forwardToScape(type, detail){
  const d = decks[activeDeck];
  if(d && d.active && d.inst && d.inst.onEvent){
    const info = {};
    if(detail){
      if(typeof detail.age === 'number') info.age = detail.age;
      if(typeof detail.depth === 'number') info.depth = detail.depth;
    }
    info.pitch = pitchFromDetail(detail);
    try{ d.inst.onEvent(type, info); }catch(e){ console.warn('scape onEvent error', e); }
  }
}

function handleEvent(type, detail){
  cueForEvent(type, detail);
  forwardToScape(type, detail);
}

// ===========================================================================
// NAVIGATION VOICE — a gentle, motion-matched whisper that swells as you orbit
// and pinch-zoom, and fades to silence when the view is still. Driven each frame
// by window.__evoNav (camera-motion energy published by the galaxy module).
// ===========================================================================
let navSrc=null, navBP=null, navGain=null, navNoiseGain=null, navTone=null, navTone2=null, navToneGain=null, navStarted=false, navRAF=0;
const NAV_ROOT = (PENTAT[2] || 261.6) / 2;   // low, warm drone root shared with the cues
function ensureNavVoice(){
  if(navStarted || !ctx) return;
  ensureCueBus();
  // overall nav level; the two parts below ride their own motion-driven gains
  navGain = ctx.createGain(); navGain.gain.value=1.0;
  navGain.connect(cueBus); navGain.connect(cueRevSend);
  // (1) airy texture — a light bandpassed-noise breath
  navSrc = ctx.createBufferSource(); navSrc.buffer = noiseBuffer; navSrc.loop = true;
  navBP = ctx.createBiquadFilter(); navBP.type='bandpass'; navBP.Q.value=0.7; navBP.frequency.value=500;
  navNoiseGain = ctx.createGain(); navNoiseGain.gain.value=0.0001;
  navSrc.connect(navBP).connect(navNoiseGain).connect(navGain);
  // (2) tonal swell tuned to the SAME pentatonic world as the chime/pluck cues,
  //     so movement "sings" in key and feels of-a-piece with clicking, not alien.
  navTone  = ctx.createOscillator(); navTone.type='triangle'; navTone.frequency.value=NAV_ROOT;
  navTone2 = ctx.createOscillator(); navTone2.type='sine';    navTone2.frequency.value=NAV_ROOT*1.5; // a fifth
  navToneGain = ctx.createGain(); navToneGain.gain.value=0.0001;
  const t2g = ctx.createGain(); t2g.gain.value=0.5;
  navTone.connect(navToneGain); navTone2.connect(t2g).connect(navToneGain); navToneGain.connect(navGain);
  navSrc.start(); navTone.start(); navTone2.start();
  navStarted=true;
  navLoop();
}
function navLoop(){
  navRAF = requestAnimationFrame(navLoop);
  if(!unlocked) return;
  const t = ctx.currentTime;
  const nv = window.__evoNav || {};
  // Respect "None": no motion sound when ambient audio is switched off.
  const silent = (currentMode === 'none');
  const energy = silent ? 0 : Math.min(1, (nv.move||0) * 90);
  const zoom   = silent ? 0 : (nv.zoom||0);

  // Forward motion to the ACTIVE soundscape so it reacts IN ITS OWN VOICE:
  // wind chimes flurry as if brushed, rain swells to a downpour, etc. Called
  // every frame (energy 0 when still) so each scape can also fade back down.
  let handled = false;
  const ad = decks[activeDeck];
  if(ad && ad.active && ad.inst && typeof ad.inst.onMotion === 'function'){
    try{ ad.inst.onMotion(energy, {zoom, dist:nv.dist}); handled = true; }
    catch(e){ /* a bad onMotion must never break navigation */ }
  }

  // Generic tonal swell — only a FALLBACK now, for any scape that doesn't define
  // onMotion. Ramps to silence whenever the active scape handles its own motion.
  if(!navGain) return;
  const ge = handled ? 0 : energy;
  const gz = handled ? 0 : zoom;
  navToneGain.gain.setTargetAtTime(Math.max(0.0001, ge*0.20), t, 0.08);
  navNoiseGain.gain.setTargetAtTime(Math.max(0.0001, ge*0.07), t, 0.08);
  navBP.frequency.setTargetAtTime(360 + ge*1500, t, 0.10);
  const mul = Math.pow(2, (gz*4)/12);
  navTone.frequency.setTargetAtTime(NAV_ROOT*mul, t, 0.12);
  navTone2.frequency.setTargetAtTime(NAV_ROOT*1.5*mul, t, 0.12);
}

window.addEventListener('evo:select',  e=>handleEvent('select',  e.detail));
window.addEventListener('evo:pair',    e=>handleEvent('pair',    e.detail));
window.addEventListener('evo:cousins', e=>handleEvent('cousins', e.detail));
window.addEventListener('evo:fly',     e=>handleEvent('fly',     e.detail));

// ===========================================================================
// UI WIRING
// ===========================================================================
const soundBtn   = document.getElementById('soundBtn');
const soundPanel = document.getElementById('soundPanel');
const soundModes = document.getElementById('soundModes');
const soundVol   = document.getElementById('soundVol');
const soundNow   = document.getElementById('soundNow');

// build the mode list: None, Auto, then all 21 scapes
const MODE_LIST = [{id:'none', label:'None'}, {id:'auto', label:'Auto'}]
  .concat(REGISTRY.map(r=>({id:r.id, label:r.label})));

soundModes.innerHTML = MODE_LIST.map(m=>
  `<div class="smode" data-id="${m.id}"><span class="dot"></span>${m.label}</div>`
).join('');

soundModes.querySelectorAll('.smode').forEach(el=>{
  el.addEventListener('click', ()=> setMode(el.dataset.id));
});

function updateModeUI(){
  soundModes.querySelectorAll('.smode').forEach(el=>{
    el.classList.toggle('on', el.dataset.id === currentMode);
  });
  soundBtn.classList.toggle('on', currentMode !== 'none');
}

function updateNowLabel(){
  if(currentMode === 'auto'){
    const id = currentScapeId();
    soundNow.textContent = id ? ('· '+labelFor(id)) : (unlocked ? '' : '· tap to start');
  } else {
    soundNow.textContent = '';
  }
}
// refresh the Auto "now playing" label periodically so it tracks crossfades
setInterval(()=>{ if(currentMode==='auto') updateNowLabel(); }, 2000);

// open/close the panel
soundBtn.addEventListener('click', (e)=>{
  e.stopPropagation();
  soundPanel.classList.toggle('show');
  updateNowLabel();
});
// close when clicking outside (but not on the panel/button)
document.addEventListener('pointerdown', (e)=>{
  if(soundPanel.classList.contains('show') &&
     !soundPanel.contains(e.target) && e.target !== soundBtn){
    soundPanel.classList.remove('show');
  }
}, true);

// volume slider
soundVol.value = String(Math.round(volume*100));
soundVol.addEventListener('input', ()=>{
  setVolume(parseInt(soundVol.value,10)/100);
});

// initialise UI state
updateModeUI();
updateNowLabel();

// ===========================================================================
// FIRST-GESTURE UNLOCK — create/resume the AudioContext, then start the mode.
// ===========================================================================
function unlock(){
  if(unlocked) return;
  if(!ensureContext()) return;
  const resumeP = (ctx.state === 'suspended') ? ctx.resume() : Promise.resolve();
  resumeP.then(()=>{
    unlocked = true;
    // ramp master up to the persisted volume
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.setValueAtTime(0.0001, ctx.currentTime);
    masterGain.gain.setTargetAtTime(volume * MASTER_TARGET, ctx.currentTime, 0.1);
    ensureCueBus();
    applyMode(currentMode);   // begin the selected/auto mode now that we're unlocked
    ensureNavVoice();         // start the motion-matched navigation voice
    updateNowLabel();
  }).catch(e=>{ console.warn('AudioContext resume failed', e); });
}
window.addEventListener('pointerdown', unlock, {passive:true});
window.addEventListener('keydown', unlock, {passive:true});
window.addEventListener('touchstart', unlock, {passive:true});

})();
</script>
