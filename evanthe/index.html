<!-- ============================================================================
     AMBIENT AUDIO ENGINE  (separate inline module — isolated from the Three.js
     module above; they communicate only via window CustomEvents + window.__evo).
     Everything synthesized with the Web Audio API. No audio files.
     ============================================================================ -->
<script type="module">
(function(){
'use strict';

// ---------------------------------------------------------------------------
// Persistence keys + defaults
// ---------------------------------------------------------------------------
const LS_MODE = 'evo_sound_mode';
const LS_VOL  = 'evo_sound_vol';
const AUTO_PERIOD_MS = 60000;   // Auto crossfades every ~60s
const XFADE_S = 2.5;            // equal-power crossfade duration
const MASTER_TARGET = 0.18;     // master gain target at full volume

let savedMode = null, savedVol = null;
try{ savedMode = localStorage.getItem(LS_MODE); }catch(e){}
try{ savedVol  = localStorage.getItem(LS_VOL); }catch(e){}
const firstVisit = (savedMode === null);
let currentMode = savedMode || 'auto';                 // default first visit = Auto
let volume = savedVol !== null ? (parseFloat(savedVol)||0) : 0.6;
volume = Math.max(0, Math.min(1, volume));

// ---------------------------------------------------------------------------
// Pentatonic frequency table (~3 octaves, C/D/E/G/A minor-pentatonic-ish)
// ---------------------------------------------------------------------------
const PENTAT = (function(){
  // C minor pentatonic-ish across ~3 octaves (relaxing): C D Eb G Bb pattern
  const roots = [130.81, 146.83, 164.81, 196.00, 220.00]; // C3 D3 E3 G3 A3 (major pentatonic, soft)
  const out = [];
  for(let oct=0; oct<3; oct++){
    for(const r of roots) out.push(r * Math.pow(2, oct));
  }
  return out; // 15 freqs spanning C3..~A5
})();

// ---------------------------------------------------------------------------
// Lazy AudioContext + master chain. Created/resumed on first user gesture.
// ---------------------------------------------------------------------------
let ctx = null;
let masterGain = null, comp = null, reverb = null, reverbReturn = null, bedBus = null;
let noiseBuffer = null;
let unlocked = false;

function buildNoiseBuffer(){
  const len = Math.floor(ctx.sampleRate * 3);  // ~3s mono white noise
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2 - 1;
  return buf;
}

function buildReverbIR(){
  // gentle short hall ~2s, smooth exponential decay, stereo
  const sr = ctx.sampleRate;
  const len = Math.floor(sr * 2.0);
  const ir = ctx.createBuffer(2, len, sr);
  for(let ch=0; ch<2; ch++){
    const d = ir.getChannelData(ch);
    for(let i=0;i<len;i++){
      const t = i/len;
      // soft early build then exponential tail; mild noise diffusion
      const env = Math.pow(1 - t, 3.2) * (0.6 + 0.4*Math.exp(-t*5));
      d[i] = (Math.random()*2 - 1) * env;
    }
  }
  return ir;
}

function ensureContext(){
  if(ctx) return ctx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  ctx = new AC();
  noiseBuffer = buildNoiseBuffer();

  masterGain = ctx.createGain();
  masterGain.gain.value = 0.0001;   // ramped up once unlocked

  // The ambient soundscape "beds" route through a dedicated bus boosted well
  // above the (transient) interaction cues + nav voice, so the SELECTED mode is
  // the clearly audible foundation and switching modes is unmistakable.
  bedBus = ctx.createGain();
  bedBus.gain.value = 3.2;
  bedBus.connect(masterGain);

  comp = ctx.createDynamicsCompressor();
  // gentle soft limiter — protects against accidental peaks, not a crutch
  comp.threshold.value = -18;
  comp.knee.value = 24;
  comp.ratio.value = 3.0;
  comp.attack.value = 0.006;
  comp.release.value = 0.25;

  // shared reverb convolver with its own return into the compressor
  reverb = ctx.createConvolver();
  reverb.buffer = buildReverbIR();
  reverbReturn = ctx.createGain();
  reverbReturn.gain.value = 0.5;   // wet level mixed back
  reverb.connect(reverbReturn);

  // master bus -> compressor -> destination; reverb return -> master so the
  // volume slider scales the wet mix too (and volume 0 truly silences output)
  masterGain.connect(comp);
  reverbReturn.connect(masterGain);
  comp.connect(ctx.destination);
  return ctx;
}

// ---------------------------------------------------------------------------
// Per-instance managed timers (every/after). Each soundscape instance gets its
// own timer set so stop() can fully clear them — no leaks.
// ---------------------------------------------------------------------------
function makeTimerSet(){
  const timers = new Set();
  return {
    every(ms, fn){
      const run = ()=>{
        // jitter the interval ±20% so beds never feel metronomic
        const jit = ms * (0.85 + Math.random()*0.3);
        const myId = setTimeout(()=>{
          timers.delete(myId);
          try{ fn(); }catch(e){ console.warn('audio every() cb error', e); }
          run();
        }, jit);
        timers.add(myId);
      };
      run();
    },
    after(ms, fn){
      const id = setTimeout(()=>{
        timers.delete(id);
        try{ fn(); }catch(e){ console.warn('audio after() cb error', e); }
      }, ms);
      timers.add(id);
      return id;
    },
    clearAll(){
      for(const id of timers){ clearTimeout(id); }
      timers.clear();
    }
  };
}

// ---------------------------------------------------------------------------
// Helpers object factory — one H per soundscape instance (shares ctx/master/
// reverb/noise, but owns its deck-gain `out` and its own timer set).
// ---------------------------------------------------------------------------
function makeHelpers(deckGain, timers){
  return {
    ctx,
    out: deckGain,
    reverb,
    pentat: PENTAT,
    t(){ return ctx.currentTime; },
    rnd(a,b){ return a + Math.random()*(b-a); },
    irnd(a,b){ return a + Math.floor(Math.random()*(b-a+1)); },
    choice(arr){ return arr[(Math.random()*arr.length)|0]; },
    noiseSource(){
      const s = ctx.createBufferSource();
      s.buffer = noiseBuffer;
      s.loop = true;
      return s;
    },
    every: timers.every,
    after: timers.after
  };
}

// ===========================================================================
// SOUNDSCAPE FACTORIES (pasted verbatim from the supplied registry).
// ===========================================================================
function makeChimes(H){
  const voices = [];
  let bedGain, revGain, airSrc, live=false;

  function strike(freq, when, vel){
    const ctx = H.ctx;
    const dur = H.rnd(2.6, 4.8);
    const det = H.rnd(-6, 6);
    const pan = H.rnd(-0.7, 0.7);
    const panner = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    const g = ctx.createGain(); g.gain.value = 0;
    const carrier = ctx.createOscillator();
    carrier.type = 'triangle';
    carrier.frequency.value = freq;
    carrier.detune.value = det;
    const mod = ctx.createOscillator();
    mod.type = 'sine';
    mod.frequency.value = freq * H.rnd(1.98, 2.02);
    const modGain = ctx.createGain();
    modGain.gain.value = freq * 0.6;
    modGain.gain.setTargetAtTime(0.0001, when, dur * 0.25);
    mod.connect(modGain).connect(carrier.frequency);
    carrier.connect(g);
    if (panner){ g.connect(panner); panner.pan.value = pan; panner.connect(H.out); if (revGain) panner.connect(revGain); }
    else { g.connect(H.out); if (revGain) g.connect(revGain); }
    const peak = 0.06 * vel;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(peak, when + 0.012);
    g.gain.setTargetAtTime(0.0001, when + 0.02, dur * 0.32);
    carrier.start(when); mod.start(when);
    const endT = when + dur + 0.3;
    carrier.stop(endT); mod.stop(endT);
    voices.push(carrier, mod);
    carrier.onended = () => {
      const i = voices.indexOf(carrier); if (i>=0) voices.splice(i,1);
      const j = voices.indexOf(mod);     if (j>=0) voices.splice(j,1);
      try{ carrier.disconnect(); mod.disconnect(); }catch(e){}
    };
  }

  function gust(){
    const n = H.irnd(2, 5);
    let t = H.t() + 0.02;
    for (let i=0;i<n;i++){
      strike(H.choice(H.pentat), t, H.rnd(0.5, 1.0));
      t += H.rnd(0.06, 0.45);
    }
  }

  return {
    onMotion(energy, info){
      if(!live) return;
      const ctx = H.ctx, now = H.t();
      // (a) brush the air-bed a touch brighter/louder while moving, back to baseline when still
      if(bedGain){ bedGain.gain.setTargetAtTime(0.008 + energy*0.05, now, 0.12); }
      if(energy <= 0.001) return;
      // (b) hand brushed across the chimes: a flurry of existing strikes,
      // density scaling with energy, rate-limited by a min gap + per-call probability cap.
      if(this._mLast === undefined) this._mLast = 0;
      const minGap = 0.16 - energy*0.12;            // faster motion => shorter gap (down to ~0.04s)
      if(now - this._mLast < minGap) return;
      const p = Math.min(0.85, 0.12 + energy*0.9);  // firm probability cap
      if(Math.random() >= p) return;
      this._mLast = now;
      const n = 1 + H.irnd(0, Math.round(energy*3)); // 1..4 chimes per flurry
      let t = now + 0.01;
      for(let i=0;i<n;i++){
        strike(H.choice(H.pentat), t, H.rnd(0.4, 0.5 + energy*0.5));
        t += H.rnd(0.03, 0.10);
      }
    },
    start(){
      const ctx = H.ctx;
      live = true;
      bedGain = ctx.createGain(); bedGain.gain.value = 0;
      airSrc = H.noiseSource();
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=700; lp.Q.value=0.3;
      const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=300;
      airSrc.connect(hp).connect(lp).connect(bedGain).connect(H.out);
      airSrc.start();
      bedGain.gain.setTargetAtTime(0.008, H.t(), 1.5);
      if (H.reverb){ revGain = ctx.createGain(); revGain.gain.value = 0.5; revGain.connect(H.reverb); }
      H.every(H.rnd(3500, 6500), () => { if (!live) return; if (Math.random() < 0.85) gust(); });
      H.after(400, () => { if (live) gust(); });
    },
    stop(){
      const now = H.t();
      live = false;
      if (bedGain) bedGain.gain.setTargetAtTime(0.0001, now, 0.05);
      if (airSrc){ try{ airSrc.stop(now + 0.25); }catch(e){} }
      for (const v of voices.slice()){ try{ v.stop(now + 0.18); }catch(e){} }
      H.after(280, () => { try{ if(airSrc) airSrc.disconnect(); }catch(e){} for (const v of voices.slice()){ try{ v.disconnect(); }catch(e){} } try{ if(revGain){ revGain.disconnect(); revGain = null; } }catch(e){} });
    },
    onEvent(type, info){
      if (!live) return;
      if (type === 'select' || type === 'fly'){
        const f = (info && info.pitch) ? info.pitch : H.choice(H.pentat);
        strike(f, H.t() + 0.01, type === 'fly' ? 0.6 : 0.8);
      }
    }
  };
}

function makeBowls(H){
  const voices = [];
  let revGain, live=false;
  const RATIOS = [1.0, 2.78, 5.18, 8.16, 11.66];

  function strike(freq, when, vel){
    const ctx = H.ctx;
    const dur = H.rnd(7, 12);
    const masterG = ctx.createGain(); masterG.gain.value = 1;
    const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    if (pan){ pan.pan.value = H.rnd(-0.4,0.4); masterG.connect(pan); pan.connect(H.out); if (revGain) pan.connect(revGain); }
    else { masterG.connect(H.out); if (revGain) masterG.connect(revGain); }
    const local = [];
    RATIOS.forEach((r, idx) => {
      const partialF = freq * r;
      if (partialF > 9000) return;
      const amp = (0.05 / (idx + 1)) * vel;
      const beat = H.rnd(0.15, 0.7);
      const o1 = ctx.createOscillator(); o1.type='sine'; o1.frequency.value = partialF;
      const o2 = ctx.createOscillator(); o2.type='sine'; o2.frequency.value = partialF + beat;
      const g = ctx.createGain(); g.gain.value = 0;
      o1.connect(g); o2.connect(g); g.connect(masterG);
      const decay = dur * H.rnd(0.55, 1.0) / (1 + idx*0.35);
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(amp, when + 0.06 + idx*0.01);
      g.gain.setTargetAtTime(0.0001, when + 0.1, decay * 0.3);
      o1.start(when); o2.start(when);
      const endT = when + dur + 1.0;
      o1.stop(endT); o2.stop(endT);
      voices.push(o1, o2); local.push(o1, o2);
      o2.onended = () => {
        const i = voices.indexOf(o1); if (i>=0) voices.splice(i,1);
        const j = voices.indexOf(o2); if (j>=0) voices.splice(j,1);
        try{ o1.disconnect(); o2.disconnect(); }catch(e){}
      };
    });
  }

  function lowHalf(){ return H.pentat.slice(0, Math.ceil(H.pentat.length/2)); }

  return {
    onMotion(energy, info){
      if(!live) return;
      const now = H.t();
      // (a) soft swell of the bed: the only persistent node is the reverb send; ease it up
      // with motion (baseline 0.7) and back down to baseline when still.
      if(revGain){ revGain.gain.setTargetAtTime(0.7 + energy*0.35, now, 0.25); }
      if(energy <= 0.001) return;
      // (b) the occasional gentle struck partial on faster motion only.
      if(this._mLast === undefined) this._mLast = 0;
      const minGap = 1.4 - energy*0.7;              // sparse: ~0.7s..1.4s apart
      if(now - this._mLast < minGap) return;
      const p = Math.min(0.4, energy*0.5);         // gentle, only meaningful at higher energy
      if(Math.random() >= p) return;
      this._mLast = now;
      strike(H.choice(lowHalf()), now + 0.03, 0.35 + energy*0.4);
    },
    start(){
      const ctx = H.ctx;
      live = true;
      if (H.reverb){ revGain = ctx.createGain(); revGain.gain.value = 0.7; revGain.connect(H.reverb); }
      H.after(600, () => { if (live) strike(H.choice(lowHalf()), H.t()+0.05, 0.9); });
      H.every(H.rnd(9000, 15000), () => { if (!live) return; strike(H.choice(lowHalf()), H.t() + 0.05, H.rnd(0.6, 1.0)); });
    },
    stop(){
      const now = H.t();
      live = false;
      for (const v of voices.slice()){ try{ v.stop(now + 0.2); }catch(e){} }
      H.after(300, () => { for (const v of voices.slice()){ try{ v.disconnect(); }catch(e){} } try{ if(revGain){ revGain.disconnect(); revGain = null; } }catch(e){} });
    },
    onEvent(type, info){
      if (!live) return;
      if (type === 'select' || type === 'pair' || type === 'fly'){
        const f = (info && info.pitch) ? info.pitch : H.choice(lowHalf());
        strike(f, H.t() + 0.02, type === 'fly' ? 0.5 : 0.75);
      }
    }
  };
}

function makeMusicBox(H){
  const voices = [];
  let revGain, live=false;

  function pluck(freq, when, vel){
    const ctx = H.ctx;
    const dur = H.rnd(1.6, 2.6);
    const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    const g = ctx.createGain(); g.gain.value = 0;
    if (pan){ pan.pan.value = H.rnd(-0.5,0.5); g.connect(pan); pan.connect(H.out); if (revGain) pan.connect(revGain); }
    else { g.connect(H.out); if (revGain) g.connect(revGain); }
    const partials = [ [1, 1.0], [2, 0.32], [3.01, 0.14], [4.7, 0.06] ];
    const oscs = [];
    partials.forEach(([mult, a]) => {
      const f = freq * mult;
      if (f > 11000) return;
      const o = ctx.createOscillator();
      o.type = mult === 1 ? 'triangle' : 'sine';
      o.frequency.value = f;
      const og = ctx.createGain(); og.gain.value = a;
      o.connect(og).connect(g);
      oscs.push(o);
    });
    const peak = 0.05 * vel;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(peak, when + 0.006);
    g.gain.setTargetAtTime(0.0001, when + 0.012, dur * 0.18);
    const endT = when + dur + 0.2;
    for (const o of oscs){ o.start(when); o.stop(endT); voices.push(o); }
    const last = oscs[oscs.length-1];
    if (last) last.onended = () => {
      for (const o of oscs){ const k=voices.indexOf(o); if(k>=0) voices.splice(k,1); try{ o.disconnect(); }catch(e){} }
    };
  }

  function phrase(){
    const n = H.irnd(1, 3);
    let t = H.t() + 0.03;
    for (let i=0;i<n;i++){
      pluck(H.choice(H.pentat), t, H.rnd(0.55, 1.0));
      t += H.rnd(0.28, 0.7);
    }
  }

  return {
    onMotion(energy, info){
      if(!live) return;
      const now = H.t();
      // (a) lift the reverb tail slightly while the cylinder "turns", back to baseline (0.45) at rest.
      if(revGain){ revGain.gain.setTargetAtTime(0.45 + energy*0.25, now, 0.2); }
      if(energy <= 0.001) return;
      // (b) sparse plinks of the existing pluck, like the cylinder turning faster.
      if(this._mLast === undefined) this._mLast = 0;
      const minGap = 0.45 - energy*0.32;           // faster motion => tighter plinks (~0.13s..0.45s)
      if(now - this._mLast < minGap) return;
      const p = Math.min(0.6, 0.1 + energy*0.7);   // probability cap keeps it sparse
      if(Math.random() >= p) return;
      this._mLast = now;
      pluck(H.choice(H.pentat), now + 0.01, H.rnd(0.4, 0.45 + energy*0.45));
    },
    start(){
      const ctx = H.ctx;
      live = true;
      if (H.reverb){ revGain = ctx.createGain(); revGain.gain.value = 0.45; revGain.connect(H.reverb); }
      H.after(500, () => { if (live) phrase(); });
      H.every(H.rnd(4500, 8000), () => { if (!live) return; if (Math.random() < 0.9) phrase(); });
    },
    stop(){
      const now = H.t();
      live = false;
      for (const v of voices.slice()){ try{ v.stop(now + 0.15); }catch(e){} }
      H.after(230, () => { for (const v of voices.slice()){ try{ v.disconnect(); }catch(e){} } try{ if(revGain){ revGain.disconnect(); revGain = null; } }catch(e){} });
    },
    onEvent(type, info){
      if (!live) return;
      if (type === 'select' || type === 'fly' || type === 'cousins'){
        const f = (info && info.pitch) ? info.pitch : H.choice(H.pentat);
        pluck(f, H.t() + 0.01, type === 'fly' ? 0.6 : 0.85);
      }
    }
  };
}

function makeWoodClacks(H){
  const voices = [];
  let revGain, live=false;
  const woodPitches = [196, 220, 247, 262, 294, 330, 392];

  function clack(freq, when, vel){
    const ctx = H.ctx;
    const dur = H.rnd(0.12, 0.28);
    const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    const g = ctx.createGain(); g.gain.value = 0;
    const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=H.rnd(4,9);
    if (pan){ pan.pan.value = H.rnd(-0.6,0.6); g.connect(pan); pan.connect(H.out); if (revGain) pan.connect(revGain); }
    else { g.connect(H.out); if (revGain) g.connect(revGain); }
    const o = ctx.createOscillator(); o.type='sine'; o.frequency.value=freq;
    const og = ctx.createGain(); og.gain.value=0;
    o.connect(og).connect(g);
    const noise = H.noiseSource();
    const ng = ctx.createGain(); ng.gain.value=0;
    noise.connect(bp).connect(ng).connect(g);
    const peak = 0.07 * vel;
    og.gain.setValueAtTime(0, when);
    og.gain.linearRampToValueAtTime(peak, when + 0.003);
    og.gain.setTargetAtTime(0.0001, when + 0.005, dur * 0.25);
    ng.gain.setValueAtTime(0, when);
    ng.gain.linearRampToValueAtTime(peak * 0.8, when + 0.002);
    ng.gain.setTargetAtTime(0.0001, when + 0.004, dur * 0.15);
    const endT = when + dur + 0.1;
    o.start(when); o.stop(endT);
    noise.start(when); noise.stop(endT);
    voices.push(o, noise);
    o.onended = () => {
      const i = voices.indexOf(o); if(i>=0) voices.splice(i,1);
      const j = voices.indexOf(noise); if(j>=0) voices.splice(j,1);
      try{ o.disconnect(); noise.disconnect(); }catch(e){}
    };
  }

  return {
    onMotion(energy, info){
      if(!live) return;
      const now = H.t();
      // (a) nudge the reverb send with motion (baseline 0.3), restored when still.
      if(revGain){ revGain.gain.setTargetAtTime(0.3 + energy*0.3, now, 0.15); }
      if(energy <= 0.001) return;
      // (b) a quicker clatter of the existing clack, density scaling with energy.
      if(this._mLast === undefined) this._mLast = 0;
      const minGap = 0.18 - energy*0.14;           // faster motion => tighter clatter (~0.04s..0.18s)
      if(now - this._mLast < minGap) return;
      const p = Math.min(0.8, 0.15 + energy*0.85);
      if(Math.random() >= p) return;
      this._mLast = now;
      clack(H.choice(woodPitches), now + 0.01, H.rnd(0.4, 0.4 + energy*0.4));
      // occasional quick double-tap on stronger motion, still bounded (one extra at most)
      if(energy > 0.45 && Math.random() < energy*0.5){
        clack(H.choice(woodPitches), now + 0.01 + H.rnd(0.03, 0.08), H.rnd(0.3, 0.5));
      }
    },
    start(){
      const ctx = H.ctx;
      live = true;
      if (H.reverb){ revGain = ctx.createGain(); revGain.gain.value = 0.3; revGain.connect(H.reverb); }
      H.after(400, () => { if (live) clack(H.choice(woodPitches), H.t()+0.02, 0.8); });
      H.every(H.rnd(1400, 2600), () => {
        if (!live) return;
        clack(H.choice(woodPitches), H.t() + 0.02, H.rnd(0.5, 0.9));
        if (Math.random() < 0.3) H.after(H.rnd(140, 320), () => { if (live) clack(H.choice(woodPitches), H.t()+0.01, H.rnd(0.4,0.7)); });
      });
    },
    stop(){
      const now = H.t();
      live = false;
      for (const v of voices.slice()){ try{ v.stop(now + 0.08); }catch(e){} }
      H.after(160, () => { for (const v of voices.slice()){ try{ v.disconnect(); }catch(e){} } try{ if(revGain){ revGain.disconnect(); revGain = null; } }catch(e){} });
    },
    onEvent(type, info){
      if (!live) return;
      if (type === 'select' || type === 'fly' || type === 'pair'){
        clack(H.choice(woodPitches), H.t() + 0.01, 0.7);
      }
    }
  };
}

function makeRain(H){
  let started=false;
  // persistent bed nodes
  let bedSrc=null, bedHP=null, bedLP=null, bedGain=null;
  // a slow LFO to make the rain breathe a little
  let swellLFO=null, swellGain=null;
  // track scheduled droplet nodes so we can stop them on teardown
  const drops=new Set();
  function dropletPing(){
    if(!started) return;
    const ctx=H.ctx, now=H.t();
    const src=H.noiseSource();
    const bp=ctx.createBiquadFilter();
    bp.type='bandpass';
    bp.frequency.value=H.rnd(1400,4200);
    bp.Q.value=H.rnd(6,14);
    const g=ctx.createGain();
    g.gain.value=0;
    src.connect(bp); bp.connect(g); g.connect(H.out);
    // gentle send to reverb for a touch of space
    try{ const s=ctx.createGain(); s.gain.value=0.06; g.connect(s); s.connect(H.reverb); }catch(e){}
    const peak=H.rnd(0.012,0.05);
    const dur=H.rnd(0.04,0.14);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(peak, now+0.003);
    g.gain.exponentialRampToValueAtTime(0.0005, now+dur);
    src.start(now);
    const end=now+dur+0.03;
    src.stop(end);
    drops.add(src);
    src.onended=()=>{ try{src.disconnect();}catch(e){} try{bp.disconnect();}catch(e){} try{g.disconnect();}catch(e){} drops.delete(src); };
  }
  return {
    onMotion(energy, info){
      if(!started) return;
      const e=Math.max(0, Math.min(1, energy));
      const now=H.t();
      // (a) ramp the persistent bed from its calm baseline (0.07) up toward a downpour
      // with energy; when energy returns to 0 it eases straight back to 0.07.
      if(bedGain){
        const target=0.07 + e*0.16; // calm bed -> shower
        bedGain.gain.setTargetAtTime(target, now, 0.18);
      }
      // (b) increase droplet density: pitter-patter -> shower, gated by a per-call
      // probability proportional to energy with a firm cap, so no unbounded bursts.
      const p=Math.min(0.55, e*e*0.7); // squared so gentle motion stays sparse
      if(Math.random()<p) dropletPing();
    },
    start(){
      const ctx=H.ctx, now=H.t();
      started=true;
      // --- steady rain bed ---
      bedSrc=H.noiseSource();
      bedHP=ctx.createBiquadFilter();
      bedHP.type='highpass'; bedHP.frequency.value=900; bedHP.Q.value=0.7;
      bedLP=ctx.createBiquadFilter();
      bedLP.type='lowpass'; bedLP.frequency.value=7000; bedLP.Q.value=0.5;
      bedGain=ctx.createGain(); bedGain.gain.value=0;
      bedSrc.connect(bedHP); bedHP.connect(bedLP); bedLP.connect(bedGain); bedGain.connect(H.out);
      bedSrc.start(now);
      // slow swell so the downpour gently waxes and wanes
      swellLFO=ctx.createOscillator();
      swellLFO.type='sine'; swellLFO.frequency.value=0.05;
      swellGain=ctx.createGain(); swellGain.gain.value=0.018;
      swellLFO.connect(swellGain); swellGain.connect(bedGain.gain);
      swellLFO.start(now);
      // ramp the bed up smoothly
      bedGain.gain.setTargetAtTime(0.07, now, 1.2);
      // schedule droplets (jittered repeating)
      H.every(110, dropletPing);
    },
    stop(){
      started=false;
      const now=H.t();
      if(bedGain){ bedGain.gain.cancelScheduledValues(now); bedGain.gain.setTargetAtTime(0.0001, now, 0.06); }
      const stopAt=now+0.25;
      if(bedSrc){ try{bedSrc.stop(stopAt);}catch(e){} }
      if(swellLFO){ try{swellLFO.stop(stopAt);}catch(e){} }
      H.after(300,()=>{
        [bedSrc,bedHP,bedLP,bedGain,swellLFO,swellGain].forEach(n=>{ if(n){ try{n.disconnect();}catch(e){} } });
        bedSrc=bedHP=bedLP=bedGain=swellLFO=swellGain=null;
      });
      // stop any in-flight droplets quickly
      drops.forEach(src=>{ try{src.stop(now+0.1);}catch(e){} });
    },
    onEvent(type,info){
      if(!started) return;
      // a small cluster of brighter droplets as a flavor accent
      if(type==='select'||type==='fly'||type==='pair'){
        const n=H.irnd(2,4);
        for(let i=0;i<n;i++) H.after(i*H.rnd(20,70), dropletPing);
      }
    }
  };
}

function makeSeaShore(H){
  let started=false;
  let waveSrc=null, waveLP=null, waveLP2=null, waveGain=null;
  let lfo=null, lfoGain=null, lfoBias=null;
  let foamSrc=null, foamHP=null, foamGain=null;
  const bursts=new Set();
  function foamSwell(){
    if(!started) return;
    const ctx=H.ctx, now=H.t();
    const src=H.noiseSource();
    const hp=ctx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=H.rnd(2500,4500); hp.Q.value=0.6;
    const g=ctx.createGain(); g.gain.value=0;
    src.connect(hp); hp.connect(g); g.connect(H.out);
    const peak=H.rnd(0.01,0.028);
    const up=H.rnd(0.6,1.4), hold=H.rnd(0.4,1.0), down=H.rnd(1.5,3.0);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(peak, now+up);
    g.gain.setValueAtTime(peak, now+up+hold);
    g.gain.linearRampToValueAtTime(0.0001, now+up+hold+down);
    src.start(now);
    const end=now+up+hold+down+0.1;
    src.stop(end);
    bursts.add(src);
    src.onended=()=>{ try{src.disconnect();}catch(e){} try{hp.disconnect();}catch(e){} try{g.disconnect();}catch(e){} bursts.delete(src); };
  }
  return {
    onMotion(energy, info){
      if(!started) return;
      const e=Math.max(0, Math.min(1, energy));
      const now=H.t();
      // (a) bigger wave swell: lift the persistent bed bias above its 0.055 baseline
      // and deepen the existing swell LFO so waves heave harder with motion.
      if(lfoBias){ lfoBias.offset.setTargetAtTime(0.055 + e*0.11, now, 0.4); }
      if(lfoGain){ lfoGain.gain.setTargetAtTime(0.045 + e*0.05, now, 0.4); }
      // (b) more foam hiss: trigger the existing foamSwell() one-shot at a
      // probability-gated rate. foamSwell tails are long (~3-5s), so cap low.
      const p=Math.min(0.06, e*e*0.09);
      if(Math.random()<p) foamSwell();
    },
    start(){
      const ctx=H.ctx, now=H.t();
      started=true;
      // --- main surf wash: noise -> two low passes for a soft 'pink' roar ---
      waveSrc=H.noiseSource();
      waveLP=ctx.createBiquadFilter(); waveLP.type='lowpass'; waveLP.frequency.value=900; waveLP.Q.value=0.4;
      waveLP2=ctx.createBiquadFilter(); waveLP2.type='lowpass'; waveLP2.frequency.value=1600; waveLP2.Q.value=0.3;
      waveGain=ctx.createGain(); waveGain.gain.value=0;
      waveSrc.connect(waveLP); waveLP.connect(waveLP2); waveLP2.connect(waveGain); waveGain.connect(H.out);
      // light reverb send for depth
      try{ const s=ctx.createGain(); s.gain.value=0.12; waveGain.connect(s); s.connect(H.reverb); }catch(e){}
      waveSrc.start(now);
      // --- slow swell LFO: waves in and out (~12-16s period) ---
      lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.075;
      lfoGain=ctx.createGain(); lfoGain.gain.value=0.045; // depth of the swell
      lfoBias=ctx.createConstantSource(); lfoBias.offset.value=0.055; // baseline level
      lfo.connect(lfoGain); lfoGain.connect(waveGain.gain); lfoBias.connect(waveGain.gain);
      lfo.start(now); lfoBias.start(now);
      // gently fade the whole bed in by ramping the bias
      lfoBias.offset.setValueAtTime(0.0001, now);
      lfoBias.offset.setTargetAtTime(0.055, now, 1.5);
      // also sweep the lowpass with the swell for a sense of motion
      waveLP2.frequency.setValueAtTime(1200, now);
      // occasional foam hiss
      H.every(7000, foamSwell);
    },
    stop(){
      started=false;
      const now=H.t();
      if(lfoBias){ lfoBias.offset.cancelScheduledValues(now); lfoBias.offset.setTargetAtTime(0.0001, now, 0.08); }
      if(lfoGain){ lfoGain.gain.setTargetAtTime(0.0001, now, 0.08); }
      const stopAt=now+0.3;
      [waveSrc,lfo,lfoBias].forEach(n=>{ if(n){ try{n.stop(stopAt);}catch(e){} } });
      H.after(360,()=>{
        [waveSrc,waveLP,waveLP2,waveGain,lfo,lfoGain,lfoBias].forEach(n=>{ if(n){ try{n.disconnect();}catch(e){} } });
        waveSrc=waveLP=waveLP2=waveGain=lfo=lfoGain=lfoBias=null;
      });
      bursts.forEach(src=>{ try{src.stop(now+0.15);}catch(e){} });
    },
    onEvent(type,info){
      if(!started) return;
      // an extra wave/foam accent on interaction
      if(type==='fly'||type==='pair'||type==='cousins'||type==='select') foamSwell();
    }
  };
}

function makeBrook(H){
  let started=false;
  let bedSrc=null, bedBP=null, bedGain=null;
  let wobLFO=null, wobGain=null;
  let hissSrc=null, hissHP=null, hissGain=null;
  const bubbles=new Set();
  function bubble(){
    if(!started) return;
    const ctx=H.ctx, now=H.t();
    const osc=ctx.createOscillator();
    osc.type='sine';
    const f0=H.rnd(500,1700);
    const f1=f0*H.rnd(1.3,2.2); // upward glide = classic water 'bloop'
    osc.frequency.setValueAtTime(f0, now);
    osc.frequency.exponentialRampToValueAtTime(f1, now+H.rnd(0.05,0.12));
    const g=ctx.createGain(); g.gain.value=0;
    osc.connect(g); g.connect(H.out);
    const peak=H.rnd(0.012,0.04);
    const dur=H.rnd(0.08,0.2);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(peak, now+0.006);
    g.gain.exponentialRampToValueAtTime(0.0004, now+dur);
    osc.start(now);
    const end=now+dur+0.03;
    osc.stop(end);
    bubbles.add(osc);
    osc.onended=()=>{ try{osc.disconnect();}catch(e){} try{g.disconnect();}catch(e){} bubbles.delete(osc); };
  }
  return {
    onMotion(energy, info){
      if(!started) return;
      const e=Math.max(0, Math.min(1, energy));
      const now=H.t();
      // (a) brighter, fuller flow: lift the persistent beds above their baselines
      // (bed 0.05, hiss 0.012) and open the bandpass centre (baseline 1100) so the
      // brook brightens and quickens under the hand; all ease back when still.
      if(bedGain){ bedGain.gain.setTargetAtTime(0.05 + e*0.05, now, 0.25); }
      if(hissGain){ hissGain.gain.setTargetAtTime(0.012 + e*0.03, now, 0.25); }
      if(bedBP){ bedBP.frequency.setTargetAtTime(1100 + e*900, now, 0.3); }
      // (b) more burbles: trigger the existing bubble() one-shot at an
      // energy-proportional, probability-gated rate with a firm cap.
      const p=Math.min(0.5, e*e*0.65);
      if(Math.random()<p) bubble();
    },
    start(){
      const ctx=H.ctx, now=H.t();
      started=true;
      // --- burbling band-passed noise bed ---
      bedSrc=H.noiseSource();
      bedBP=ctx.createBiquadFilter();
      bedBP.type='bandpass'; bedBP.frequency.value=1100; bedBP.Q.value=1.4;
      bedGain=ctx.createGain(); bedGain.gain.value=0;
      bedSrc.connect(bedBP); bedBP.connect(bedGain); bedGain.connect(H.out);
      bedSrc.start(now);
      // wobble the bandpass centre for a living, burbling motion
      wobLFO=ctx.createOscillator(); wobLFO.type='sine'; wobLFO.frequency.value=0.6;
      wobGain=ctx.createGain(); wobGain.gain.value=450;
      wobLFO.connect(wobGain); wobGain.connect(bedBP.frequency);
      wobLFO.start(now);
      // a faint airy hiss layer (water surface)
      hissSrc=H.noiseSource();
      hissHP=ctx.createBiquadFilter(); hissHP.type='highpass'; hissHP.frequency.value=4000; hissHP.Q.value=0.6;
      hissGain=ctx.createGain(); hissGain.gain.value=0;
      hissSrc.connect(hissHP); hissHP.connect(hissGain); hissGain.connect(H.out);
      hissSrc.start(now);
      // ramp beds up
      bedGain.gain.setTargetAtTime(0.05, now, 1.0);
      hissGain.gain.setTargetAtTime(0.012, now, 1.2);
      // frequent water bubbles
      H.every(260, bubble);
    },
    stop(){
      started=false;
      const now=H.t();
      if(bedGain){ bedGain.gain.cancelScheduledValues(now); bedGain.gain.setTargetAtTime(0.0001, now, 0.07); }
      if(hissGain){ hissGain.gain.setTargetAtTime(0.0001, now, 0.07); }
      const stopAt=now+0.3;
      [bedSrc,wobLFO,hissSrc].forEach(n=>{ if(n){ try{n.stop(stopAt);}catch(e){} } });
      H.after(360,()=>{
        [bedSrc,bedBP,bedGain,wobLFO,wobGain,hissSrc,hissHP,hissGain].forEach(n=>{ if(n){ try{n.disconnect();}catch(e){} } });
        bedSrc=bedBP=bedGain=wobLFO=wobGain=hissSrc=hissHP=hissGain=null;
      });
      bubbles.forEach(osc=>{ try{osc.stop(now+0.1);}catch(e){} });
    },
    onEvent(type,info){
      if(!started) return;
      // a little run of bubbles, pitched toward info.pitch if provided
      if(type==='select'||type==='fly'||type==='pair'||type==='cousins'){
        const n=H.irnd(3,6);
        for(let i=0;i<n;i++) H.after(i*H.rnd(40,90), bubble);
      }
    }
  };
}

function makeWhales(H){
  let started=false;
  let droneOsc=null, droneLP=null, droneGain=null;
  let droneLFO=null, droneLFOGain=null;
  const calls=new Set();
  function whaleCall(baseHz){
    if(!started) return;
    const ctx=H.ctx, now=H.t();
    // pick a low fundamental from the lower pentatonic register
    let f0 = baseHz;
    if(!f0){
      const lows=H.pentat.filter(f=>f<200);
      const pool=lows.length?lows:H.pentat;
      f0=H.choice(pool);
      // drop an octave or two for whale-like lows
      f0=f0/H.choice([2,4]);
    }
    f0=Math.max(45, f0);
    const f1=f0*H.choice([1.5,2,2.5,3]); // glissando target (up)
    const osc=ctx.createOscillator();
    osc.type=H.choice(['sine','triangle']);
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=H.rnd(500,1100); lp.Q.value=0.6;
    const g=ctx.createGain(); g.gain.value=0;
    osc.connect(lp); lp.connect(g); g.connect(H.out);
    // strong reverb send for that cavernous ocean tail
    let sendG=null;
    try{ sendG=ctx.createGain(); sendG.gain.value=0.5; g.connect(sendG); sendG.connect(H.reverb); }catch(e){}
    // long swelling glissando: up then settle, sometimes a gentle dip
    const dur=H.rnd(4.5,8.5);
    osc.frequency.setValueAtTime(f0, now);
    osc.frequency.linearRampToValueAtTime(f1, now+dur*0.45);
    osc.frequency.linearRampToValueAtTime(f0*H.rnd(0.85,1.05), now+dur);
    const peak=H.rnd(0.05,0.1);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(peak, now+dur*0.4);
    g.gain.setValueAtTime(peak, now+dur*0.6);
    g.gain.linearRampToValueAtTime(0.0001, now+dur);
    // slight vibrato near the peak via filter? keep simple: subtle pitch handled above
    osc.start(now);
    const end=now+dur+0.2;
    osc.stop(end);
    calls.add(osc);
    osc.onended=()=>{ try{osc.disconnect();}catch(e){} try{lp.disconnect();}catch(e){} try{g.disconnect();}catch(e){} if(sendG){try{sendG.disconnect();}catch(e){}} calls.delete(osc); };
  }
  return {
    onMotion(energy, info){
      if(!started) return;
      const e=Math.max(0, Math.min(1, energy));
      const now=H.t();
      // (a) swell the persistent sub-drone above its 0.03 baseline so the ocean
      // depth pushes with motion, easing back to baseline when still.
      if(droneGain){ droneGain.gain.setTargetAtTime(0.03 + e*0.04, now, 0.6); }
      // (b) a longer/stronger call on big motion only: whaleCall() runs 4.5-8.5s,
      // so gate VERY sparsely and only above a high energy threshold so frames
      // never stack overlapping calls into a drone.
      if(e>0.6){
        const p=Math.min(0.012, (e-0.6)*0.03);
        if(Math.random()<p) whaleCall();
      }
    },
    start(){
      const ctx=H.ctx, now=H.t();
      started=true;
      // --- very quiet sub drone for oceanic depth ---
      droneOsc=ctx.createOscillator(); droneOsc.type='sine'; droneOsc.frequency.value=H.choice([55,61.74,49]);
      droneLP=ctx.createBiquadFilter(); droneLP.type='lowpass'; droneLP.frequency.value=200; droneLP.Q.value=0.5;
      droneGain=ctx.createGain(); droneGain.gain.value=0;
      droneOsc.connect(droneLP); droneLP.connect(droneGain); droneGain.connect(H.out);
      droneOsc.start(now);
      // slow breathing of the drone
      droneLFO=ctx.createOscillator(); droneLFO.type='sine'; droneLFO.frequency.value=0.04;
      droneLFOGain=ctx.createGain(); droneLFOGain.gain.value=0.01;
      droneLFO.connect(droneLFOGain); droneLFOGain.connect(droneGain.gain);
      droneLFO.start(now);
      droneGain.gain.setTargetAtTime(0.03, now, 2.0);
      // first call shortly after, then sparse repeats
      H.after(H.rnd(800,2500), ()=>whaleCall());
      H.every(14000, ()=>{ if(Math.random()<0.8) whaleCall(); });
    },
    stop(){
      started=false;
      const now=H.t();
      if(droneGain){ droneGain.gain.cancelScheduledValues(now); droneGain.gain.setTargetAtTime(0.0001, now, 0.1); }
      const stopAt=now+0.4;
      [droneOsc,droneLFO].forEach(n=>{ if(n){ try{n.stop(stopAt);}catch(e){} } });
      H.after(460,()=>{
        [droneOsc,droneLP,droneGain,droneLFO,droneLFOGain].forEach(n=>{ if(n){ try{n.disconnect();}catch(e){} } });
        droneOsc=droneLP=droneGain=droneLFO=droneLFOGain=null;
      });
      // let in-flight calls fade gracefully but cap their tails
      calls.forEach(osc=>{ try{osc.stop(now+0.6);}catch(e){} });
    },
    onEvent(type,info){
      if(!started) return;
      // a gentle call as flavor; use provided pitch (lowered) when present
      if(type==='select'||type==='fly'){
        let base=null;
        if(info&&typeof info.pitch==='number'&&info.pitch>0){ base=info.pitch; while(base>180) base/=2; base=Math.max(45,base); }
        H.after(H.rnd(120,400), ()=>whaleCall(base));
      }
    }
  };
}

function makeFireplace(H){
  var nodes = [];      // long-lived nodes to disconnect
  var sources = [];    // bufferSources/oscillators to stop
  var bedGain, bed, lp, lfo, lfoGain, hum;
  var running = false;

  function mkCrackle(when, intensity){
    // very short filtered noise burst
    var src = H.noiseSource();
    var hp = H.ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = H.rnd(900, 2600);
    var bp = H.ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = H.rnd(1200, 4200);
    bp.Q.value = H.rnd(0.6, 2.2);
    var g = H.ctx.createGain();
    g.gain.value = 0.0001;
    src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(H.out);
    var peak = 0.05 * intensity;
    var dur = H.rnd(0.012, 0.06);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.linearRampToValueAtTime(peak, when + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0008, when + dur);
    g.gain.linearRampToValueAtTime(0.0, when + dur + 0.02);
    src.start(when);
    var end = when + dur + 0.05;
    src.stop(end);
    src.onended = function(){
      try { src.disconnect(); hp.disconnect(); bp.disconnect(); g.disconnect(); } catch(e){}
      var i = sources.indexOf(src); if(i>=0) sources.splice(i,1);
    };
    sources.push(src);
  }

  return {
    onMotion(energy, info){
      if(!running) return;
      var now = H.t();
      var e = energy < 0 ? 0 : (energy > 1 ? 1 : energy);
      // (a) flare the warm bed up while moving — stoking the fire — then settle back to 0.11
      try{
        bedGain.gain.cancelScheduledValues(now);
        bedGain.gain.setTargetAtTime(0.11 + 0.09 * e, now, 0.12);
      }catch(err){}
      // open the lowpass a touch so the flare gets brighter/roarier, settling back to 320
      try{
        lp.frequency.cancelScheduledValues(now);
        lp.frequency.setTargetAtTime(320 + 240 * e, now, 0.15);
      }catch(err){}
      // (b) extra crackle pops at a motion-driven rate, gated by time-since-last + probability
      if(this._mLast === undefined) this._mLast = 0;
      // minimum spacing shrinks as energy rises (≈90ms..18ms); never an unbounded burst
      var minGap = 0.09 - 0.072 * e;
      if(e > 0.02 && (now - this._mLast) >= minGap && Math.random() < (0.12 + 0.55 * e)){
        this._mLast = now;
        mkCrackle(now + H.rnd(0, 0.03), H.rnd(0.6, 1.0) + 0.5 * e);
      }
    },
    start(){
      running = true;
      var now = H.t();
      // --- warm roaring bed: brown-ish (heavily low-passed) noise ---
      bed = H.noiseSource();
      lp = H.ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 320;
      lp.Q.value = 0.5;
      var lp2 = H.ctx.createBiquadFilter();
      lp2.type = 'lowpass';
      lp2.frequency.value = 160;
      bedGain = H.ctx.createGain();
      bedGain.gain.value = 0.0001;
      bed.connect(lp); lp.connect(lp2); lp2.connect(bedGain); bedGain.connect(H.out);
      // slow flicker of the bed brightness/level
      lfo = H.ctx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.28;
      lfoGain = H.ctx.createGain();
      lfoGain.gain.value = 70;
      lfo.connect(lfoGain); lfoGain.connect(lp.frequency);
      // very faint low hum for body
      hum = H.ctx.createOscillator();
      hum.type = 'sine';
      hum.frequency.value = 58;
      var humGain = H.ctx.createGain();
      humGain.gain.value = 0.0001;
      hum.connect(humGain); humGain.connect(H.out);
      humGain.gain.setTargetAtTime(0.012, now, 1.2);

      bed.start(now);
      lfo.start(now);
      hum.start(now);
      sources.push(bed, lfo, hum);
      nodes.push(lp, lp2, bedGain, lfoGain, humGain);
      bedGain.gain.setTargetAtTime(0.11, now, 1.5);

      // sparse crackles
      H.every(150, function(){
        if(!running) return;
        var n = H.irnd(0, 2);
        var base = H.t();
        for(var i=0;i<n;i++){
          mkCrackle(base + H.rnd(0, 0.14), H.rnd(0.5, 1.0));
        }
      });
      // occasional bigger pop
      H.every(2600, function(){
        if(!running) return;
        if(H.rnd(0,1) < 0.6) mkCrackle(H.t() + H.rnd(0,0.05), H.rnd(1.2, 1.8));
      });
    },
    stop(){
      running = false;
      var now = H.t();
      try { bedGain.gain.cancelScheduledValues(now); bedGain.gain.setTargetAtTime(0.0001, now, 0.06); } catch(e){}
      // ramp down any hum gains via node list not tracked separately; stop after fade
      H.after(220, function(){
        for(var i=0;i<sources.length;i++){ try{ sources[i].stop(); }catch(e){} }
        for(var j=0;j<sources.length;j++){ try{ sources[j].disconnect(); }catch(e){} }
        for(var k=0;k<nodes.length;k++){ try{ nodes[k].disconnect(); }catch(e){} }
        sources = []; nodes = [];
      });
    },
    onEvent(type, info){
      if(!running) return;
      // a small flare-up of crackles on interaction
      if(type === 'select' || type === 'pair' || type === 'fly'){
        var base = H.t();
        var n = H.irnd(2, 4);
        for(var i=0;i<n;i++) mkCrackle(base + H.rnd(0, 0.2), H.rnd(0.7, 1.2));
      }
    }
  };
}

function makeGravel(H){
  var sources = [];
  var nodes = [];
  var floorGain, floor, floorLp;
  var running = false;

  function mkGrain(when, gain, lo, hi){
    var src = H.noiseSource();
    var bp = H.ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = H.rnd(lo, hi);
    bp.Q.value = H.rnd(1.5, 6);
    var g = H.ctx.createGain();
    g.gain.value = 0.0001;
    src.connect(bp); bp.connect(g); g.connect(H.out);
    var dur = H.rnd(0.008, 0.035);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.linearRampToValueAtTime(gain, when + 0.002);
    g.gain.exponentialRampToValueAtTime(0.0006, when + dur);
    g.gain.linearRampToValueAtTime(0.0, when + dur + 0.01);
    src.start(when);
    var end = when + dur + 0.04;
    src.stop(end);
    src.onended = function(){
      try{ src.disconnect(); bp.disconnect(); g.disconnect(); }catch(e){}
      var i = sources.indexOf(src); if(i>=0) sources.splice(i,1);
    };
    sources.push(src);
  }

  function crunchCluster(base, count, level){
    // a footstep-ish crunch: a tight burst of many small grains
    for(var i=0;i<count;i++){
      var t = base + H.rnd(0, 0.09);
      mkGrain(t, level * H.rnd(0.5, 1.0), 700, 4500);
    }
    // low thud body under the crunch
    mkGrain(base + H.rnd(0,0.02), level * 0.7, 120, 320);
  }

  return {
    onMotion(energy, info){
      if(!running) return;
      var now = H.t();
      var e = energy < 0 ? 0 : (energy > 1 ? 1 : energy);
      // (a) lift the dusty floor bed slightly while crunching, settling back to 0.018
      try{
        floorGain.gain.cancelScheduledValues(now);
        floorGain.gain.setTargetAtTime(0.018 + 0.022 * e, now, 0.12);
      }catch(err){}
      // (b) faster crunch of grains the harder you move — walking faster
      if(this._mLast === undefined) this._mLast = 0;
      // spacing shrinks with energy (≈110ms..22ms) so single steps become a rolling crunch
      var minGap = 0.11 - 0.088 * e;
      if(e > 0.02 && (now - this._mLast) >= minGap && Math.random() < (0.15 + 0.6 * e)){
        this._mLast = now;
        if(e > 0.55 && Math.random() < e){
          // fast motion: a footstep-ish crunch cluster (bounded count)
          crunchCluster(now + H.rnd(0, 0.03), H.irnd(4, 8), 0.04 + 0.04 * e);
        } else {
          // gentle motion: a few scattered settling grains
          var n = H.irnd(1, 3);
          for(var i=0;i<n;i++) mkGrain(now + H.rnd(0, 0.05), H.rnd(0.025, 0.06), 700, 5000);
        }
      }
    },
    start(){
      running = true;
      var now = H.t();
      // near-silent dusty floor texture so it's never dead silent
      floor = H.noiseSource();
      floorLp = H.ctx.createBiquadFilter();
      floorLp.type = 'lowpass';
      floorLp.frequency.value = 600;
      floorGain = H.ctx.createGain();
      floorGain.gain.value = 0.0001;
      floor.connect(floorLp); floorLp.connect(floorGain); floorGain.connect(H.out);
      floor.start(now);
      sources.push(floor);
      nodes.push(floorLp, floorGain);
      floorGain.gain.setTargetAtTime(0.018, now, 2.0);

      // sparse single grains (settling stones)
      H.every(400, function(){
        if(!running) return;
        var n = H.irnd(0, 3);
        var base = H.t();
        for(var i=0;i<n;i++) mkGrain(base + H.rnd(0,0.3), H.rnd(0.02, 0.06), 700, 5000);
      });
      // footstep-like crunch clusters, irregular spacing
      H.every(2400, function(){
        if(!running) return;
        if(H.rnd(0,1) < 0.7){
          crunchCluster(H.t() + H.rnd(0,0.1), H.irnd(6, 12), H.rnd(0.05, 0.09));
        }
      });
    },
    stop(){
      running = false;
      var now = H.t();
      try{ floorGain.gain.cancelScheduledValues(now); floorGain.gain.setTargetAtTime(0.0001, now, 0.06); }catch(e){}
      H.after(200, function(){
        for(var i=0;i<sources.length;i++){ try{ sources[i].stop(); }catch(e){} }
        for(var j=0;j<sources.length;j++){ try{ sources[j].disconnect(); }catch(e){} }
        for(var k=0;k<nodes.length;k++){ try{ nodes[k].disconnect(); }catch(e){} }
        sources = []; nodes = [];
      });
    },
    onEvent(type, info){
      if(!running) return;
      if(type === 'select' || type === 'fly' || type === 'pair'){
        // a single deliberate crunch underfoot
        crunchCluster(H.t() + H.rnd(0,0.05), H.irnd(5, 9), H.rnd(0.05, 0.08));
      }
    }
  };
}

function makeTrain(H){
  var sources = [];
  var nodes = [];
  var rumble, rumbleLp, rumbleGain, rumbleLfo, rumbleLfoGain;
  var running = false;
  var period = 0.62; // seconds per clack pair group (relaxing tempo)

  function mkThump(when, gain, freq){
    // body: short low-passed noise burst (wheel clack)
    var src = H.noiseSource();
    var lp = H.ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = freq;
    lp.Q.value = 0.7;
    var g = H.ctx.createGain();
    g.gain.value = 0.0001;
    src.connect(lp); lp.connect(g); g.connect(H.out);
    var dur = H.rnd(0.05, 0.09);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.linearRampToValueAtTime(gain, when + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0008, when + dur);
    g.gain.linearRampToValueAtTime(0.0, when + dur + 0.02);
    src.start(when);
    var end = when + dur + 0.06;
    src.stop(end);
    src.onended = function(){
      try{ src.disconnect(); lp.disconnect(); g.disconnect(); }catch(e){}
      var i = sources.indexOf(src); if(i>=0) sources.splice(i,1);
    };
    sources.push(src);
  }

  return {
    onMotion(energy, info){
      if(!running) return;
      var now = H.t();
      var e = energy < 0 ? 0 : (energy > 1 ? 1 : energy);
      // speed up the clack tempo with energy (shorter group period), settle back to 0.62
      period = 0.62 - 0.34 * e;
      // (a) swell the low rumble while moving, settling back to baseline 0.05
      try{
        rumbleGain.gain.cancelScheduledValues(now);
        rumbleGain.gain.setTargetAtTime(0.05 + 0.05 * e, now, 0.15);
      }catch(err){}
      // brighten the rumble a touch as it picks up speed, settling back to 140
      try{
        rumbleLp.frequency.cancelScheduledValues(now);
        rumbleLp.frequency.setTargetAtTime(140 + 90 * e, now, 0.2);
      }catch(err){}
      // (b) extra wheel clacks interleaved with the scheduled rhythm — clackety speeds up
      if(this._mLast === undefined) this._mLast = 0;
      // gap tracks the (shortened) period; faster motion => tighter clacks (≈0.34s..0.11s)
      var minGap = (period * 0.55) - 0.06 * e;
      if(e > 0.05 && (now - this._mLast) >= minGap && Math.random() < (0.2 + 0.6 * e)){
        this._mLast = now;
        var lvl = (0.05 + 0.025 * e);
        // a paired clack (wheel over rail joint), reusing mkThump's pitch range
        mkThump(now,        lvl,        H.rnd(180, 230));
        mkThump(now + 0.11, lvl * 0.85, H.rnd(160, 210));
      }
    },
    start(){
      running = true;
      var now = H.t();
      // continuous low rumble bed
      rumble = H.noiseSource();
      rumbleLp = H.ctx.createBiquadFilter();
      rumbleLp.type = 'lowpass';
      rumbleLp.frequency.value = 140;
      rumbleLp.Q.value = 0.5;
      rumbleGain = H.ctx.createGain();
      rumbleGain.gain.value = 0.0001;
      rumble.connect(rumbleLp); rumbleLp.connect(rumbleGain); rumbleGain.connect(H.out);
      // gentle sway of rumble level
      rumbleLfo = H.ctx.createOscillator();
      rumbleLfo.type = 'sine';
      rumbleLfo.frequency.value = 0.13;
      rumbleLfoGain = H.ctx.createGain();
      rumbleLfoGain.gain.value = 0.02;
      rumbleLfo.connect(rumbleLfoGain); rumbleLfoGain.connect(rumbleGain.gain);
      rumble.start(now);
      rumbleLfo.start(now);
      sources.push(rumble, rumbleLfo);
      nodes.push(rumbleLp, rumbleGain, rumbleLfoGain);
      rumbleGain.gain.setTargetAtTime(0.05, now, 2.0);

      // clackety-clack: each group = two close thumps (wheel over rail joint), then a gap
      H.every(1240, function(){
        if(!running) return;
        var base = H.t() + 0.02;
        var jitter = H.rnd(-0.02, 0.02);
        var p = period + jitter;
        // bogie pattern: clack-clack ... clack-clack
        var lvl = H.rnd(0.05, 0.075);
        mkThump(base,            lvl,            H.rnd(180, 230));
        mkThump(base + 0.11,     lvl * 0.85,     H.rnd(160, 210));
        mkThump(base + p,        lvl * 0.95,     H.rnd(180, 230));
        mkThump(base + p + 0.11, lvl * 0.8,      H.rnd(160, 210));
      });
    },
    stop(){
      running = false;
      var now = H.t();
      try{ rumbleGain.gain.cancelScheduledValues(now); rumbleGain.gain.setTargetAtTime(0.0001, now, 0.07); }catch(e){}
      H.after(220, function(){
        for(var i=0;i<sources.length;i++){ try{ sources[i].stop(); }catch(e){} }
        for(var j=0;j<sources.length;j++){ try{ sources[j].disconnect(); }catch(e){} }
        for(var k=0;k<nodes.length;k++){ try{ nodes[k].disconnect(); }catch(e){} }
        sources = []; nodes = [];
      });
    },
    onEvent(type, info){
      if(!running) return;
      if(type === 'select' || type === 'fly'){
        // a soft distant horn: short, gentle, low
        var osc = H.ctx.createOscillator();
        var osc2 = H.ctx.createOscillator();
        osc.type = 'sine'; osc2.type = 'sine';
        var f = info && info.pitch ? Math.max(110, Math.min(220, info.pitch/2)) : 150;
        osc.frequency.value = f;
        osc2.frequency.value = f * 1.5; // a soft fifth, two-tone horn
        var g = H.ctx.createGain();
        g.gain.value = 0.0001;
        osc.connect(g); osc2.connect(g); g.connect(H.out);
        // optional reverb send for distance
        if (H.reverb) { var sg = H.ctx.createGain(); sg.gain.value = 0.25; g.connect(sg); sg.connect(H.reverb); }
        var now = H.t();
        g.gain.setValueAtTime(0.0001, now);
        g.gain.linearRampToValueAtTime(0.03, now + 0.25);
        g.gain.setTargetAtTime(0.0001, now + 0.6, 0.4);
        osc.start(now); osc2.start(now);
        var end = now + 2.2;
        osc.stop(end); osc2.stop(end);
        sources.push(osc, osc2);
        osc.onended = function(){
          try{ osc.disconnect(); osc2.disconnect(); g.disconnect(); }catch(e){}
          var i = sources.indexOf(osc); if(i>=0) sources.splice(i,1);
          var j = sources.indexOf(osc2); if(j>=0) sources.splice(j,1);
        };
      }
    }
  };
}

function makeWindThunder(H){
  var sources = [];
  var nodes = [];
  var wind, windLp, windGain, gust1, gust1Gain, gust2, gust2Gain, hiss, hissBp, hissGain;
  var running = false;

  function mkThunder(when, level){
    // distant rumble swell: very low-passed noise with slow attack, long decay
    var src = H.noiseSource();
    var lp = H.ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = H.rnd(70, 130);
    lp.Q.value = 0.4;
    var lp2 = H.ctx.createBiquadFilter();
    lp2.type = 'lowpass';
    lp2.frequency.value = H.rnd(180, 300);
    var g = H.ctx.createGain();
    g.gain.value = 0.0001;
    src.connect(lp); lp.connect(lp2); lp2.connect(g); g.connect(H.out);
    // distance: send a copy into reverb (self-cleaning — disconnected in src.onended)
    var sg = null;
    if (H.reverb){ sg = H.ctx.createGain(); sg.gain.value = 0.5; g.connect(sg); sg.connect(H.reverb); }
    var attack = H.rnd(0.5, 1.4);
    var decay = H.rnd(2.5, 5.0);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.linearRampToValueAtTime(level, when + attack);
    g.gain.setTargetAtTime(0.0001, when + attack, decay * 0.4);
    // slow drift of the cutoff for a rolling rumble feel
    lp.frequency.setValueAtTime(lp.frequency.value, when);
    lp.frequency.linearRampToValueAtTime(H.rnd(50, 90), when + attack + decay);
    src.start(when);
    var end = when + attack + decay + 1.5;
    src.stop(end);
    src.onended = function(){
      try{ src.disconnect(); lp.disconnect(); lp2.disconnect(); g.disconnect(); }catch(e){}
      if(sg){ try{ sg.disconnect(); }catch(e){} }
      var i = sources.indexOf(src); if(i>=0) sources.splice(i,1);
    };
    sources.push(src);
  }

  return {
    onMotion(energy, info){
      if(!running) return;
      var now = H.t();
      var e = energy < 0 ? 0 : (energy > 1 ? 1 : energy);
      // (a) the wind gusts up with energy — louder, brighter, airier — settling to baselines
      try{
        windGain.gain.cancelScheduledValues(now);
        windGain.gain.setTargetAtTime(0.07 + 0.08 * e, now, 0.2);
      }catch(err){}
      try{
        windLp.frequency.cancelScheduledValues(now);
        windLp.frequency.setTargetAtTime(420 + 600 * e, now, 0.25);
      }catch(err){}
      try{
        hissGain.gain.cancelScheduledValues(now);
        hissGain.gain.setTargetAtTime(0.01 + 0.025 * e, now, 0.25);
      }catch(err){}
      // (b) an occasional distant rumble on big moves, via existing self-cleaning mkThunder
      if(this._mLast === undefined) this._mLast = 0;
      // only on strong sustained motion, hard-spaced so rumbles never pile up
      if(e > 0.6 && (now - this._mLast) >= 6.0 && Math.random() < (0.01 + 0.03 * (e - 0.6))){
        this._mLast = now;
        mkThunder(now + H.rnd(0.1, 0.6), 0.04 + 0.04 * e);
      }
    },
    start(){
      running = true;
      var now = H.t();
      // --- wind: low-passed noise with slow cutoff & level modulation ---
      wind = H.noiseSource();
      windLp = H.ctx.createBiquadFilter();
      windLp.type = 'lowpass';
      windLp.frequency.value = 420;
      windLp.Q.value = 0.7;
      windGain = H.ctx.createGain();
      windGain.gain.value = 0.0001;
      wind.connect(windLp); windLp.connect(windGain); windGain.connect(H.out);
      // gust LFO 1 -> cutoff
      gust1 = H.ctx.createOscillator();
      gust1.type = 'sine';
      gust1.frequency.value = 0.07;
      gust1Gain = H.ctx.createGain();
      gust1Gain.gain.value = 220;
      gust1.connect(gust1Gain); gust1Gain.connect(windLp.frequency);
      // gust LFO 2 -> level (slower)
      gust2 = H.ctx.createOscillator();
      gust2.type = 'sine';
      gust2.frequency.value = 0.05;
      gust2Gain = H.ctx.createGain();
      gust2Gain.gain.value = 0.025;
      gust2.connect(gust2Gain); gust2Gain.connect(windGain.gain);
      // faint airy hiss layer for top end
      hiss = H.noiseSource();
      hissBp = H.ctx.createBiquadFilter();
      hissBp.type = 'bandpass';
      hissBp.frequency.value = 1800;
      hissBp.Q.value = 0.5;
      hissGain = H.ctx.createGain();
      hissGain.gain.value = 0.0001;
      hiss.connect(hissBp); hissBp.connect(hissGain); hissGain.connect(H.out);

      wind.start(now);
      gust1.start(now);
      gust2.start(now);
      hiss.start(now);
      sources.push(wind, gust1, gust2, hiss);
      nodes.push(windLp, windGain, gust1Gain, gust2Gain, hissBp, hissGain);
      windGain.gain.setTargetAtTime(0.07, now, 2.5);
      hissGain.gain.setTargetAtTime(0.01, now, 3.0);

      // rare distant thunder
      H.every(14000, function(){
        if(!running) return;
        if(H.rnd(0,1) < 0.5){
          mkThunder(H.t() + H.rnd(0, 2.0), H.rnd(0.04, 0.08));
        }
      });
    },
    stop(){
      running = false;
      var now = H.t();
      try{ windGain.gain.cancelScheduledValues(now); windGain.gain.setTargetAtTime(0.0001, now, 0.08); }catch(e){}
      try{ hissGain.gain.cancelScheduledValues(now); hissGain.gain.setTargetAtTime(0.0001, now, 0.08); }catch(e){}
      H.after(240, function(){
        for(var i=0;i<sources.length;i++){ try{ sources[i].stop(); }catch(e){} }
        for(var j=0;j<sources.length;j++){ try{ sources[j].disconnect(); }catch(e){} }
        for(var k=0;k<nodes.length;k++){ try{ nodes[k].disconnect(); }catch(e){} }
        sources = []; nodes = [];
      });
    },
    onEvent(type, info){
      if(!running) return;
      // a gentle gust on interaction; on fly add a faint far thunder
      if(type === 'select' || type === 'pair' || type === 'cousins'){
        var now = H.t();
        try{
          windLp.frequency.cancelScheduledValues(now);
          var cur = windLp.frequency.value;
          windLp.frequency.setValueAtTime(cur, now);
          windLp.frequency.linearRampToValueAtTime(cur + H.rnd(180, 320), now + 1.5);
        }catch(e){}
      }
      if(type === 'fly'){
        if(H.rnd(0,1) < 0.5) mkThunder(H.t() + H.rnd(0.2, 1.0), H.rnd(0.03, 0.06));
      }
    }
  };
}

function makeBirdsong(H){
  const ctx = H.ctx;
  const master = ctx.createGain();
  master.gain.value = 0.0001;
  master.connect(H.out);

  const airSrc = H.noiseSource();
  const airHP  = ctx.createBiquadFilter();
  airHP.type = 'highpass'; airHP.frequency.value = 2200; airHP.Q.value = 0.6;
  const airLP  = ctx.createBiquadFilter();
  airLP.type = 'lowpass'; airLP.frequency.value = 7000;
  const airGain = ctx.createGain();
  airGain.gain.value = 0.0001;
  airSrc.connect(airHP).connect(airLP).connect(airGain).connect(master);

  const revSend = ctx.createGain();
  revSend.gain.value = 0.5;
  revSend.connect(H.reverb);

  let live = false;

  function chirp(freq, t0, dur, sweep, pan){
    if(!live) return;
    const car = ctx.createOscillator();
    car.type = 'sine';
    const f0 = freq;
    const fMid = freq * (1 + 0.18 * sweep);
    const fEnd = freq * (1 + 0.04 * sweep);
    car.frequency.setValueAtTime(f0, t0);
    car.frequency.linearRampToValueAtTime(fMid, t0 + dur*0.35);
    car.frequency.linearRampToValueAtTime(fEnd, t0 + dur);

    const mod = ctx.createOscillator();
    mod.type = 'sine';
    mod.frequency.value = H.rnd(40, 90);
    const modGain = ctx.createGain();
    modGain.gain.value = freq * H.rnd(0.05, 0.14);
    mod.connect(modGain).connect(car.frequency);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.0001, t0);
    env.gain.linearRampToValueAtTime(H.rnd(0.05, 0.11), t0 + 0.012);
    env.gain.setTargetAtTime(0.0001, t0 + dur*0.5, dur*0.4);

    const pn = ctx.createStereoPanner();
    pn.pan.value = pan;

    car.connect(env);
    env.connect(pn).connect(master);
    env.connect(revSend);

    car.start(t0); mod.start(t0);
    const tEnd = t0 + dur + 0.3;
    car.stop(tEnd); mod.stop(tEnd);
    car.onended = ()=>{ try{ car.disconnect(); mod.disconnect(); modGain.disconnect(); env.disconnect(); pn.disconnect(); }catch(e){} };
  }

  function phrase(){
    if(!live) return;
    const baseIdx = H.irnd(0, H.pentat.length - 1);
    const octaveUp = 2 + H.rnd(0, 1.5);
    const pan = H.rnd(-0.7, 0.7);
    const notes = H.irnd(1, 4);
    const sweep = H.choice([1, 1, -1]);
    let t = H.t() + 0.05;
    for(let i=0;i<notes;i++){
      const idx = Math.max(0, Math.min(H.pentat.length-1, baseIdx + H.irnd(-1, 2)));
      const freq = H.pentat[idx] * octaveUp;
      const dur = H.rnd(0.07, 0.16);
      chirp(freq, t, dur, sweep, pan);
      t += dur + H.rnd(0.02, 0.09);
    }
  }

  return {
    onMotion(energy, info){
    if(!live) return;
    const now = H.t();
    // raise the airy bed slightly with motion, settle to baseline (0.014) when still
    airGain.gain.cancelScheduledValues(now);
    airGain.gain.setTargetAtTime(0.014 + 0.02 * energy, now, 0.25);
    if(energy <= 0.001) return;
    // a flutter of extra chirps when moving (a flock startled into song),
    // rate-limited by energy-proportional probability + a min-interval throttle
    const minGap = 0.05 + 0.20 * (1 - energy); // 50ms..250ms between flutters
    if(this._mLast == null) this._mLast = 0;
    if(now - this._mLast < minGap) return;
    const p = Math.min(0.5, 0.55 * energy); // firm per-call cap
    if(H.rnd(0, 1) >= p) return;
    this._mLast = now;
    // stay in key: reuse the pentatonic table, lifted a couple octaves like phrase()
    const octaveUp = 2 + H.rnd(0, 1.5);
    const idx = H.irnd(0, H.pentat.length - 1);
    const freq = H.pentat[idx] * octaveUp;
    const sweep = H.choice([1, 1, -1]);
    chirp(freq, now + 0.03, H.rnd(0.07, 0.15), sweep, H.rnd(-0.7, 0.7));
  },
    start(){
      live = true;
      const now = H.t();
      airSrc.start(now);
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(0.0001, now);
      master.gain.linearRampToValueAtTime(0.9, now + 2.5);
      airGain.gain.setTargetAtTime(0.014, now, 2.0);
      H.every(4200, ()=>{ if(H.rnd(0,1) < 0.78) phrase(); });
      H.after(600, ()=>{ if(live) phrase(); });
    },
    stop(){
      const now = H.t();
      master.gain.cancelScheduledValues(now);
      master.gain.setTargetAtTime(0.0001, now, 0.06);
      airGain.gain.setTargetAtTime(0.0001, now, 0.06);
      live = false;
      const off = now + 0.25;
      try{ airSrc.stop(off); }catch(e){}
      H.after(400, ()=>{
        try{ airSrc.disconnect(); airHP.disconnect(); airLP.disconnect(); airGain.disconnect();
             revSend.disconnect(); master.disconnect(); }catch(e){}
      });
    },
    onEvent(type, info){
      if(!live) return;
      if(type === 'select' || type === 'fly'){
        const base = (info && info.pitch) ? info.pitch : H.choice(H.pentat);
        const freq = base * (type === 'fly' ? 3 : 2);
        chirp(freq, H.t() + 0.03, H.rnd(0.09, 0.15), 1, H.rnd(-0.4, 0.4));
      } else if(type === 'pair' || type === 'cousins'){
        const base = H.choice(H.pentat) * 2;
        chirp(base, H.t() + 0.03, 0.10, 1, -0.3);
        chirp(base * 1.2, H.t() + 0.22, 0.10, -1, 0.3);
      }
    }
  };
}

function makeLeaves(H){
  const ctx = H.ctx;
  const master = ctx.createGain();
  master.gain.value = 0.0001;
  master.connect(H.out);

  const loSrc = H.noiseSource();
  const loBP = ctx.createBiquadFilter();
  loBP.type = 'bandpass'; loBP.frequency.value = 600; loBP.Q.value = 0.7;
  const loGain = ctx.createGain();
  loGain.gain.value = 0.0001;
  loSrc.connect(loBP).connect(loGain).connect(master);

  const hiSrc = H.noiseSource();
  const hiBP = ctx.createBiquadFilter();
  hiBP.type = 'bandpass'; hiBP.frequency.value = 4200; hiBP.Q.value = 0.8;
  const hiGain = ctx.createGain();
  hiGain.gain.value = 0.0001;
  hiSrc.connect(hiBP).connect(hiGain).connect(master);

  const flutterSrc = H.noiseSource();
  const flutterLP = ctx.createBiquadFilter();
  flutterLP.type = 'lowpass'; flutterLP.frequency.value = 8;
  const flutterDepth = ctx.createGain();
  flutterDepth.gain.value = 0.012;
  flutterSrc.connect(flutterLP).connect(flutterDepth).connect(hiGain.gain);

  const breatheSrc = H.noiseSource();
  const breatheLP = ctx.createBiquadFilter();
  breatheLP.type = 'lowpass'; breatheLP.frequency.value = 0.35;
  const breatheDepth = ctx.createGain();
  breatheDepth.gain.value = 0.01;
  breatheSrc.connect(breatheLP).connect(breatheDepth).connect(loGain.gain);

  let live = false;

  function gust(){
    if(!live) return;
    const now = H.t();
    const amt = H.rnd(0.6, 1.0);
    hiGain.gain.cancelScheduledValues(now);
    hiGain.gain.setTargetAtTime(0.016 * amt, now, 0.4);
    hiGain.gain.setTargetAtTime(0.009, now + H.rnd(0.8, 1.6), 1.2);
    hiBP.frequency.cancelScheduledValues(now);
    hiBP.frequency.setTargetAtTime(H.rnd(3800, 5200), now, 0.5);
  }

  return {
    onMotion(energy, info){
    if(!live) return;
    const now = H.t();
    // rustle harder with energy: raise the high rustle bed and the low bed,
    // open the high bandpass; settle back to start() baselines when still.
    hiGain.gain.cancelScheduledValues(now);
    hiGain.gain.setTargetAtTime(0.009 + 0.03 * energy, now, 0.18);
    loGain.gain.cancelScheduledValues(now);
    loGain.gain.setTargetAtTime(0.022 + 0.012 * energy, now, 0.30);
    hiBP.frequency.cancelScheduledValues(now);
    hiBP.frequency.setTargetAtTime(4200 + 1600 * energy, now, 0.25);
  },
    start(){
      live = true;
      const now = H.t();
      loSrc.start(now); hiSrc.start(now); flutterSrc.start(now); breatheSrc.start(now);
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(0.0001, now);
      master.gain.linearRampToValueAtTime(0.9, now + 3.0);
      loGain.gain.setTargetAtTime(0.022, now, 2.0);
      hiGain.gain.setTargetAtTime(0.009, now, 2.5);
      H.every(7000, ()=>{ if(H.rnd(0,1) < 0.7) gust(); });
    },
    stop(){
      const now = H.t();
      master.gain.cancelScheduledValues(now);
      master.gain.setTargetAtTime(0.0001, now, 0.08);
      live = false;
      const off = now + 0.3;
      try{ loSrc.stop(off); hiSrc.stop(off); flutterSrc.stop(off); breatheSrc.stop(off); }catch(e){}
      H.after(450, ()=>{
        try{
          loSrc.disconnect(); loBP.disconnect(); loGain.disconnect();
          hiSrc.disconnect(); hiBP.disconnect(); hiGain.disconnect();
          flutterSrc.disconnect(); flutterLP.disconnect(); flutterDepth.disconnect();
          breatheSrc.disconnect(); breatheLP.disconnect(); breatheDepth.disconnect();
          master.disconnect();
        }catch(e){}
      });
    },
    onEvent(type, info){
      if(!live) return;
      if(type === 'select' || type === 'fly' || type === 'pair' || type === 'cousins'){
        gust();
      }
    }
  };
}

function makeCrickets(H){
  const ctx = H.ctx;
  const master = ctx.createGain();
  master.gain.value = 0.0001;
  master.connect(H.out);

  const droneA = ctx.createOscillator();
  const droneB = ctx.createOscillator();
  droneA.type = 'sawtooth'; droneB.type = 'sawtooth';
  droneA.frequency.value = 55;  droneB.frequency.value = 55;
  droneB.detune.value = 6;
  const droneLP = ctx.createBiquadFilter();
  droneLP.type = 'lowpass'; droneLP.frequency.value = 180; droneLP.Q.value = 0.5;
  const droneGain = ctx.createGain();
  droneGain.gain.value = 0.0001;
  droneA.connect(droneLP); droneB.connect(droneLP);
  droneLP.connect(droneGain).connect(master);

  const revSend = ctx.createGain();
  revSend.gain.value = 0.35;
  revSend.connect(H.reverb);

  let live = false;

  function trill(){
    if(!live) return;
    const t0 = H.t() + 0.02;
    const dur = H.rnd(0.6, 1.4);
    const freq = H.rnd(3600, 5200);
    const rate = H.rnd(22, 42);

    const car = ctx.createOscillator();
    car.type = 'triangle';
    car.frequency.value = freq;

    const trem = ctx.createOscillator();
    trem.type = 'sine';
    trem.frequency.value = rate;
    const tremDepth = ctx.createGain();
    tremDepth.gain.value = 0.5;

    const gate = ctx.createGain();
    gate.gain.value = 0.0;
    trem.connect(tremDepth).connect(gate.gain);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.0001, t0);
    env.gain.linearRampToValueAtTime(H.rnd(0.018, 0.03), t0 + 0.08);
    env.gain.setTargetAtTime(0.0001, t0 + dur - 0.2, 0.12);

    const pn = ctx.createStereoPanner();
    pn.pan.value = H.rnd(-0.8, 0.8);

    car.connect(gate).connect(env).connect(pn).connect(master);
    env.connect(revSend);

    const tEnd = t0 + dur + 0.25;
    car.start(t0); trem.start(t0);
    car.stop(tEnd); trem.stop(tEnd);
    car.onended = ()=>{ try{ car.disconnect(); trem.disconnect(); tremDepth.disconnect(); gate.disconnect(); env.disconnect(); pn.disconnect(); }catch(e){} };
  }

  return {
    onMotion(energy, info){
    if(!live) return;
    const now = H.t();
    // lift the warm drone bed a touch with motion, settle to baseline (0.02) when still
    droneGain.gain.cancelScheduledValues(now);
    droneGain.gain.setTargetAtTime(0.02 + 0.012 * energy, now, 0.30);
    if(energy <= 0.001) return;
    // trill faster/denser with energy, rate-limited by min-interval + capped probability
    const minGap = 0.18 + 0.55 * (1 - energy); // ~0.18s..0.73s between extra trills
    if(this._mLast == null) this._mLast = 0;
    if(now - this._mLast < minGap) return;
    const p = Math.min(0.4, 0.5 * energy);
    if(H.rnd(0, 1) >= p) return;
    this._mLast = now;
    trill();
  },
    start(){
      live = true;
      const now = H.t();
      droneA.start(now); droneB.start(now);
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(0.0001, now);
      master.gain.linearRampToValueAtTime(0.9, now + 3.0);
      droneGain.gain.setTargetAtTime(0.02, now, 3.0);
      H.every(900, ()=>{ if(H.rnd(0,1) < 0.85) trill(); });
      H.after(300, ()=>{ if(live) trill(); });
    },
    stop(){
      const now = H.t();
      master.gain.cancelScheduledValues(now);
      master.gain.setTargetAtTime(0.0001, now, 0.08);
      droneGain.gain.setTargetAtTime(0.0001, now, 0.08);
      live = false;
      const off = now + 0.3;
      try{ droneA.stop(off); droneB.stop(off); }catch(e){}
      H.after(450, ()=>{
        try{ droneA.disconnect(); droneB.disconnect(); droneLP.disconnect();
             droneGain.disconnect(); revSend.disconnect(); master.disconnect(); }catch(e){}
      });
    },
    onEvent(type, info){
      if(!live) return;
      if(type === 'select' || type === 'fly'){
        trill();
      }
    }
  };
}

function makeFrogs(H){
  const ctx = H.ctx;
  const master = ctx.createGain();
  master.gain.value = 0.0001;
  master.connect(H.out);

  const pondSrc = H.noiseSource();
  const pondLP = ctx.createBiquadFilter();
  pondLP.type = 'lowpass'; pondLP.frequency.value = 500; pondLP.Q.value = 0.4;
  const pondHP = ctx.createBiquadFilter();
  pondHP.type = 'highpass'; pondHP.frequency.value = 120;
  const pondGain = ctx.createGain();
  pondGain.gain.value = 0.0001;
  pondSrc.connect(pondHP).connect(pondLP).connect(pondGain).connect(master);

  const pondLfoSrc = H.noiseSource();
  const pondLfoLP = ctx.createBiquadFilter();
  pondLfoLP.type = 'lowpass'; pondLfoLP.frequency.value = 0.25;
  const pondLfoDepth = ctx.createGain();
  pondLfoDepth.gain.value = 0.006;
  pondLfoSrc.connect(pondLfoLP).connect(pondLfoDepth).connect(pondGain.gain);

  const revSend = ctx.createGain();
  revSend.gain.value = 0.5;
  revSend.connect(H.reverb);

  let live = false;

  function croak(){
    if(!live) return;
    const t0 = H.t() + 0.02;
    const dur = H.rnd(0.18, 0.34);
    const f0 = H.rnd(150, 240);

    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f0 * 1.15, t0);
    osc.frequency.exponentialRampToValueAtTime(f0 * 0.8, t0 + dur);

    const trem = ctx.createOscillator();
    trem.type = 'sine';
    trem.frequency.value = H.rnd(26, 40);
    const tremDepth = ctx.createGain();
    tremDepth.gain.value = 0.5;
    const gate = ctx.createGain();
    gate.gain.value = 0.5;
    trem.connect(tremDepth).connect(gate.gain);

    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = H.rnd(700, 1100); lp.Q.value = 4;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.0001, t0);
    env.gain.linearRampToValueAtTime(H.rnd(0.05, 0.085), t0 + 0.02);
    env.gain.setTargetAtTime(0.0001, t0 + dur*0.4, dur*0.35);

    const pn = ctx.createStereoPanner();
    pn.pan.value = H.rnd(-0.6, 0.6);

    osc.connect(gate).connect(lp).connect(env).connect(pn).connect(master);
    env.connect(revSend);

    const tEnd = t0 + dur + 0.3;
    osc.start(t0); trem.start(t0);
    osc.stop(tEnd); trem.stop(tEnd);
    osc.onended = ()=>{ try{ osc.disconnect(); trem.disconnect(); tremDepth.disconnect(); gate.disconnect(); lp.disconnect(); env.disconnect(); pn.disconnect(); }catch(e){} };
  }

  function maybeCroakSequence(){
    if(!live) return;
    croak();
    if(H.rnd(0,1) < 0.4){
      H.after(H.rnd(280, 520), ()=>{ if(live) croak(); });
    }
  }

  return {
    onMotion(energy, info){
    if(!live) return;
    const now = H.t();
    // raise the pond bed slightly with motion, settle to baseline (0.018) when still
    pondGain.gain.cancelScheduledValues(now);
    pondGain.gain.setTargetAtTime(0.018 + 0.01 * energy, now, 0.30);
    if(energy <= 0.001) return;
    // a few more croaks on motion, rate-limited (croaks are sparse by nature)
    const minGap = 0.30 + 1.0 * (1 - energy); // ~0.30s..1.30s between extra croaks
    if(this._mLast == null) this._mLast = 0;
    if(now - this._mLast < minGap) return;
    const p = Math.min(0.3, 0.4 * energy);
    if(H.rnd(0, 1) >= p) return;
    this._mLast = now;
    croak();
  },
    start(){
      live = true;
      const now = H.t();
      pondSrc.start(now); pondLfoSrc.start(now);
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(0.0001, now);
      master.gain.linearRampToValueAtTime(0.9, now + 3.0);
      pondGain.gain.setTargetAtTime(0.018, now, 3.0);
      H.every(3800, ()=>{ if(H.rnd(0,1) < 0.6) maybeCroakSequence(); });
      H.after(1200, ()=>{ if(live) croak(); });
    },
    stop(){
      const now = H.t();
      master.gain.cancelScheduledValues(now);
      master.gain.setTargetAtTime(0.0001, now, 0.08);
      pondGain.gain.setTargetAtTime(0.0001, now, 0.08);
      live = false;
      const off = now + 0.3;
      try{ pondSrc.stop(off); pondLfoSrc.stop(off); }catch(e){}
      H.after(450, ()=>{
        try{ pondSrc.disconnect(); pondHP.disconnect(); pondLP.disconnect(); pondGain.disconnect();
             pondLfoSrc.disconnect(); pondLfoLP.disconnect(); pondLfoDepth.disconnect();
             revSend.disconnect(); master.disconnect(); }catch(e){}
      });
    },
    onEvent(type, info){
      if(!live) return;
      if(type === 'select' || type === 'fly'){
        croak();
      }
    }
  };
}

function makePurr(H){
  let nodes=[];
  function track(n){ nodes.push(n); return n; }
  return {
    onMotion(energy,info){
      if(!this._sum) return;
      const t=H.t();
      // Motion = a deeper, fuller purr: swell the master purr gain above its
      // ~0.2 idle bed, then ease back to baseline when the view goes still.
      const e=Math.max(0,Math.min(1,energy));
      const base=0.2;
      const target=base + e*0.22;   // up to ~0.42 when moving fast
      this._sum.gain.setTargetAtTime(target, t, e>0.02 ? 0.18 : 0.6);
    },
    start(){
      const t=H.t();
      const sum=H.ctx.createGain(); sum.gain.value=0; // master purr gain (ramps up)
      sum.connect(H.out);
      const amGain=H.ctx.createGain(); amGain.gain.value=0.0;

      // Low carrier oscillators (~25 Hz fundamental + a touch of harmonic for warmth)
      [24.5,25.5,49].forEach((f,i)=>{
        const o=track(H.ctx.createOscillator());
        o.type='sine'; o.frequency.value=f;
        const g=H.ctx.createGain();
        g.gain.value = i===2 ? 0.18 : 0.5; // octave harmonic quieter
        o.connect(g); g.connect(amGain);
        o.start(t);
        nodes.push(g);
      });

      // Soft low-pass to keep it round and chest-like.
      const lp=H.ctx.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=180; lp.Q.value=0.5;
      amGain.connect(lp); lp.connect(sum);
      nodes.push(amGain,lp);

      // Amplitude modulation LFO ~26 Hz — the purr "motor".
      const lfo=track(H.ctx.createOscillator());
      lfo.type='sine'; lfo.frequency.value=26;
      const lfoDepth=H.ctx.createGain(); lfoDepth.gain.value=0.42;
      const lfoBias=H.ctx.createConstantSource(); track(lfoBias); lfoBias.offset.value=0.5;
      lfo.connect(lfoDepth); lfoDepth.connect(amGain.gain);
      lfoBias.connect(amGain.gain);
      lfo.start(t); lfoBias.start(t);
      nodes.push(lfoDepth);

      // A slightly faster modulation gives the purr its rough texture.
      const lfo2=track(H.ctx.createOscillator());
      lfo2.type='triangle'; lfo2.frequency.value=29;
      const lfo2Depth=H.ctx.createGain(); lfo2Depth.gain.value=0.12;
      lfo2.connect(lfo2Depth); lfo2Depth.connect(amGain.gain);
      lfo2.start(t);
      nodes.push(lfo2Depth);

      // A whisper of breath noise to feel alive.
      const breath=H.noiseSource(); track(breath);
      const bf=H.ctx.createBiquadFilter(); bf.type='bandpass'; bf.frequency.value=320; bf.Q.value=0.7;
      const bg=H.ctx.createGain(); bg.gain.value=0.0;
      breath.connect(bf); bf.connect(bg); bg.connect(sum);
      breath.start(t);
      bg.gain.setTargetAtTime(0.012, t, 2.0);
      nodes.push(bf,bg);

      // Slowly vary purr rate to feel organic (breathing in/out).
      H.every(5200, ()=>{
        const tt=H.t();
        const rate=H.rnd(24,28);
        lfo.frequency.setTargetAtTime(rate, tt, 1.5);
        lfo2.frequency.setTargetAtTime(rate+H.rnd(2.5,3.5), tt, 1.5);
        sum.gain.setTargetAtTime(H.rnd(0.16,0.24), tt, 2.2);
      });

      sum.gain.setTargetAtTime(0.2, t, 1.5);
      this._sum=sum;
      nodes.push(sum);
    },
    stop(){
      const t=H.t();
      if(this._sum){ this._sum.gain.setTargetAtTime(0.0001, t, 0.12); }
      nodes.forEach(n=>{ if(n.stop){ try{ n.stop(t+0.3); }catch(e){} } });
      const dead=nodes; nodes=[];
