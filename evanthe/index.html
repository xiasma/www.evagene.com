<!DOCTYPE html>
<html lang="en">
<head>

<meta property="og:title" content="Evanthe — an interactive Galaxy of Life" />

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Evanthe",
  "description": "A free, interactive 3D Galaxy of Life — an educational visualisation of taxonomic classification (domain to genus), by Evagene.",
  "url": "https://evagene.com/evanthe/",
  "applicationCategory": "EducationApplication",
  "operatingSystem": "Web browser",
  "isAccessibleForFree": true,
  "author": { "@type": "Organization", "name": "Evagene", "url": "https://evagene.com" }
}
</script>
<style>
  /* ============================================================
     Evagene — Galaxy of Life prototype fidget spinner.
     Dark "deep space" UI. Glassmorphism panels. Responsive HUD
     that collapses to bottom-sheets on narrow phones.
     ============================================================ */
  :root{
    --bg:#05060d;
    --glass:rgba(10,12,22,0.55);
    --glass-solid:rgba(10,14,24,0.82);
    --hair:rgba(255,255,255,0.09);
    --txt:#e8ecf6;
    --txt-dim:rgba(232,236,246,0.62);
    --txt-faint:rgba(232,236,246,0.40);
    --accent:#2ee6c8;
    --accent2:#9b6cff;
    --warm:#ffd9a0;
    --cyan:#7fe9ff;
    --radius:14px;
    --shadow:0 10px 40px rgba(0,0,0,0.45);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; width:100%; overflow:hidden; background:var(--bg); }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--txt);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    touch-action:none; /* we manage gestures via OrbitControls + pointer events */
  }
  #app{ position:fixed; inset:0; }
  canvas{ display:block; touch-action:none; }

  /* Radial vignette over the canvas to focus the eye on the galaxy. */
  #vignette{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background:radial-gradient(ellipse at 50% 48%,
        rgba(0,0,0,0) 40%, rgba(0,0,0,0.28) 78%, rgba(0,0,0,0.62) 100%);
  }

  /* HUD: full-screen overlay that DOES NOT capture pointer events,
     so orbit/pinch passes through. Only real controls re-enable them. */
  #hud{ position:fixed; inset:0; z-index:10; pointer-events:none; }
  #hud .ui{ pointer-events:auto; }

  /* --- Wordmark --- */
  #wordmark{
    position:absolute; top:max(14px, env(safe-area-inset-top)); left:16px;
    display:flex; align-items:center; gap:9px;
    font-size:clamp(13px,2.6vw,16px); font-weight:600; letter-spacing:0.3px;
    color:var(--txt); opacity:0.92;
    text-shadow:0 0 18px rgba(46,230,200,0.35);
    user-select:none;
  }
  #wordmark .logo{ height:30px; width:30px; border-radius:7px; flex:0 0 auto;
    box-shadow:0 0 16px rgba(80,140,255,0.35); }
  #wordmark .name{ font-weight:600; }
  #wordmark .dim{ color:var(--txt-dim); font-weight:400; }
  #wordmark .tag{ color:var(--txt-faint); font-weight:400; font-size:0.8em; }
  /* readable "by Evagene" text credit, with Evagene as a link */
  #wordmark .credit{ font-weight:400; font-size:13px; color:var(--txt-dim);
    letter-spacing:0.2px; text-shadow:none; }
  #wordmark .credit a{ pointer-events:auto; color:var(--accent); text-decoration:none; }
  #wordmark .credit a:hover{ text-decoration:underline; }
  /* Evagene logo badge in the top-right corner -> evagene.com */
  #evageneCorner{ pointer-events:auto; display:block; line-height:0; opacity:0.9;
    background:#fff; border-radius:8px; padding:4px 8px;
    box-shadow:0 4px 16px rgba(0,0,0,0.4); transition:opacity .2s ease, transform .15s ease; }
  #evageneCorner:hover{ opacity:1; transform:translateY(-1px); }
  #evageneCorner img{ height:22px; width:auto; display:block; }

  /* --- Top-right control cluster --- */
  #topbar{
    position:absolute; top:max(12px, env(safe-area-inset-top)); right:14px;
    display:flex; flex-direction:column; align-items:flex-end; gap:10px;
    max-width:min(46vw,360px);
  }
  .row{ display:flex; gap:8px; align-items:center; }

  /* Search */
  #searchWrap{ position:relative; }
  /* lift the search + its suggestions dropdown above the buttons/legend below it */
  #searchRow{ position:relative; z-index:60; }
  #search{
    width:clamp(150px,30vw,260px);
    background:var(--glass); color:var(--txt);
    border:1px solid var(--hair); border-radius:999px;
    padding:9px 14px; font-size:14px; outline:none;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    box-shadow:var(--shadow); transition:width .2s ease, border-color .2s ease;
  }
  #search:focus{ border-color:rgba(46,230,200,0.5); }
  #search::placeholder{ color:var(--txt-faint); }
  #results{
    position:absolute; z-index:60; top:calc(100% + 6px); right:0; width:min(320px,80vw);
    background:var(--glass-solid); border:1px solid var(--hair); border-radius:12px;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    box-shadow:var(--shadow); overflow:hidden; display:none;
    max-height:48vh; overflow-y:auto;
  }
  #results.show{ display:block; }
  .result{ padding:9px 13px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }
  .result:last-child{ border-bottom:none; }
  .result:hover,.result.active{ background:rgba(46,230,200,0.10); }
  .result .bn{ font-style:italic; font-size:13.5px; }
  .result .cn{ font-size:11.5px; color:var(--txt-dim); }

  /* Buttons + segmented control share a glass look */
  .btn{
    background:var(--glass); color:var(--txt); border:1px solid var(--hair);
    border-radius:999px; padding:8px 12px; font-size:13px; cursor:pointer;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    box-shadow:var(--shadow); min-height:38px; display:inline-flex;
    align-items:center; gap:6px; user-select:none; transition:background .15s;
  }
  .btn:hover{ background:rgba(255,255,255,0.10); }
  .btn:active{ transform:translateY(1px); }
  .btn.icon{ width:38px; justify-content:center; padding:8px; }

  .segmented{
    display:inline-flex; background:var(--glass); border:1px solid var(--hair);
    border-radius:999px; overflow:hidden; box-shadow:var(--shadow);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .segmented button{
    background:transparent; border:none; color:var(--txt-dim);
    padding:8px 14px; font-size:13px; cursor:pointer; min-height:38px;
  }
  .segmented button.on{ background:rgba(46,230,200,0.18); color:var(--txt); }

  /* Legend */
  #legend{
    background:var(--glass); border:1px solid var(--hair); border-radius:12px;
    padding:9px 11px; box-shadow:var(--shadow); max-width:230px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  #legend .lrow{ display:flex; align-items:center; gap:7px; font-size:11.5px;
    color:var(--txt-dim); margin:3px 0; }
  #legend .sw{ width:11px; height:11px; border-radius:3px; flex:0 0 auto;
    box-shadow:0 0 8px currentColor; }
  #ageBar{ height:11px; border-radius:6px; margin:5px 0 3px;
    background:linear-gradient(90deg,#2a1a55,#1d6e8e,#3fae6b,#e8c34a,#fff2cf); }
  #ageTicks{ display:flex; justify-content:space-between; font-size:10px; color:var(--txt-faint); }

  /* --- Info panels (bottom corners on desktop) --- */
  .panel{
    position:absolute; width:min(320px,42vw);
    background:var(--glass); border:1px solid var(--hair); border-radius:var(--radius);
    box-shadow:var(--shadow); backdrop-filter:blur(13px); -webkit-backdrop-filter:blur(13px);
    overflow:hidden; opacity:0; transform:translateY(10px);
    transition:opacity .25s ease, transform .25s ease;
  }
  .panel.show{ opacity:1; transform:translateY(0); }
  .panel .head{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 13px; cursor:pointer; user-select:none;
    border-bottom:1px solid var(--hair);
  }
  .panel .head h3{ margin:0; font-size:12px; font-weight:600; letter-spacing:0.6px;
    text-transform:uppercase; color:var(--txt-dim); }
  .panel .head .chev{ color:var(--txt-dim); transition:transform .2s; font-size:13px; }
  .panel.collapsed .head .chev{ transform:rotate(-90deg); }
  .panel .body{ padding:12px 13px; }
  .panel.collapsed .body{ display:none; }

  #selPanel{ left:16px; bottom:max(16px, env(safe-area-inset-bottom)); }
  #relPanel{ right:16px; bottom:max(16px, env(safe-area-inset-bottom)); }

  .bigname{ font-size:18px; font-weight:600; line-height:1.2; }
  .binom{ font-style:italic; font-size:14px; color:var(--accent); margin-top:2px; }
  .meta{ font-size:12.5px; color:var(--txt-dim); margin-top:8px; line-height:1.5; }
  .breadcrumb{ font-size:11.5px; color:var(--txt-faint); margin-top:6px; line-height:1.5;
    word-break:break-word; }
  .kv{ display:flex; gap:6px; margin-top:5px; font-size:12.5px; }
  .kv .k{ color:var(--txt-faint); min-width:74px; }
  .kv .v{ color:var(--txt); }
  .panel .actions{ display:flex; gap:8px; margin-top:11px; flex-wrap:wrap; }
  .panel .actions .btn{ box-shadow:none; }

  .relline{ font-size:13px; line-height:1.55; margin:4px 0; }
  .relline .em{ color:var(--warm); font-weight:600; }
  .relline .cy{ color:var(--cyan); font-weight:600; }
  .mya{ color:var(--accent); font-weight:600; }
  /* multi-select species basket */
  .selhead{ display:flex; justify-content:space-between; align-items:center;
    margin-bottom:7px; font-size:12px; color:var(--txt-dim); }
  .btn.tiny{ padding:4px 9px; min-height:0; font-size:11.5px; box-shadow:none; }
  .sellist{ max-height:34vh; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
  .selrow{ display:flex; align-items:center; gap:9px; padding:4px 2px;
    border-bottom:1px solid rgba(255,255,255,0.05); }
  .selrow:last-child{ border-bottom:none; }
  .selnm{ flex:1; min-width:0; display:flex; flex-direction:column; line-height:1.2; }
  .selnm .sc{ font-size:13px; color:var(--txt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .selnm .scsci{ font-style:italic; font-size:11px; color:var(--accent);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .selrow .wlink{ pointer-events:auto; font-size:11px; flex:0 0 auto; }
  .selrow .xbtn{ pointer-events:auto; flex:0 0 auto; background:transparent; border:none;
    color:var(--txt-faint); font-size:18px; line-height:1; cursor:pointer; padding:0 2px; }
  .selrow .xbtn:hover{ color:#ff8a8a; }
  .hinttext{ font-size:11px; color:var(--txt-faint); margin:8px 0 2px; }

  /* Controls hint (bottom-center, fades) */
  #hint{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:max(14px, env(safe-area-inset-bottom));
    font-size:11.5px; color:var(--txt-faint); text-align:center;
    background:rgba(5,6,13,0.4); padding:6px 14px; border-radius:999px;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    transition:opacity .6s ease; max-width:92vw; line-height:1.5;
  }
  #hint.hide{ opacity:0; }

  /* Floating 3D-anchored MRCA label */
  #mrcaLabel{
    position:absolute; z-index:9; pointer-events:none; display:none;
    transform:translate(-50%,-130%);
    background:rgba(40,30,10,0.55); border:1px solid rgba(255,217,160,0.5);
    color:var(--warm); font-size:11.5px; font-weight:600; padding:4px 9px;
    border-radius:8px; white-space:nowrap; box-shadow:0 0 18px rgba(255,200,120,0.3);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  #mrcaLabel .age{ color:#fff; font-weight:400; }

  /* Desktop hover tooltip: species + Wikipedia link */
  #hoverTip{ position:fixed; z-index:40; pointer-events:auto; display:none;
    max-width:280px; background:var(--glass-solid); border:1px solid var(--hair);
    border-radius:10px; padding:9px 12px; box-shadow:var(--shadow);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    font-size:13px; line-height:1.35; }
  #hoverTip.show{ display:block; }
  #hoverTip .ht-common{ font-weight:600; color:var(--txt); }
  #hoverTip .ht-sci{ font-style:italic; color:var(--accent); font-size:12.5px; margin-top:1px; }
  #hoverTip .ht-wiki, .wlink{ font-size:12.5px; color:var(--cyan);
    text-decoration:none; pointer-events:auto; }
  #hoverTip .ht-wiki{ display:inline-block; margin-top:6px; }
  #hoverTip .ht-wiki:hover, .wlink:hover{ text-decoration:underline; }

  /* Loading / error splash */
  #splash{
    position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; background:var(--bg);
    color:var(--txt); text-align:center; padding:24px; transition:opacity .8s ease;
  }
  #splash.hide{ opacity:0; pointer-events:none; }
  #splash .splash-logo{ width:96px; height:96px; border-radius:20px;
    box-shadow:0 0 44px rgba(80,140,255,0.45); }
  #splash.error .splash-logo{ display:none; }
  #splash .title{ font-size:20px; font-weight:600; letter-spacing:0.5px;
    text-shadow:0 0 24px rgba(46,230,200,0.5); }
  #splash .sub{ font-size:13px; color:var(--txt-dim); max-width:440px; line-height:1.6; }
  #splash .spinner{ width:34px; height:34px; border:3px solid rgba(255,255,255,0.12);
    border-top-color:var(--accent); border-radius:50%; animation:spin 0.9s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #splash.error .spinner{ display:none; }
  #splash.error .title{ color:#ff8a8a; text-shadow:none; }

  /* ---------- Narrow phone layout: panels become bottom sheets ---------- */
  @media (max-width:640px){
    #topbar{ max-width:none; left:14px; right:14px; align-items:stretch; }
    #search{ width:100%; }
    #searchWrap{ flex:1; }
    /* Both info panels become stacked bottom sheets so neither collides with
       the topbar/legend. relPanel sits at the very bottom; selPanel stacks
       directly above it using --relPanelH (kept in sync by JS). */
    .panel{ width:auto; left:8px !important; right:8px !important; max-height:40vh; }
    #relPanel{ z-index:11; top:auto !important;
      bottom:max(8px, env(safe-area-inset-bottom)) !important; }
    #selPanel{ z-index:12; top:auto !important;
      bottom:calc(max(8px, env(safe-area-inset-bottom)) + var(--relPanelH, 0px)) !important; }
    .panel .body{ max-height:30vh; overflow-y:auto; }
    /* Compact legend on phones: kingdom rows collapse to a single wrapping
       swatch strip so the topbar stops eating ~140px of vertical space. */
    #legend{ max-width:none; padding:7px 9px; }
    #legend.clade-compact{ display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center; }
    #legend.clade-compact > div:first-child{ flex-basis:100%; margin-bottom:2px; }
    #legend.clade-compact .lrow{ margin:0; font-size:10.5px; gap:5px; }
    #wordmark .tag{ display:none; }
    /* keep the brand visible above the full-width search on phones */
    #wordmark{ z-index:12; }
    #topbar{ top:calc(max(12px, env(safe-area-inset-top)) + 42px); }
    #evageneCorner{ display:none; }   /* corner badge hidden on phones; the "by Evagene" link remains */
    #hint{ font-size:10.5px; }
  }
  @media (prefers-reduced-motion:reduce){
    .panel,#search,.btn{ transition:none; }
  }

  /* ---------- Sound control panel ---------- */
  #soundWrap{ position:relative; }
  #soundBtn.on{ background:rgba(46,230,200,0.18); color:var(--txt); }
  #soundPanel{
    position:absolute; top:calc(100% + 8px); right:0; width:min(260px,84vw);
    background:var(--glass-solid); border:1px solid var(--hair); border-radius:12px;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    box-shadow:var(--shadow); overflow:hidden; display:none; z-index:13;
  }
  #soundPanel.show{ display:block; }
  #soundPanel .sphead{
    padding:9px 13px; font-size:11px; font-weight:600; letter-spacing:0.6px;
    text-transform:uppercase; color:var(--txt-dim);
    border-bottom:1px solid var(--hair); display:flex; align-items:center;
    justify-content:space-between; gap:8px;
  }
  #soundNow{ font-size:10.5px; font-weight:400; letter-spacing:0;
    text-transform:none; color:var(--accent); max-width:130px; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; }
  #soundModes{ max-height:44vh; overflow-y:auto; padding:5px 0; }
  .smode{
    display:flex; align-items:center; gap:8px; padding:0 13px;
    min-height:38px; cursor:pointer; font-size:13px; color:var(--txt-dim);
    user-select:none;
  }
  .smode:hover{ background:rgba(255,255,255,0.06); }
  .smode.on{ background:rgba(46,230,200,0.12); color:var(--txt); }
  .smode .dot{ width:7px; height:7px; border-radius:50%; flex:0 0 auto;
    background:transparent; box-shadow:none; }
  .smode.on .dot{ background:var(--accent); box-shadow:0 0 8px var(--accent); }
  #soundVolRow{ padding:11px 13px; border-top:1px solid var(--hair);
    display:flex; align-items:center; gap:9px; }
  #soundVolRow label{ font-size:11px; color:var(--txt-faint); flex:0 0 auto; }
  #soundVol{ flex:1; -webkit-appearance:none; appearance:none; height:4px;
    border-radius:999px; background:rgba(255,255,255,0.16); outline:none; }
  #soundVol::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none;
    width:16px; height:16px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 8px rgba(46,230,200,0.6); cursor:pointer; }
  #soundVol::-moz-range-thumb{ width:16px; height:16px; border:none;
    border-radius:50%; background:var(--accent); cursor:pointer; }
</style>

<!-- Three.js via ESM import-map from CDN. All our own code stays inline. -->
<script type="importmap">
{
  "imports":{
    "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div id="app"></div>
  <div id="vignette"></div>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="wordmark" class="ui-static">
      <img class="logo" src="evanthe.png" alt="" />
      <span class="name">Evanthe<span class="credit">, by <a href="https://evagene.com" target="_blank" rel="noopener noreferrer">Evagene</a></span></span>
    </div>

    <div id="topbar">
      <a id="evageneCorner" class="ui" href="https://evagene.com" target="_blank" rel="noopener noreferrer" title="Visit evagene.com — an Evagene project">
        <img src="evagene-logo.png" alt="Evagene" />
      </a>
      <div class="row" id="searchRow" style="justify-content:flex-end;">
        <div id="searchWrap" class="ui">
          <input id="search" type="text" placeholder="Search species…" autocomplete="off"
                 autocorrect="off" autocapitalize="none" spellcheck="false" />
          <div id="results"></div>
        </div>
      </div>
      <div class="row ui" style="justify-content:flex-end; flex-wrap:wrap;">
        <div class="segmented" id="colorToggle" role="tablist" aria-label="Color mode">
          <button id="modeClade" class="on">Clade</button>
          <button id="modeAge">Age</button>
        </div>
        <button class="btn icon" id="homeBtn" title="Reset view">⌂</button>
        <button class="btn icon" id="bloomBtn" title="Toggle bloom">✦</button>
        <div id="soundWrap" class="ui">
          <button class="btn icon" id="soundBtn" title="Ambient sound" aria-label="Ambient sound">♪</button>
          <div id="soundPanel">
            <div class="sphead">Ambient sound <span id="soundNow"></span></div>
            <div id="soundModes"></div>
            <div id="soundVolRow">
              <label for="soundVol">Vol</label>
              <input id="soundVol" type="range" min="0" max="100" value="60" />
            </div>
          </div>
        </div>
        <button class="btn icon" id="helpBtn" title="Show controls">?</button>
      </div>
      <div id="legend" class="ui"></div>
    </div>

    <!-- Selected species -->
    <div class="panel" id="selPanel">
      <div class="head" data-collapse>
        <h3>Selected species</h3><span class="chev">▾</span>

<script type="module">
/* ============================================================================
   Evagene — Galaxy of Life prototype fidget spinner.
   A spherical "dandelion" galaxy of glowing points.
   - Root (LUCA) at center; leaves on the outer shell.
   - Geometry = topology (radius grows with depth). Time = color + text.
   - Single THREE.Points draw call, additive glow, optional cheap bloom.
   - Mouse + touch orbit/pinch, tap-to-select, MRCA trace, closest cousins,
     search + fly-to, clade/age color modes.
   Everything is deterministic from a seeded PRNG so reloads are identical.
   ============================================================================ */

const splash = document.getElementById('splash');
const splashSub = document.getElementById('splashSub');
function fail(msg, err){
  console.error(msg, err || '');
  splash.classList.add('error');
  splash.querySelector('.title').textContent = 'Could not start';
  splashSub.innerHTML = msg + (err ? '<br><br><span style="opacity:.6">'+String(err)+'</span>' : '');
  splash.classList.remove('hide');
}

let THREE, OrbitControls, EffectComposer, RenderPass, UnrealBloomPass, OutputPass, hasBloom=true;
try{
  THREE = await import('three');
  ({ OrbitControls } = await import('three/addons/controls/OrbitControls.js'));
  try{
    ({ EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js'));
    ({ RenderPass } = await import('three/addons/postprocessing/RenderPass.js'));
    ({ UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js'));
    ({ OutputPass } = await import('three/addons/postprocessing/OutputPass.js'));
  }catch(e){ hasBloom=false; console.warn('Bloom unavailable, degrading gracefully', e); }
}catch(e){
  fail('Failed to load three.js from the CDN. Check your network connection (this prototype needs the CDN to be reachable on first load).', e);
  throw e;
}

/* ----------------------------------------------------------------------------
   Seeded PRNG (mulberry32). One master stream; we derive independent streams
   so tweaking name tables never reshuffles topology.
   ---------------------------------------------------------------------------- */
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rngStruct = mulberry32(0x9E3779B9 | 0); // topology + ages + positions
const rngName   = mulberry32(0xEEA9E11E | 0); // names only
function gauss(rng){ // Box-Muller
  let u=0,v=0; while(u===0)u=rng(); while(v===0)v=rng();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
const pick = (rng,arr)=>arr[(rng()*arr.length)|0];
const lerp = (a,b,t)=>a+(b-a)*t;
const clamp = (x,a,b)=>x<a?a:(x>b?b:x);
// JS twin of the shader's age ramp (old indigo -> young gold). Used to color the
// branch web in Age mode so the old-core -> young-rim gradient is actually visible
// on the structure (the leaf shell alone is ~uniformly "young").
function jsAgeRamp(a){
  const c=[[0.16,0.10,0.33],[0.11,0.43,0.56],[0.25,0.68,0.42],[0.95,0.65,0.25],[1.00,0.80,0.42]];
  let t=clamp(1-a,0,1), seg, f;
  if(t<0.25){seg=0;f=t/0.25;}
  else if(t<0.5){seg=1;f=(t-0.25)/0.25;}
  else if(t<0.75){seg=2;f=(t-0.5)/0.25;}
  else {seg=3;f=(t-0.75)/0.25;}
  const A=c[seg], B=c[seg+1];
  return [lerp(A[0],B[0],f), lerp(A[1],B[1],f), lerp(A[2],B[2],f)];
}

/* ----------------------------------------------------------------------------
   Build the synthetic tree (flat arrays in DFS-preorder so each subtree is a
   contiguous index range — enables O(1) ancestry tests + leaf slices).
   Target ~6000 leaves, depth up to 7, organized like taxonomy.
   ---------------------------------------------------------------------------- */
const KINGDOMS = ['Bacteria','Archaea','Protista','Fungi','Plantae','Animalia','Chromista'];
const TIER_LABEL = ['Domain','Kingdom','Phylum','Class','Order','Family','Genus','Species'];
const R_MAX = 1000;     // world radius of outer leaf shell
let MAX_DEPTH = 7;       // dynamic: set from the real data's depth, or 7 for the synthetic fallback

// Pass 1: grow a temporary nested tree, then flatten to preorder arrays.
function buildTree(){
  let leafTarget = 6000;
  // Branching means taper with depth (more children near the root).
  const meanByDepth = [7, 6, 5, 4.5, 4, 3.5, 3];

  function makeNode(depth){ return {depth, children:[], leafCount:0, age:0}; }

  function grow(node){
    if(node.depth >= MAX_DEPTH){ node.isLeaf=true; node.leafCount=1; return; }
    // small chance to terminate early past depth 5 -> ragged shell
    if(node.depth >= 5 && rngStruct() < 0.10){ node.isLeaf=true; node.leafCount=1; return; }
    let mean = meanByDepth[node.depth] || 3;
    let k = clamp(Math.round(mean + gauss(rngStruct)*1.1), 2, 9);
    for(let i=0;i<k;i++){
      const c = makeNode(node.depth+1);
      node.children.push(c);
      grow(c);
    }
    node.leafCount = node.children.reduce((s,c)=>s+c.leafCount,0);
  }

  // Root + fixed kingdoms at depth 1.
  let root, attempts=0;
  do{
    root = makeNode(0);
    for(let i=0;i<KINGDOMS.length;i++){
      const k = makeNode(1); k.kingdom=i; root.children.push(k); grow(k);
    }
    root.leafCount = root.children.reduce((s,c)=>s+c.leafCount,0);
    attempts++;
    // We accept a wide band; mulberry is deterministic so this loop is stable.
  } while(false); // single deterministic pass; band is wide enough by construction

  // Ages: monotonic decreasing root->leaf so by-age reads as a radial gradient.
  function assignAges(node, parentAge){
    if(node.depth===0){ node.age = 4000; }
    else {
      let a = parentAge * lerp(0.45, 0.82, rngStruct());
      a = Math.min(a, parentAge - 1);
      node.age = a;
    }
    if(node.isLeaf){ node.age = clamp(node.age, 0.2, 55); }
    for(const c of node.children) assignAges(c, node.age);
  }
  assignAges(root, 4000);

  return root;
}

// Flatten nested tree into preorder typed arrays.
function flatten(root){
  const parent=[], depth=[], age=[], leafCount=[], isLeaf=[], kingdom=[];
  const enter=[], exit=[]; // DFS interval for O(1) ancestry: i ancestor of j iff enter[i]<=enter[j]<=exit[i]
  const order=[];          // node order index
  let n=0, dfs=0;
  // iterative DFS to keep children contiguous & assign intervals
  function visit(node, par, king){
    const id=n++;
    parent[id]=par; depth[id]=node.depth; age[id]=node.age;
    isLeaf[id]=node.isLeaf?1:0; leafCount[id]=node.leafCount;
    const myKing = node.depth===1 ? node.kingdom : king;
    kingdom[id]=myKing==null?-1:myKing;
    enter[id]=dfs++; order[id]=node;
    for(const c of node.children) visit(c, id, myKing);
    exit[id]=dfs++;
    return id;
  }
  visit(root, -1, -1);
  return {n, parent, depth, age, leafCount, isLeaf, kingdom, enter, exit, order};
}

/* ----------------------------------------------------------------------------
   Layout: nested-cone subdivision. Each node owns a cone (axis, halfAngle).
   Children get sub-cones with solid angle ~ sqrt(leafCount) so megaclades
   don't dominate. Child axes placed via area-uniform Fibonacci-in-cone with
   small seeded jitter. Radius grows with depth (root at origin).
   ---------------------------------------------------------------------------- */
const GOLDEN = Math.PI * (3 - Math.sqrt(5)); // 2.39996...

function radiusForDepth(d, isLeafNode){
  let r = R_MAX * Math.pow(d / MAX_DEPTH, 0.78);
  // leaves get a tiny extra outward bias so the hero shell glows
  if(isLeafNode) r *= 1.03;
  // soft fuzzy shell, not a billiard ball
  return r;
}

// Branchless orthonormal basis from a unit vector (Duff et al.).
function basisFromZ(z, outX, outY){
  const sign = z.z >= 0 ? 1 : -1;
  const a = -1.0 / (sign + z.z);
  const b = z.x * z.y * a;
  outX.set(1.0 + sign * z.x * z.x * a, sign * b, -sign * z.x);
  outY.set(b, sign + z.y * z.y * a, -z.y);
}

function computeLayout(t){
  const n = t.n;
  const positions = new Float32Array(n*3);
  const dirs = new Array(n);
  const _x=new THREE.Vector3(), _y=new THREE.Vector3(), _z=new THREE.Vector3();
  const _off=new THREE.Vector3(), _ax=new THREE.Vector3();

  // children lists (preorder gives us contiguous ranges; collect explicitly)
  const childrenOf = Array.from({length:n}, ()=>[]);
  for(let i=0;i<n;i++) if(t.parent[i]>=0) childrenOf[t.parent[i]].push(i);

  // root
  dirs[0] = new THREE.Vector3(0,1,0);
  positions[0]=0; positions[1]=0; positions[2]=0;

  // iterative stack: process node => place its children
  const stack = [{id:0, axis:new THREE.Vector3(0,1,0), half:Math.PI}];
  while(stack.length){
    const {id, axis, half} = stack.pop();
    const kids = childrenOf[id];
    const k = kids.length;
    if(k===0) continue;

    // weights ~ sqrt(leafCount)
    let sum=0; const w=new Array(k);
    for(let i=0;i<k;i++){ w[i]=Math.sqrt(Math.max(1,t.leafCount[kids[i]])); sum+=w[i]; }

    // local frame: axis as +Z
    _z.copy(axis).normalize();
    basisFromZ(_z, _x, _y);

    const oneMinusCos = 1 - Math.cos(half);
    for(let i=0;i<k;i++){
      const cid = kids[i];
      const share = w[i]/sum;
      // child sub-cone half angle from solid-angle share (capped)
      let childSolid = share * 2*Math.PI * oneMinusCos; // proportional slice
      let cosChild = clamp(1 - childSolid/(2*Math.PI), -1, 1);
      let childHalf = Math.acos(cosChild) * 0.9; // packing gutter
      childHalf = clamp(childHalf, 0.02, half*0.96);

      // Fibonacci-in-cone placement: area-uniform polar, golden azimuth.
      const tParam = (i + 0.5) / k;
      let theta = half * Math.sqrt(tParam);          // area-uniform fill of cap
      let phi = i * GOLDEN;
      // organic jitter (small, never crosses into sibling cone)
      theta += gauss(rngStruct) * 0.12 * childHalf;
      phi   += (rngStruct()-0.5) * 0.6;
      theta = clamp(theta, 0, half*0.92);

      const st = Math.sin(theta), ct = Math.cos(theta);
      // offset = local axes; +Z=_z, tangents _x,_y
      _off.set(0,0,0)
        .addScaledVector(_x, st*Math.cos(phi))
        .addScaledVector(_y, st*Math.sin(phi))
        .addScaledVector(_z, ct)
        .normalize();

      dirs[cid] = _off.clone();
      const leafy = t.isLeaf[cid]===1;
      let r = radiusForDepth(t.depth[cid], leafy);
      r *= 1 + (rngStruct()-0.5)*0.03; // ±1.5% radial jitter
      positions[cid*3]   = _off.x*r;
      positions[cid*3+1] = _off.y*r;
      positions[cid*3+2] = _off.z*r;

      stack.push({id:cid, axis:_off.clone(), half:childHalf});
    }
  }
  return {positions, dirs, childrenOf};
}

/* ----------------------------------------------------------------------------
   Names: deterministic binomials + common names from the NAME stream.
   Only leaves get full names; internal nodes get clade-tier labels.
   ---------------------------------------------------------------------------- */
const G_STEM=['Pseud','Aceto','Strepto','Rhizo','Cyano','Dros','Hapl','Chloro','Mega','Micro',
  'Noto','Xantho','Therm','Halo','Cryo','Lyr','Aux','Themn','Coro','Veld','Aster','Calo','Noct',
  'Pyro','Glauco','Eu','Para','Neo','Lepto','Macro','Brachy','Phyl','Cten','Echino'];
const G_SUF=['omonas','bacter','philus','coccus','phyta','saurus','pithecus','cola','phis',
  'opsis','ella','ium','anthus','odon','nautes',' phaga'.trim(),'morpha','genys','ura'];
const E_STEM=['vulg','eleg','bore','gigant','minim','profund','mirab','noct','luc','fer',
  'pall','rubr','viri','aure','cael','sylv','marin','alp','desert','glaci'];
const E_SUF=['aris','ans','alis','ea','a','um','ica','oides','ferox','ensis','atus','inum'];
const ADJ=['Azure','Glowing','Spotted','Crimson','Velvet','Glass','Deep-sea','Twilight','Emerald',
  'Hollow','Frosted','Amber','Silver','Phantom','Lantern','Coral','Midnight','Gilded','Dusky','Ivory'];
const NOUN=['Driftcrawler','Lyrebeetle','Glasswing','Moonmoth','Reefling','Spore-fern','Stoneflower',
  'Tidewing','Emberfish','Nightbloom','Cavefrog','Skystrider','Mudcreeper','Sunpetal','Voidsnail',
  'Cloudvine','Ashworm','Brightcap','Dewspinner','Hollowback'];
const CLADE_ROOT=['Coron','Veld','Lyri','Auxo','Themn','Glauc','Noto','Xanth','Crypt','Hapl',
  'Mega','Brachy','Lepto','Eury','Steno','Acro','Plagio','Ortho','Disco','Helio'];

function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function buildNames(t){
  const name=new Array(t.n), common=new Array(t.n), label=new Array(t.n);
  const used=new Set();
  for(let i=0;i<t.n;i++){
    if(t.isLeaf[i]){
      let bn, guard=0;
      do{
        bn = capitalize(pick(rngName,G_STEM)+pick(rngName,G_SUF))+' '+
             (pick(rngName,E_STEM)+pick(rngName,E_SUF));
        guard++;
      } while(used.has(bn) && guard<8);
      if(used.has(bn)) bn += ' '+i; // last-resort disambiguator
      used.add(bn);
      name[i]=bn;
      common[i]=pick(rngName,ADJ)+' '+pick(rngName,NOUN);
      label[i]=bn;
    } else {
      const tier = TIER_LABEL[Math.min(t.depth[i], TIER_LABEL.length-1)];
      if(t.depth[i]===0){ label[i]='LUCA'; name[i]='LUCA'; common[i]='Last Universal Common Ancestor'; }
      else if(t.depth[i]===1){ label[i]='Kingdom '+KINGDOMS[t.kingdom[i]]; name[i]=label[i]; common[i]=''; }
      else { label[i]=tier+' '+capitalize(pick(rngName,CLADE_ROOT))+'ida'; name[i]=label[i]; common[i]=''; }
    }
  }
  return {name, common, label};
}

/* ----------------------------------------------------------------------------
   Colors: per-point clade color + per-point normalized age. Color mode is a
   single shader uniform crossfade (no buffer rewrite on toggle).
   ---------------------------------------------------------------------------- */
const KINGDOM_HUE=[ // hand-tuned aurora/nebula hues, RGB 0..1 (cycled when >N groups)
  [0.18,0.90,0.78], // teal
  [1.00,0.48,0.35], // coral
  [0.61,0.89,0.36], // lime
  [0.61,0.42,1.00], // violet
  [1.00,0.70,0.28], // amber
  [0.23,0.63,1.00], // azure
  [1.00,0.37,0.61], // magenta-rose
  [0.45,0.95,0.62], // mint
  [1.00,0.85,0.30], // gold
  [0.55,0.70,1.00], // periwinkle
  [1.00,0.55,0.80], // pink
  [0.40,0.85,0.95], // cyan
  [0.80,0.95,0.40], // chartreuse
  [0.95,0.60,0.45], // salmon
  [0.70,0.55,1.00], // lavender
  [0.50,0.90,0.80], // aqua
];
// the color group each leaf belongs to (legend), set by buildFromData for real
// data, else defaulting to the synthetic kingdoms.
let CLADE_NAMES = KINGDOMS;
let CLADE_COUNTS = null;   // leaves per group (real data) -> legend ordering
function cladeRGB(i){ const n=KINGDOM_HUE.length; return KINGDOM_HUE[((i%n)+n)%n]; }
function buildColors(t){
  const cladeCol=new Float32Array(t.n*3);
  const ageNorm=new Float32Array(t.n);
  for(let i=0;i<t.n;i++){
    const ki = t.kingdom[i];
    let base = ki>=0 ? cladeRGB(ki) : [0.6,0.65,0.8];
    // deeper / leafier => slightly brighter so the leaf shell sings.
    const dl = t.depth[i]/MAX_DEPTH;
    const bright = lerp(0.55, 1.0, dl) * (t.isLeaf[i]? 1.0 : 0.7);
    cladeCol[i*3]   = base[0]*bright;
    cladeCol[i*3+1] = base[1]*bright;
    cladeCol[i*3+2] = base[2]*bright;
    // sqrt scale so the dense young shell still shows variation
    ageNorm[i] = Math.sqrt(clamp(t.age[i]/4000,0,1));
  }
  return {cladeCol, ageNorm};
}

/* ----------------------------------------------------------------------------
   Build flat arrays + names + Wikipedia links from the REAL nested tree
   (data/tree.json): root -> domain -> kingdom -> phylum -> class -> order ->
   family -> genus -> species. Topology is real; ages are derived from depth
   (a smooth visual gradient) since divergence times aren't loaded yet.
   ---------------------------------------------------------------------------- */
const RANK_LABEL = {domain:'Domain',kingdom:'Kingdom',phylum:'Phylum',class:'Class',
  order:'Order',family:'Family',genus:'Genus',species:''};
const COLOR_RANK = 'phylum';   // leaves colored by phylum for a varied galaxy
function wikiUrl(s){ return 'https://en.wikipedia.org/wiki/'+encodeURIComponent(String(s||'').trim().replace(/\s+/g,'_')); }

function buildFromData(data){
  const root = data && data.root;
  if(!root) throw new Error('tree.json has no root');
  const parent=[], depth=[], isLeaf=[], leafCount=[], kingdom=[], enter=[], exit=[], age=[];
  const name=[], common=[], label=[], wiki=[];
  let n=0, dfs=0, maxD=0;
  const groupMap=new Map(); const groupCount=[];
  function groupIndex(nm){ if(!groupMap.has(nm)){ groupMap.set(nm, groupMap.size); groupCount.push(0); } return groupMap.get(nm); }
  function visit(node, par, d, g){
    const id=n++;
    parent[id]=par; depth[id]=d; if(d>maxD) maxD=d;
    enter[id]=dfs++;
    const kids=node.children||[];
    const leaf=kids.length===0;
    isLeaf[id]=leaf?1:0;
    if(node.rank===COLOR_RANK) g=groupIndex(node.name);
    kingdom[id]=(g==null?-1:g);
    name[id]=node.name||'';
    if(leaf){
      common[id]=node.common||'';
      label[id]=node.name||'';
      wiki[id]=wikiUrl(node.name);
      if(g!=null && g>=0) groupCount[g]++;
    } else {
      common[id]='';
      const rl=RANK_LABEL[node.rank];
      label[id]= node.rank==='root' ? 'Life' : (rl ? rl+' '+node.name : (node.name||''));
      wiki[id]= node.rank==='root' ? '' : wikiUrl(node.name);
    }
    let leaves=0;
    for(const c of kids) leaves+=visit(c, id, d+1, g);
    if(leaf) leaves=1;
    leafCount[id]=leaves;
    exit[id]=dfs++;
    return leaves;
  }
  visit(root, -1, 0, null);
  MAX_DEPTH = Math.max(2, maxD);
  for(let i=0;i<n;i++) age[i] = 4000 * Math.pow(Math.max(0, 1 - depth[i]/MAX_DEPTH), 1.5);
  CLADE_NAMES = Array.from(groupMap.keys());
  CLADE_COUNTS = groupCount.slice();
  return { T:{n, parent, depth, age, leafCount, isLeaf, kingdom, enter, exit, order:null},
           NAMES:{name, common, label, wiki} };
}

/* ============================================================================
   ASSEMBLE DATA — load the real tree (data/tree.json); fall back to a synthetic
   sample so the app still runs from file:// or before the data file exists.
   ============================================================================ */
let T, NAMES, REAL_DATA=false;
splashSub.textContent='Loading the galaxy of life…';
try{
  const resp = await fetch('data/tree.json', {cache:'default'});
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  ({T, NAMES} = buildFromData(await resp.json()));
  REAL_DATA = true;
}catch(err){
  console.warn('Real tree unavailable — using the synthetic sample.', err);
  splashSub.textContent='Building a sample tree…';
  MAX_DEPTH = 7;
  const rawRoot = buildTree();
  T = flatten(rawRoot);
  NAMES = buildNames(T);
}
splashSub.textContent='Placing the species…';
const {positions, dirs, childrenOf} = computeLayout(T);
const {cladeCol, ageNorm} = buildColors(T);

// leaf bookkeeping; search indexes BOTH scientific (Latin) and common (English) names
const leafIds=[];
for(let i=0;i<T.n;i++) if(T.isLeaf[i]) leafIds.push(i);
const searchIndex = leafIds.map(id=>({id, name:NAMES.name[id], common:NAMES.common[id]||'',
  nl:(NAMES.name[id]||'').toLowerCase(), cl:(NAMES.common[id]||'').toLowerCase()}));

// Dev sanity asserts (cheap; help catch layout/age bugs)
(function sanity(){
  let ok=true;
  for(let i=0;i<T.n;i++){
    const p=T.parent[i];
    if(p>=0 && T.age[i] >= T.age[p]) ok=false;        // child must be younger
    if(p>=0 && T.depth[i] !== T.depth[p]+1) ok=false; // depth monotone
  }
  if(!ok) console.warn('Sanity check: age/depth monotonicity violated.');
})();

/* ============================================================================
   THREE.js SCENE
   ============================================================================ */
const container=document.getElementById('app');
let renderer;
try{
  renderer = new THREE.WebGLRenderer({antialias:false, alpha:false, powerPreference:'high-performance'});
}catch(e){ fail('WebGL is not available in this browser.', e); throw e; }

// ---- Tier detection for performance budgets ----
function detectTier(){
  const ua=navigator.userAgent||'';
  const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(ua) ||
    (navigator.maxTouchPoints>1 && Math.min(screen.width,screen.height)<820);
  let gpu='';
  try{
    const gl=renderer.getContext();
    const ext=gl.getExtension('WEBGL_debug_renderer_info');
    if(ext) gpu=(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)||'').toLowerCase();
  }catch(e){}
  const weakGpu=/mali|adreno 5|adreno 6[0-3]|powervr|swiftshader|llvmpipe|software/.test(gpu);
  if(!isMobile && !weakGpu) return 'high';
  if(isMobile && weakGpu) return 'low';
  return 'mid';
}
let TIER=detectTier();
const DPR_CAP={high:2, mid:1.5, low:1.0}[TIER];
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, DPR_CAP));
renderer.setSize(window.innerWidth, window.innerHeight);
// ACES filmic tone mapping rolls accumulated additive color toward its hue
// instead of clipping to white in the dense leaf shell. OutputPass (in the
// bloom path) honors the same setting, so both render paths stay consistent.
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x05060d);
scene.fog=new THREE.FogExp2(0x05060d, 0.00018);

const camera=new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 1, 12000);
camera.position.set(0, R_MAX*0.5, R_MAX*2.6);

const controls=new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.07;
controls.enablePan=false;                 // pan off => two-finger is pure pinch-zoom
controls.minDistance=R_MAX*0.06;          // can fly INTO the shell
controls.maxDistance=R_MAX*4.0;           // whole galaxy + starfield
controls.rotateSpeed=0.55;
controls.zoomSpeed=0.9;

controls.autoRotateSpeed=0.28;

controls.mouseButtons={ LEFT:THREE.MOUSE.ROTATE, MIDDLE:THREE.MOUSE.DOLLY, RIGHT:THREE.MOUSE.ROTATE };
if('zoomToCursor' in controls) controls.zoomToCursor=true;
controls.target.set(0,0,0);

/* ---- Starfield (parallax backdrop, locked to camera position) ---- */
const starCount = TIER==='low'?700:1400;
const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(starCount*3);
const starRng=mulberry32(0x1234ABCD|0);
for(let i=0;i<starCount;i++){
  // random point on a big sphere
  const u=starRng()*2-1, th=starRng()*Math.PI*2, s=Math.sqrt(1-u*u);
  const R=R_MAX*7.5*(0.85+starRng()*0.3);
  starPos[i*3]=s*Math.cos(th)*R; starPos[i*3+1]=u*R; starPos[i*3+2]=s*Math.sin(th)*R;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
const starMat=new THREE.PointsMaterial({color:0xaab4d6, size:1.4, sizeAttenuation:false,
  transparent:true, opacity:0.7, depthWrite:false});
const starfield=new THREE.Points(starGeo, starMat);
starfield.frustumCulled=false;
scene.add(starfield);

/* ---- Branch lines: one LineSegments, node->parent, faint converging web ---- */
const edgeCount=T.n-1;
const linePos=new Float32Array(edgeCount*6);
const lineCol=new Float32Array(edgeCount*6);       // live buffer (starts as faint clade web)
const lineColClade=new Float32Array(edgeCount*6);  // faint clade web  (Clade mode)
const lineColAge=new Float32Array(edgeCount*6);    // glowing age gradient (Age mode)
let li=0;
for(let i=1;i<T.n;i++){
  const p=T.parent[i];
  linePos[li]=positions[i*3];   linePos[li+1]=positions[i*3+1]; linePos[li+2]=positions[i*3+2];
  linePos[li+3]=positions[p*3]; linePos[li+4]=positions[p*3+1]; linePos[li+5]=positions[p*3+2];
  // CLADE mode: very faint clade color, same hue at both ends.
  const f=0.10;
  for(let c=0;c<3;c++){
    const v=cladeCol[i*3+c]*f;
    lineCol[li+c]=v; lineCol[li+3+c]=v;
    lineColClade[li+c]=v; lineColClade[li+3+c]=v;
  }
  // AGE mode: gradient from the child's age color (outer/young) to the parent's
  // (inner/old) so the whole converging web glows as a radial old->young gradient,
  // and brighter (gA) than the clade web so switching modes is unmistakable.
  const gA=0.6;
  const cc=jsAgeRamp(ageNorm[i]); // child  (younger, outer)
  const cp=jsAgeRamp(ageNorm[p]); // parent (older, inner)
  for(let c=0;c<3;c++){ lineColAge[li+c]=cc[c]*gA; lineColAge[li+3+c]=cp[c]*gA; }
  li+=6;
}
const lineGeo=new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos,3));
lineGeo.setAttribute('color', new THREE.BufferAttribute(lineCol,3));
const lineMat=new THREE.LineBasicMaterial({vertexColors:true, transparent:true,
  opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false});
const branchLines=new THREE.LineSegments(lineGeo, lineMat);
branchLines.frustumCulled=false;
scene.add(branchLines); // on all tiers (cheap; adds light + structure on no-bloom mobile)

/* ---- The galaxy: ONE THREE.Points for all nodes, custom shader ---- */
const geo=new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('aClade', new THREE.BufferAttribute(cladeCol,3));
geo.setAttribute('aAge', new THREE.BufferAttribute(ageNorm,1));
const aSize=new Float32Array(T.n);
const aState=new Float32Array(T.n); // 0 normal,1 selected,2 path,3 cousin
const aSeed=new Float32Array(T.n);
for(let i=0;i<T.n;i++){
  aSize[i] = T.depth[i]===0 ? 10.0 : (T.isLeaf[i]? 3.0 : 1.7);
  aSeed[i] = rngStruct();
}
geo.setAttribute('aSize', new THREE.BufferAttribute(aSize,1));
geo.setAttribute('aState', new THREE.BufferAttribute(aState,1));
geo.setAttribute('aSeed', new THREE.BufferAttribute(aSeed,1));
geo.computeBoundingSphere();

const pointMat=new THREE.ShaderMaterial({
  uniforms:{
    uTime:{value:0},
    uPixelRatio:{value:renderer.getPixelRatio()},
    uScreenK:{value: window.innerHeight*0.5 / Math.tan(camera.fov*Math.PI/360) },
    uSizeScale:{value: ({high:1.0, mid:1.18, low:1.55})[TIER] || 1.0},
    uGlow:{value:1.0},          // brightness/halo compensation when post-bloom is OFF (mobile)
    uColorMode:{value:0.0},     // 0=clade, 1=age (lerped)
    uReveal:{value:0.0},        // first-load ignition 0..1
    uDim:{value:1.0},           // global "spotlight" dim for unselected
    uHasSel:{value:0.0},        // 1 when something highlighted
    uTwinkle:{value:reduceMotion?0.0:1.0},
  },
  vertexShader:`
    attribute vec3 aClade; attribute float aAge; attribute float aSize;
    attribute float aState; attribute float aSeed;
    uniform float uTime,uPixelRatio,uScreenK,uSizeScale,uGlow,uColorMode,uReveal,uDim,uHasSel,uTwinkle;
    varying vec3 vColor; varying float vBright; varying float vFog;
    // perceptualish age ramp (old indigo -> young white-gold)
    vec3 ageRamp(float a){
      vec3 c0=vec3(0.16,0.10,0.33); // old
      vec3 c1=vec3(0.11,0.43,0.56);
      vec3 c2=vec3(0.25,0.68,0.42);
      vec3 c3=vec3(0.95,0.65,0.25);
      vec3 c4=vec3(1.0,0.80,0.42);  // young (saturated gold so the shell visibly shifts)
      float t=clamp(1.0-a,0.0,1.0); // a is sqrt(age/4000); young => high t
      if(t<0.25) return mix(c0,c1,t/0.25);
      if(t<0.5)  return mix(c1,c2,(t-0.25)/0.25);
      if(t<0.75) return mix(c2,c3,(t-0.5)/0.25);
      return mix(c3,c4,(t-0.75)/0.25);
    }
    void main(){
      vec3 col = mix(aClade, ageRamp(aAge), uColorMode);
      vec4 mv = modelViewMatrix * vec4(position,1.0);
      vFog = smoothstep(R_FOG_NEAR, R_FOG_FAR, -mv.z);
      float size = aSize * uSizeScale;
      // highlight states enlarge + brighten
      float st = aState;
      float pulse = 0.8 + 0.2*sin(uTime*3.0);
      if(st>0.5) size *= (st<1.5? 2.1*pulse : 1.8);
      gl_PointSize = clamp(size * uPixelRatio * (uScreenK / max(-mv.z,1.0)), 2.0, 46.0);
      gl_Position = projectionMatrix * mv;

      float tw = (1.0 - uTwinkle*0.15) + uTwinkle*0.15*sin(uTime*1.5 + aSeed*6.283);
      float b = tw;
      // first-load ignition: outer shell lights last
      b *= smoothstep(0.0,1.0, uReveal*1.6 - (1.0 - aAge)*0.5 - 0.1);
      // spotlight dim for non-highlighted points when a selection is active
      if(uHasSel>0.5 && st<0.5) b *= uDim;
      // per-mode glow: Clade a touch stronger; Age much softer so the additive
      // gold shell stops stacking to white and the old->young gradient reads.
      b *= mix(1.05, 0.55, uColorMode);
      // highlight tints
      if(st>0.5 && st<1.5)      col = mix(col, vec3(1.0,1.0,1.0), 0.7); // selected white-hot
      else if(st>=1.5 && st<2.5)col = mix(col, vec3(1.0,0.92,0.7), 0.7); // path warm-white
      else if(st>=2.5)          col = mix(col, vec3(0.5,0.92,1.0), 0.65);// cousin cyan
      if(st>0.5) b = max(b, 0.9);
      vColor=col; vBright=b;
    }
  `.replace(/R_FOG_NEAR/g, (R_MAX*1.2).toFixed(1)).replace(/R_FOG_FAR/g, (R_MAX*5.5).toFixed(1)),
  fragmentShader:`
    varying vec3 vColor; varying float vBright; varying float vFog;
    uniform float uGlow; // >1 when post-processing bloom is OFF (e.g. mobile)
    void main(){
      vec2 p = gl_PointCoord - 0.5;
      float d = length(p);
      if(d>0.5) discard;
      float core = smoothstep(0.5,0.0,d);
      float halo = pow(core, 2.0);                       // bright tight core
      // Wide soft glow ("faux bloom") added ONLY when real bloom is off, so the
      // galaxy still glows on no-bloom mobile without changing the desktop look.
      float soft = pow(core, 0.7) * max(0.0, uGlow-1.0) * 0.5;
      // Low ambient floor so dim outer rings don't stack additively to white.
      vec3 c = vColor * (0.12 + 0.88*halo);
      float alpha = (halo*uGlow + soft) * vBright * mix(1.0, 0.35, vFog);
      if(alpha<0.01) discard;
      gl_FragColor = vec4(c, alpha);
    }
  `,
  transparent:true, depthTest:true, depthWrite:false, blending:THREE.AdditiveBlending
});
const points=new THREE.Points(geo, pointMat);
points.frustumCulled=false;
scene.add(points);

/* ---- MRCA / cousin trace overlay: a separate bright LineSegments, reused ---- */

const tracePos=new Float32Array(TRACE_MAX*6);
const traceGeo=new THREE.BufferGeometry();
traceGeo.setAttribute('position', new THREE.BufferAttribute(tracePos,3));
traceGeo.setDrawRange(0,0);

/* ---- Optional bloom ---- */
let composer=null, bloomPass=null, useBloom=false;
function setupBloom(){
  if(!hasBloom || TIER==='low'){ useBloom=false; return; }
  try{
    composer=new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    // Bloom resolution is driven explicitly in *device* pixels (DPR-independent)
    // so the half-res mid-tier optimization isn't fought by composer.setPixelRatio.
    const pr=renderer.getPixelRatio();
    let bw=window.innerWidth*pr, bh=window.innerHeight*pr;
    if(TIER==='mid'){ bw*=0.5; bh*=0.5; } // half-res bloom buffer on mobile
    bloomPass=new UnrealBloomPass(new THREE.Vector2(bw, bh), 0.9, 0.5, 0.55);
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass()); // sRGB / tone-map conversion as the final pass
    composer.setPixelRatio(pr);
    composer.setSize(window.innerWidth, window.innerHeight);
    bloomPass.setSize(bw, bh); // reallocate bloom targets at the intended resolution
    useBloom=true;
  }catch(e){ console.warn('Bloom setup failed', e); useBloom=false; composer=null; }
}
setupBloom();

/* ============================================================================
   PICKING (tap vs drag), MRCA, cousins, selection state
   ============================================================================ */
const raycaster=new THREE.Raycaster();
const ndc=new THREE.Vector2();
let selection=[]; // the multi-select basket of leaf ids (built by clicks + search)

function setState(id, v){ aState[id]=v; }
function clearStates(){
  for(let i=0;i<T.n;i++) aState[i]=0;
  geo.attributes.aState.needsUpdate=true;
}

// O(depth) LCA via parent walk
function lca(a,b){
  let x=a,y=b;
  while(T.depth[x]>T.depth[y]) x=T.parent[x];
  while(T.depth[y]>T.depth[x]) y=T.parent[y];
  while(x!==y){ x=T.parent[x]; y=T.parent[y]; }
  return x;
}
function pathTo(a,m){ const out=[]; let x=a; while(x!==m){ out.push(x); x=T.parent[x]; } out.push(m); return out; }

// closest cousins: deepest ancestor of s that has a sibling; pick smallest sibling subtree.
function closestCousins(s){
  let node=s;
  while(T.parent[node]>=0){
    const par=T.parent[node];
    const sibs=childrenOf[par].filter(c=>c!==node);
    if(sibs.length>0){
      // smallest sibling subtree (tie-break by angular proximity = axis dot)
      sibs.sort((a,b)=>{
        if(T.leafCount[a]!==T.leafCount[b]) return T.leafCount[a]-T.leafCount[b];
        return dirs[s].dot(dirs[b]) - dirs[s].dot(dirs[a]);
      });
      const sib=sibs[0];
      // collect leaves under sib via DFS interval
      const leaves=[];
      for(const id of leafIds){
        if(T.enter[id]>=T.enter[sib] && T.enter[id]<=T.exit[sib]) leaves.push(id);
      }
      return {sib, sharedAncestor:par, leaves};
    }
    node=par;
  }
  return null;
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function kinPhrase(m){
  const d=T.depth[m];
  if(d>=7) return 'Extremely close — same genus';
  if(d>=6) return 'Very close — same family';
  if(d>=5) return 'Close relatives — same order';
  if(d>=4) return 'Related — same class';
  if(d>=3) return 'Distant cousins — same phylum';
  if(d>=2) return 'Very distant — only the same kingdom';
  return 'Profoundly distant — different domains of life';
}
function ageStr(mya){
  if(mya>=1000) return (mya/1000).toFixed(2)+' Gya ('+Math.round(mya)+' Mya)';
  if(mya>=10) return Math.round(mya)+' Mya';
  return mya.toFixed(1)+' Mya';
}
function lineageBreadcrumb(id){
  const chain=[]; let x=id;
  while(x>=0){ chain.push(x); x=T.parent[x]; }
  chain.reverse();
  return chain.filter(i=>!T.isLeaf[i]).map(i=>NAMES.label[i]).join(' › ');
}

/* ---- apply highlights & rebuild panels from current selection ---- */
function mrcaOfAll(ids){ let m=ids[0]; for(let i=1;i<ids.length;i++) m=lca(m, ids[i]); return m; }

/* ---- apply highlights & rebuild panels from the current multi-selection ---- */
function refreshHighlights(){
  clearStates();
  mrcaLabel.style.display='none';
  pointMat.uniforms.uHasSel.value = selection.length>0 ? 1.0 : 0.0;
  for(const s of selection) setState(s,1);

  if(selection.length>=2){
    const m=mrcaOfAll(selection);
    // trace inward from every selected leaf to the shared ancestor (dedupe edges)
    const seen=new Set(), edges=[];
    for(const s of selection){
      const p=pathTo(s, m);
      for(const id of p) if(id!==s) setState(id,2);
      for(let i=0;i<p.length-1;i++){
        const a=p[i], b=p[i+1], key=a+'_'+b;
        if(!seen.has(key)){ seen.add(key); edges.push(a,b); }
      }
    }
    setState(m,2);
    const arr=new Float32Array(edges.length*3);
    for(let i=0;i<edges.length;i++){ const id=edges[i];
      arr[i*3]=positions[id*3]; arr[i*3+1]=positions[id*3+1]; arr[i*3+2]=positions[id*3+2]; }
    traceGeo.setAttribute('position', new THREE.BufferAttribute(arr,3));
    traceGeo.setDrawRange(0, edges.length);
    mrcaNode=m;
  } else {
    traceGeo.setDrawRange(0,0);
    mrcaNode=-1;
  }
  geo.attributes.aState.needsUpdate=true;
  updatePanels();
}

let mrcaNode=-1;

/* ============================================================================
   HUD wiring
   ============================================================================ */
const $=(id)=>document.getElementById(id);
const selPanel=$('selPanel'), relPanel=$('relPanel');
const selBody=$('selBody'), relBody=$('relBody');
const mrcaLabel=$('mrcaLabel');

function removeFromSelection(id){
  const i=selection.indexOf(id);
  if(i>=0){ selection.splice(i,1); refreshHighlights(); }
}

function updatePanels(){
  // Selected panel = the whole basket: a removable list you build by clicking
  // stars and/or searching.
  if(selection.length){
    const rows = selection.map(id=>`
      <div class="selrow">
        <span class="selnm"><span class="sc">${esc(NAMES.common[id]||NAMES.name[id])}</span><span class="scsci">${esc(NAMES.name[id])}</span></span>
        ${(NAMES.wiki&&NAMES.wiki[id])?`<a class="wlink" href="${NAMES.wiki[id]}" target="_blank" rel="noopener noreferrer" title="Wikipedia">w↗</a>`:''}
        <button class="xbtn" data-id="${id}" title="Remove">×</button>
      </div>`).join('');
    const last = selection[selection.length-1];
    selBody.innerHTML=`
      <div class="selhead"><span><b>${selection.length}</b> selected</span>
        <button class="btn tiny" id="clearAllBtn">Clear all</button></div>
      <div class="sellist">${rows}</div>
      <div class="hinttext">Click more stars or search to add species</div>
      <div class="actions"><button class="btn" id="cousinBtn">+ nearest cousins of ${esc(NAMES.common[last]||NAMES.name[last])}</button></div>`;
    selPanel.classList.add('show');
    selBody.querySelectorAll('.xbtn').forEach(b=>b.onclick=()=>removeFromSelection(parseInt(b.dataset.id,10)));
    $('clearAllBtn').onclick=clearSelection;
    $('cousinBtn').onclick=()=>doCousins(last);
  } else {
    selPanel.classList.remove('show');
  }

  // Relatedness = the common ancestor of the WHOLE selection (2+).
  if(selection.length>=2){
    const m=mrcaOfAll(selection);
    const names = selection.slice(0,4).map(id=>esc(NAMES.common[id]||NAMES.name[id])).join(', ')
      + (selection.length>4?` <span style="color:var(--txt-faint)">+${selection.length-4} more</span>`:'');
    relBody.innerHTML=`
      <div class="relline">${names}</div>
      <div class="relline">Common ancestor of all ${selection.length}: <b>${esc(NAMES.label[m])}</b></div>
      <div class="relline" style="color:var(--txt-dim)">${kinPhrase(m)}</div>
      <div class="actions"><button class="btn" id="clearRelBtn">Clear all</button></div>`;
    relPanel.classList.add('show');
    $('clearRelBtn').onclick=clearSelection;
  } else {
    relPanel.classList.remove('show');
  }
  syncSheetStack();
}

// On phones the two panels are stacked bottom sheets; selPanel sits above
// relPanel. Publish relPanel's measured height so the CSS offset is exact
// instead of a hardcoded guess. No-op on desktop (var simply unused).
function syncSheetStack(){
  requestAnimationFrame(()=>{
    const shown=relPanel.classList.contains('show');
    const h=shown ? relPanel.getBoundingClientRect().height : 0;
    // 8px gutter between the two stacked sheets when both are visible
    document.documentElement.style.setProperty('--relPanelH', (h>0? h+8 : 0)+'px');
  });
}

// Add the nearest cousin species of `s` to the basket (so they join the
// selection + common-ancestor trace), then frame them.
function doCousins(s){
  const res=closestCousins(s);
  if(!res){ return; }
  const add = res.leaves.filter(id=>!selection.includes(id)).slice(0, 12);
  if(add.length) selection = selection.concat(add);
  spotlight();
  refreshHighlights();
  window.dispatchEvent(new CustomEvent('evo:cousins', {detail:{id:s, count:add.length, age:T.age[s], depth:T.depth[s]}}));
  const ids=[s, ...add];
  const center=new THREE.Vector3();
  for(const id of ids) center.add(_tmpVec.set(positions[id*3],positions[id*3+1],positions[id*3+2]));
  center.multiplyScalar(1/ids.length);
  let rad=0;
  for(const id of ids){
    const d=_tmpVec.set(positions[id*3],positions[id*3+1],positions[id*3+2]).distanceTo(center);
    if(d>rad) rad=d;
  }
  flyToPoint(center, rad);
}
const _tmpVec=new THREE.Vector3();

function clearSelection(){
  selection=[]; mrcaNode=-1;
  refreshHighlights();
}

// Each click toggles a species in/out of the multi-selection basket.
function selectLeaf(id){
  if(!T.isLeaf[id]) return;
  const i=selection.indexOf(id);
  if(i>=0) selection.splice(i,1); else selection.push(id);
  spotlight();
  refreshHighlights();
  window.dispatchEvent(new CustomEvent('evo:select', {detail:{id, age:T.age[id], depth:T.depth[id]}}));
  if(selection.length>=2){ const b=selection[selection.length-1];
    window.dispatchEvent(new CustomEvent('evo:pair', {detail:{a:selection[selection.length-2], b, age:T.age[b], depth:T.depth[b]}})); }
}

// brief spotlight dim of non-highlighted points, then release
let spotlightT=0;
function spotlight(){ if(!reduceMotion) spotlightT=1.0; }

/* ---- Picking ---- */
function pickAt(clientX, clientY){
  const rect=renderer.domElement.getBoundingClientRect();
  ndc.x=((clientX-rect.left)/rect.width)*2-1;
  ndc.y=-((clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(ndc, camera);
  // distance-scaled threshold -> fat-finger tolerant
  const camDist=camera.position.distanceTo(controls.target);
  raycaster.params.Points.threshold=clamp(camDist*0.012, 2.0, 16.0);
  const hits=raycaster.intersectObject(points, false);
  // prefer leaves; among candidates pick smallest distanceToRay
  let best=-1, bestD=Infinity;
  for(const h of hits){
    const id=h.index;
    if(!T.isLeaf[id]) continue;
    const d=h.distanceToRay!=null?h.distanceToRay:0;
    if(d<bestD){ bestD=d; best=id; }
  }
  if(best<0){ // fall back to any node if no leaf hit
    for(const h of hits){ const d=h.distanceToRay!=null?h.distanceToRay:0;
      if(d<bestD){ bestD=d; best=h.index; } }
  }
  return best;
}

/* ---- Pointer tap-vs-drag detection (unified mouse/touch/pen) ---- */
let ptr={id:-1, x:0, y:0, t:0, moved:false, multi:false};
const SLOP=()=>Math.max(10, 0.02*Math.min(window.innerWidth, window.innerHeight));
renderer.domElement.addEventListener('pointerdown', (e)=>{
  if(ptr.id!==-1){ ptr.multi=true; return; } // a second finger -> not a tap
  ptr={id:e.pointerId, x:e.clientX, y:e.clientY, t:performance.now(), moved:false, multi:false};
  userInteracted();
});
renderer.domElement.addEventListener('pointermove', (e)=>{
  if(e.pointerId!==ptr.id) return;
  if(Math.hypot(e.clientX-ptr.x, e.clientY-ptr.y) > SLOP()) ptr.moved=true;
});
renderer.domElement.addEventListener('pointerup', (e)=>{
  if(e.pointerId!==ptr.id){ if(ptr.id===-1) ptr.multi=false; return; }
  const dt=performance.now()-ptr.t;
  const isTap = !ptr.moved && !ptr.multi && dt<350;
  const wasMulti=ptr.multi;
  ptr.id=-1; ptr.multi=false;
  if(isTap && !wasMulti){
    const id=pickAt(e.clientX, e.clientY);
    if(id>=0){
      selectLeaf(id);   // each tap adds (or removes) a species from the basket
    }
  }
});
renderer.domElement.addEventListener('pointercancel', ()=>{ ptr.id=-1; ptr.multi=false; });

/* ---- Desktop hover tooltip: species name + Wikipedia link (mouse/fine pointer only) ---- */
const HOVER_OK = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
const hoverTip = $('hoverTip');
let hoverId=-1, hoverHideTimer=null, hoverOverTip=false, lastHoverT=0;
function positionTip(x,y){
  const pad=15, tw=hoverTip.offsetWidth||200, th=hoverTip.offsetHeight||60;
  let px=x+pad, py=y+pad;
  if(px+tw > window.innerWidth-8) px=x-pad-tw;
  if(py+th > window.innerHeight-8) py=y-pad-th;
  hoverTip.style.left=px+'px'; hoverTip.style.top=py+'px';
}
function showHoverTip(id,x,y){
  const com=NAMES.common[id], sci=NAMES.name[id];
  const w=(NAMES.wiki && NAMES.wiki[id]) ? NAMES.wiki[id] : null;
  hoverTip.innerHTML =
    (com?`<div class="ht-common">${esc(com)}</div>`:'') +
    `<div class="ht-sci">${esc(sci)}</div>` +
    (w?`<a class="ht-wiki" href="${w}" target="_blank" rel="noopener noreferrer">Wikipedia ↗</a>`:'');
  hoverTip.classList.add('show');
  positionTip(x,y);
}
function hideHoverTip(){ hoverTip.classList.remove('show'); hoverId=-1; }
function scheduleHideTip(){ clearTimeout(hoverHideTimer); hoverHideTimer=setTimeout(()=>{ if(!hoverOverTip) hideHoverTip(); }, 240); }
if(HOVER_OK){
  renderer.domElement.addEventListener('pointermove', (e)=>{
    if(e.pointerType && e.pointerType!=='mouse') return;
    if(ptr.id!==-1){ hideHoverTip(); return; }          // orbiting -> no hover
    const now=performance.now(); if(now-lastHoverT<45) return; lastHoverT=now;
    const id=pickAt(e.clientX, e.clientY);
    if(id>=0 && T.isLeaf[id]){
      clearTimeout(hoverHideTimer);
      if(id!==hoverId){ hoverId=id; showHoverTip(id, e.clientX, e.clientY); }
      else positionTip(e.clientX, e.clientY);
    } else { scheduleHideTip(); }
  });
  renderer.domElement.addEventListener('pointerleave', scheduleHideTip);
  hoverTip.addEventListener('pointerenter', ()=>{ hoverOverTip=true; clearTimeout(hoverHideTimer); });
  hoverTip.addEventListener('pointerleave', ()=>{ hoverOverTip=false; hideHoverTip(); });
}

/* ============================================================================
   Idle auto-rotate management
   ============================================================================ */
let idleTimer=0, autoRotateTarget=reduceMotion?0:0.28;

/* ============================================================================
   Search + fly-to
   ============================================================================ */
const search=$('search'), results=$('results');
let searchTimer=null, activeResult=-1, currentResults=[];
search.addEventListener('input', ()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(runSearch, 120);
});
search.addEventListener('keydown', (e)=>{
  if(!results.classList.contains('show')) return;
  if(e.key==='ArrowDown'){ activeResult=Math.min(activeResult+1, currentResults.length-1); paintResults(); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ activeResult=Math.max(activeResult-1, 0); paintResults(); e.preventDefault(); }
  else if(e.key==='Enter'){ if(currentResults[activeResult]) chooseResult(currentResults[activeResult].id); e.preventDefault(); }
  else if(e.key==='Escape'){ results.classList.remove('show'); }
});
function runSearch(){
  const q=search.value.trim().toLowerCase();
  if(q.length<2){ results.classList.remove('show'); currentResults=[]; return; }
  const out=[];
  for(const r of searchIndex){
    if(r.nl.includes(q) || r.cl.includes(q)){ out.push(r); if(out.length>=8) break; }
  }
  currentResults=out; activeResult=out.length?0:-1; paintResults();
}
function paintResults(){
  if(!currentResults.length){ results.classList.remove('show'); results.innerHTML=''; return; }
  results.innerHTML=currentResults.map((r,i)=>
    `<div class="result ${i===activeResult?'active':''}" data-id="${r.id}">
       <div class="bn">${r.name}</div><div class="cn">${r.common}</div></div>`).join('');
  results.classList.add('show');
  results.querySelectorAll('.result').forEach(el=>{
    el.onclick=()=>chooseResult(parseInt(el.dataset.id,10));
  });
}
function chooseResult(id){
  results.classList.remove('show');
  search.value=''; search.blur();
  if(!selection.includes(id)) selection.push(id);   // each search ADDS a species
  spotlight();
  refreshHighlights();
  window.dispatchEvent(new CustomEvent('evo:select', {detail:{id, age:T.age[id], depth:T.depth[id]}}));
  flyTo(id);
}

/* ---- Camera fly-to with ease-in-out cubic ---- */
let fly=null;
function easeInOut(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function flyTo(id){
  const target=new THREE.Vector3(positions[id*3], positions[id*3+1], positions[id*3+2]);
  // guard against a near-origin target (LUCA / depth-1 nodes) where normalize() is NaN
  const dir = target.lengthSq()>1e-6 ? target.clone().normalize() : new THREE.Vector3(0,0,1);
  // stand off OUTSIDE the shell, looking inward
  const standoff=R_MAX*0.18;
  // blend a little of the camera's current up into the approach so the star
  // arrives slightly off the dead center of its own additive halo.
  const tangent=new THREE.Vector3().crossVectors(dir, camera.up).normalize();
  const camTo=target.clone()
    .addScaledVector(dir, standoff)
    .addScaledVector(tangent, standoff*0.25);
  fly={
    t:0, dur: reduceMotion?0.001:1.1,
    camFrom:camera.position.clone(), camTo,
    tgtFrom:controls.target.clone(), tgtTo:target.clone()
  };
  controls.autoRotate=false; controls.autoRotateSpeed=0;
  window.dispatchEvent(new CustomEvent('evo:fly', {detail:{id, age:T.age[id], depth:T.depth[id]}}));
}
// Frame an arbitrary world point with a bounding radius (used by cousins).
function flyToPoint(center, radius){
  // distance needed to fit `radius` in the vertical FOV, with margin.
  const vfov=camera.fov*Math.PI/180;
  const fitDist=(radius>1? radius:R_MAX*0.05)/Math.tan(vfov/2)*1.5;
  const dist=clamp(fitDist, controls.minDistance*1.1, controls.maxDistance*0.95);
  const dir = center.lengthSq()>1e-6 ? center.clone().normalize() : new THREE.Vector3(0,0,1);
  const camTo=center.clone().addScaledVector(dir, dist);
  fly={
    t:0, dur: reduceMotion?0.001:1.1,
    camFrom:camera.position.clone(), camTo,
    tgtFrom:controls.target.clone(), tgtTo:center.clone()
  };
  controls.autoRotate=false; controls.autoRotateSpeed=0;
  window.dispatchEvent(new CustomEvent('evo:fly', {detail:{}}));
}
function cancelFly(){ fly=null; }
function updateFly(dt){
  if(!fly) return;
  fly.t=Math.min(1, fly.t+dt/fly.dur);
  const e=easeInOut(fly.t);
  camera.position.lerpVectors(fly.camFrom, fly.camTo, e);
  controls.target.lerpVectors(fly.tgtFrom, fly.tgtTo, e);
  if(fly.t>=1){ fly=null; idleTimer=performance.now(); }
}

/* ---- Home / reset view ---- */
$('homeBtn').onclick=()=>{
  fly={ t:0, dur:reduceMotion?0.001:1.1,
    camFrom:camera.position.clone(), camTo:new THREE.Vector3(0,R_MAX*0.5,R_MAX*2.6),
    tgtFrom:controls.target.clone(), tgtTo:new THREE.Vector3(0,0,0) };
  controls.autoRotate=false; controls.autoRotateSpeed=0;
};

/* ============================================================================
   Color mode toggle + legend
   ============================================================================ */
let colorMode=0; // 0 clade, 1 age
let colorTween=null;
const modeClade=$('modeClade'), modeAge=$('modeAge');
function setColorMode(m){
  colorMode=m;
  modeClade.classList.toggle('on', m===0);
  modeAge.classList.toggle('on', m===1);
  colorTween={from:pointMat.uniforms.uColorMode.value, to:m, t:0};
  buildLegend();
}
modeClade.onclick=()=>setColorMode(0);
modeAge.onclick=()=>setColorMode(1);

function buildLegend(){
  const el=$('legend');
  el.classList.toggle('clade-compact', colorMode===0);
  if(colorMode===0){
    let entries = CLADE_NAMES.map((nm,i)=>({nm,i,c:(CLADE_COUNTS?CLADE_COUNTS[i]:1)}));
    entries.sort((a,b)=>b.c-a.c);
    const top = entries.slice(0, 9);
    const moreN = entries.length - top.length;
    const title = CLADE_COUNTS ? 'Major groups (phyla)' : 'Kingdoms';
    el.innerHTML='<div style="font-size:11px;color:var(--txt-faint);margin-bottom:4px;">'+title+'</div>'+
      top.map(e=>{
        const c=cladeRGB(e.i);
        const css=`rgb(${(c[0]*255)|0},${(c[1]*255)|0},${(c[2]*255)|0})`;
        return `<div class="lrow"><span class="sw" style="background:${css};color:${css}"></span>${esc(e.nm)}</div>`;
      }).join('') +
      (moreN>0 ? `<div class="lrow" style="color:var(--txt-faint)">+${moreN} more</div>` : '');
  } else {
    el.innerHTML='<div style="font-size:11px;color:var(--txt-faint);margin-bottom:4px;">Lineage depth</div>'+
      '<div id="ageBar"></div>'+
      '<div id="ageTicks"><span>recent</span><span>ancient</span></div>';
  }
}
buildLegend();

/* ---- Bloom toggle ---- */
$('bloomBtn').onclick=()=>{
  if(!hasBloom){ return; }
  if(!composer){ setupBloom(); }
  useBloom=!useBloom;
  $('bloomBtn').style.opacity=useBloom?'1':'0.45';
};

/* ---- Panel collapse on header tap ---- */
document.querySelectorAll('[data-collapse]').forEach(h=>{
  h.addEventListener('click', ()=>h.closest('.panel').classList.toggle('collapsed'));
});

/* ---- Controls hint auto-hide ---- */
const hint=$('hint');
let hintHidden=false, hintReshowTimer=null;
function hideHint(){ if(!hintHidden){ hintHidden=true; hint.classList.add('hide'); } }
setTimeout(hideHint, 9000);
// Persistent '?' control: re-reveals the controls hint on demand (so the only
// cue for tap/pair/zoom isn't a one-time 9s fade-out).
$('helpBtn').onclick=()=>{
  clearTimeout(hintReshowTimer);
  hintHidden=false; hint.classList.remove('hide');

/* ============================================================================
   Resize handling
   ============================================================================ */
function onResize(){
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, DPR_CAP));
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
  pointMat.uniforms.uPixelRatio.value=renderer.getPixelRatio();
  pointMat.uniforms.uScreenK.value=h*0.5/Math.tan(camera.fov*Math.PI/360);
  if(composer){
    const pr=renderer.getPixelRatio();
    composer.setPixelRatio(pr);
    composer.setSize(w,h);
    if(bloomPass){
      let bw=w*pr, bh=h*pr;
      if(TIER==='mid'){ bw*=0.5; bh*=0.5; }
      bloomPass.setSize(bw, bh); // real resize reallocates internal render targets
    }
  }
  syncSheetStack();
}
window.addEventListener('resize', onResize);
if(window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

/* ============================================================================
   Render loop  (+ first-load cinematic ignition + FPS guard)
   ============================================================================ */
const clock=new THREE.Clock();
let revealStart=performance.now();
let frameTimes=[], fpsGuardDone=false;

function project(id, v){ v.set(positions[id*3],positions[id*3+1],positions[id*3+2]).project(camera); }
const _v=new THREE.Vector3();

// Small non-blocking on-screen error toast — so if rendering ever fails on a
// device we can't reach (e.g. a phone GPU), the real error is visible to screenshot.
let renderErrShown=false;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:60;'
      +'max-width:92vw;background:rgba(45,12,12,.9);color:#ffd2d2;border:1px solid rgba(255,120,120,.5);'
      +'border-radius:10px;padding:9px 13px;font-size:11.5px;line-height:1.45;white-space:pre-wrap;'
      +'-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);box-shadow:0 8px 30px rgba(0,0,0,.5);';
    document.body.appendChild(t);
  }
  t.textContent=msg;
}
// Bulletproof render: bloom (post-processing) is the most fragile thing on weak
// mobile GPUs and can throw at render time. If it does, fall back PERMANENTLY to a
// direct render so the galaxy still shows (the additive points glow on their own).
function renderFrame(){
  if(useBloom && composer){
    try{ composer.render(); return; }
    catch(e){
      console.warn('Bloom render failed; falling back to direct render.', e);
      useBloom=false; composer=null;
      try{ const b=$('bloomBtn'); b.style.opacity='0.45'; b.title='Bloom unavailable on this device'; }catch(_){}
    }
  }
  try{ renderer.render(scene, camera); }
  catch(e){
    if(!renderErrShown){ renderErrShown=true;
      showToast('Render error (please screenshot):\n'+(e&&e.message?e.message:String(e))); }
  }
}

// Camera-motion energy, published each frame for the audio "navigation voice"
// (read by the separate audio module). Initialised to the current view so the
// first frame doesn't register a huge jump.
const _navPrevPos = camera.position.clone();
let _navPrevDist = camera.position.distanceTo(controls.target);
window.__evoNav = { move:0, zoom:0, dist:_navPrevDist/R_MAX };

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(), 0.05);
  const now=performance.now();

  // first-load ignition reveal over ~2.5s
  const rev=clamp((now-revealStart)/2500, 0, 1);
  pointMat.uniforms.uReveal.value= reduceMotion ? 1.0 : rev;
  pointMat.uniforms.uTime.value=clock.elapsedTime;

  // color-mode crossfade. Points crossfade in-shader via uColorMode; the branch
  // web crossfades here between the faint clade web and the glowing age gradient
  // (only while a toggle is animating, so there's no steady-state per-frame cost).
  if(colorTween){
    colorTween.t=Math.min(1, colorTween.t+dt/0.4);
    const mv=lerp(colorTween.from, colorTween.to, easeInOut(colorTween.t));
    pointMat.uniforms.uColorMode.value=mv;
    const col=lineGeo.attributes.color.array;
    for(let k=0;k<col.length;k++) col[k]=lineColClade[k]+(lineColAge[k]-lineColClade[k])*mv;
    lineGeo.attributes.color.needsUpdate=true;
    lineMat.opacity=0.9+0.1*mv;
    if(colorTween.t>=1) colorTween=null;
  }

  // spotlight dim relax
  if(spotlightT>0){
    spotlightT=Math.max(0, spotlightT-dt/1.2);
    pointMat.uniforms.uDim.value=lerp(0.35, 1.0, 1-spotlightT);
  } else {
    // Keep the rest of the galaxy clearly visible while only ONE species is
    // selected so its potential pair partners stay easy to spot/aim at.
    // Only the focused result states (a finished pair or a cousin set) apply
    // the strong persistent dim.
    const strongDim = (selection.length>=2);
    pointMat.uniforms.uDim.value = strongDim ? 0.55 : (selection.length ? 0.85 : 1.0);
  }

  updateFly(dt);

  // idle auto-rotate re-arm
  if(!reduceMotion && !fly){
    if(!controls.autoRotate && (now-idleTimer)>6000){
      controls.autoRotate=true;
    }
    if(controls.autoRotate && controls.autoRotateSpeed<autoRotateTarget){
      controls.autoRotateSpeed=Math.min(autoRotateTarget, controls.autoRotateSpeed+dt*0.18);
    }
  }

  controls.update();

  // keep starfield centered on camera (parallax on rotation only)
  starfield.position.copy(camera.position);

  // publish camera-motion energy for the audio navigation voice. Manual orbit /
  // pinch = full swell; the idle auto-spin gets a gentle whisper; scripted fly-tos
  // are left to the dedicated whoosh cue.
  {
    const camDist = camera.position.distanceTo(controls.target);
    let mv = camera.position.distanceTo(_navPrevPos) / Math.max(camDist, 1e-3);
    const zm = _navPrevDist>0 ? (_navPrevDist - camDist) / Math.max(camDist, 1e-3) : 0; // + = zooming in
    _navPrevPos.copy(camera.position); _navPrevDist = camDist;
    if(fly) mv = 0;                          // fly-tos already play the whoosh cue
    else if(controls.autoRotate) mv *= 0.12; // gentle whisper during the idle auto-spin
    window.__evoNav.move = mv;
    window.__evoNav.zoom = (fly || controls.autoRotate) ? 0 : zm;
    window.__evoNav.dist = camDist / R_MAX;
  }

  // MRCA floating label
  if(mrcaNode>=0){
    project(mrcaNode, _v);
    if(_v.z<1){
      mrcaLabel.style.display='block';
      mrcaLabel.style.left=((_v.x*0.5+0.5)*window.innerWidth)+'px';
      mrcaLabel.style.top=((-_v.y*0.5+0.5)*window.innerHeight)+'px';
      mrcaLabel.innerHTML=esc(NAMES.label[mrcaNode]);
    } else mrcaLabel.style.display='none';
  }

  // brighten/compensate the point glow whenever post-bloom is not active (mobile
  // low tier, or after a bloom fallback) so it still reads as a glowing galaxy.
  pointMat.uniforms.uGlow.value = (useBloom && composer) ? 1.0 : 1.75;

  // render — bulletproof (see renderFrame): if bloom throws on this GPU it falls
  // back to a direct render so the galaxy still shows. Key mobile robustness fix.
  renderFrame();

  // runtime FPS guard: IGNORE the first ~3s (shader compile + ignition jank), then
  // require a SUSTAINED low frame rate before stepping anything down. On 'high' tier
  // we never auto-disable bloom (desktop handles it) — we trim lines/DPR instead.
  if(!fpsGuardDone){
    if(clock.elapsedTime>3.0){
      frameTimes.push(dt);
      if(frameTimes.length>=90){
        const avg=frameTimes.reduce((a,b)=>a+b,0)/frameTimes.length;
        if(avg>0.030){ // sustained < ~33fps
          if(TIER!=='high' && useBloom){ useBloom=false; composer=null; const b=$('bloomBtn'); b.style.opacity='0.45'; }
          else if(branchLines.parent){ scene.remove(branchLines); }
          else { renderer.setPixelRatio(Math.min(renderer.getPixelRatio(), 1.0)); onResize(); }
        }
        fpsGuardDone=true;
      }
    }
  }
}

// hand off
$('bloomBtn').style.opacity=useBloom?'1':'0.45';
splash.classList.add('hide');
setTimeout(()=>{ splash.style.display='none'; }, 900);
animate();

// expose a little for debugging
window.__evo={T, positions, selection:()=>selection, lca, closestCousins};
</script>
