{# Renders share row. Required vars: share_url (full URL), share_title, share_text #}
<div class="flex flex-wrap items-center gap-2 my-6" data-share-url="{{ share_url|e }}">
    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mr-2">Share</span>

       class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 dark:bg-brand-900 dark:hover:bg-brand-800 text-gray-700 dark:text-gray-300">

    <a href="https://wa.me/?text={{ share_text|urlencode }}%20{{ share_url|urlencode }}" target="_blank" rel="noopener noreferrer" aria-label="Share on WhatsApp"
       class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 dark:bg-brand-900 dark:hover:bg-brand-800 text-gray-700 dark:text-gray-300">

    </a>

    <a href="https://t.me/share/url?url={{ share_url|urlencode }}&text={{ share_text|urlencode }}" target="_blank" rel="noopener noreferrer" aria-label="Share on Telegram"
       class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 dark:bg-brand-900 dark:hover:bg-brand-800 text-gray-700 dark:text-gray-300">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
    </a>

    <a href="mailto:?subject={{ share_title|urlencode }}&body={{ share_text|urlencode }}%20{{ share_url|urlencode }}" aria-label="Share by email"
       class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 dark:bg-brand-900 dark:hover:bg-brand-800 text-gray-700 dark:text-gray-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
    </a>

    <button type="button" data-copy-link aria-label="Copy link"
       class="inline-flex items-center gap-1.5 px-3 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 dark:bg-brand-900 dark:hover:bg-brand-800 text-gray-700 dark:text-gray-300 text-xs font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        <span data-copy-label>Copy link</span>
    </button>
</div>
<script>
(function(){
    document.querySelectorAll('[data-copy-link]').forEach(function(btn){
        btn.addEventListener('click', function(){
            var holder = btn.closest('[data-share-url]');
            var url = holder ? holder.getAttribute('data-share-url') : window.location.href;
            navigator.clipboard.writeText(url).then(function(){
                var label = btn.querySelector('[data-copy-label]');
                if (label) {
                    var orig = label.textContent;
                    label.textContent = 'Copied';
                    setTimeout(function(){ label.textContent = orig; }, 1500);
                }
            });
        });
    });
})();
</script>
